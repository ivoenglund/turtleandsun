@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:#FFF9E6;color:#1C0A00;display:flex;flex-direction:column;}

.nav-bar{background:#FFF9E6;border-bottom:1px solid rgba(28,10,0,0.08);flex-shrink:0;position:relative;z-index:100;}
.nav-wrap{max-width:1200px;margin:0 auto;padding:0 32px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0 18px;}
.nav a img{height:72px;width:auto;margin-top:-42px;display:block;}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:#1C0A00;text-decoration:none;opacity:0.7;}
.nav-links a:hover{opacity:1;}
.nav-account-wrap{position:relative;}
.nav-account-btn{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:#1C0A00;text-decoration:none;opacity:0.7;cursor:pointer;background:none;border:none;padding:0;}
.nav-account-btn:hover{opacity:1;}
#accountDropdown{visibility:hidden;opacity:0;transform:translateY(-6px);transition:opacity 0.15s,transform 0.15s,visibility 0s 0.15s;position:absolute;top:calc(100% + 10px);right:0;background:#fff;border-radius:12px;box-shadow:0 8px 36px rgba(0,0,0,0.16);padding:14px 18px;width:220px;z-index:300;}
#accountDropdown.open{visibility:visible;opacity:1;transform:translateY(0);transition:opacity 0.15s,transform 0.15s,visibility 0s 0s;}
.dd-user-email{font-size:11px;color:rgba(60,20,0,0.5);padding-bottom:8px;border-bottom:1px solid #f0ede6;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dd-nav-link{display:block;padding:6px 0;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;color:#1C0A00;text-decoration:none;opacity:0.75;}
.dd-nav-link:hover{opacity:1;color:#3A6B20;}
.dd-nav-logout{color:#c0392b !important;opacity:1 !important;}
.dd-nav-sep{height:1px;background:rgba(28,10,0,0.07);margin:6px 0;}

/* ── Three-column layout ──────────────────────────────────────────── */
.three-col{flex:1;min-height:0;display:flex;overflow:hidden;position:relative;}

.panel-left{display:flex;flex-direction:column;width:280px;flex-shrink:0;overflow:hidden;transition:width 0.22s ease;border-right:1px solid rgba(0,0,0,0.06);background:#fff;}
.panel-left.collapsed{width:0;border-right:none;}
.pl-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;flex-shrink:0;border-bottom:1px solid rgba(28,10,0,0.05);}
.pl-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(28,10,0,0.35);}
.pl-close-btn{width:22px;height:22px;border:none;background:none;cursor:pointer;color:rgba(28,10,0,0.28);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:background 0.12s,color 0.12s;padding:0;flex-shrink:0;}
.pl-close-btn:hover{background:rgba(28,10,0,0.07);color:#1C0A00;}
.pl-scroll{flex:1;overflow-y:auto;padding:8px 14px 20px;}

.panel-center{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}

.panel-right{display:flex;flex-direction:column;width:380px;flex-shrink:0;overflow:hidden;transition:width 0.22s ease;border-left:1px solid rgba(0,0,0,0.06);background:#FFF9E6;}
.panel-right.collapsed{width:0;border-left:none;}
.pr-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;flex-shrink:0;border-bottom:1px solid rgba(28,10,0,0.05);}
.pr-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(28,10,0,0.35);}
.pr-close-btn{width:22px;height:22px;border:none;background:none;cursor:pointer;color:rgba(28,10,0,0.28);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:background 0.12s,color 0.12s;padding:0;flex-shrink:0;}
.pr-close-btn:hover{background:rgba(28,10,0,0.07);color:#1C0A00;}

.btn-show-filters{display:none;position:absolute;top:10px;left:10px;z-index:5;align-items:center;gap:5px;padding:5px 10px;background:#fff;border:1px solid rgba(28,10,0,0.11);border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;color:rgba(28,10,0,0.5);cursor:pointer;transition:background 0.12s;}
.btn-show-filters:hover{background:#f9f7f2;color:#1C0A00;}
.btn-show-details{display:none;padding:5px 10px;background:rgba(58,107,32,0.09);border:none;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;color:#3A6B20;cursor:pointer;white-space:nowrap;}
.btn-show-details:hover{background:rgba(58,107,32,0.16);}

@media(max-width:1000px){

/* Filter panel */
.fp-sep{height:1px;background:rgba(28,10,0,0.07);margin:8px 0;}
.fp-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:rgba(28,10,0,0.35);margin:12px 0 6px;}

.btn-print-occ:hover{background:#3A6B20;color:#fff;}

  .nav-bar,.panel-left,.panel-right,.btn-print-occ{display:none!important;}
  .three-col{display:block;}

  .oc-icon{display:none;}
  .oc-action{display:none;}
  .oc-occasion{font-size:11pt;font-weight:700;}
  .oc-contact{font-size:10pt;}
  .oc-years{font-size:9pt;}
  .oc-date{font-size:11pt;}
  .oc-days{font-size:9pt;}
  @page{size:A4 portrait;margin:15mm 15mm 20mm;}
}
.occ-scroll{flex:1;overflow-y:auto;padding:12px 18px 40px;}

/* Occasion cards */
.section-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:rgba(28,10,0,0.35);margin:16px 0 8px;}
.occasion-card{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,0.06);display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow 0.15s,background 0.1s;}

.occasion-card.active{outline:2px solid #3A6B20;outline-offset:-2px;}

.occasion-card.remembrance .oc-icon{background:#f0ede6;color:rgba(28,10,0,0.4);}
.occasion-card.occasion .oc-icon{background:#fef3e2;color:#b85e10;}
.occasion-card.milestone .oc-icon{background:#e8e0f0;color:#6b2d9a;}
.oc-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.oc-main{flex:1;min-width:0;}
.oc-occasion{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#1C0A00;}
.oc-contact{font-size:12px;color:rgba(28,10,0,0.55);margin-top:2px;}
.oc-years{font-size:11px;color:#3A6B20;font-weight:600;margin-top:1px;}
.oc-date-col{text-align:right;flex-shrink:0;}
.oc-date{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#1C0A00;}
.oc-days{font-size:11px;margin-top:2px;}
.oc-days.soon{color:#c0392b;font-weight:600;}
.oc-days.upcoming{color:rgba(28,10,0,0.4);}
.oc-action{flex-shrink:0;margin-left:4px;}
.btn-loveogram{padding:6px 12px;background:#3A6B20;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;display:inline-block;}
.btn-loveogram:hover{background:#1C0A00;}

.empty-state{text-align:center;padding:60px 32px;color:rgba(28,10,0,0.3);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:500;}

<script src="/contact-panel.js"></script>
<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let _items = [];
let _contacts = [];
let _allGroups = [];
let _relTypes = [];
let _activeContactId = null;

function nextYearlyDate(start, today) {
  const thisYear = new Date(today.getFullYear(), start.getMonth(), start.getDate());
  if (thisYear >= today) return thisYear;
  return new Date(today.getFullYear() + 1, start.getMonth(), start.getDate());
}

function nextMilestoneInfo(start, today) {
  const yearsElapsed = today.getFullYear() - start.getFullYear() +
    (today >= new Date(today.getFullYear(), start.getMonth(), start.getDate()) ? 0 : -1);
  let nextMile = Math.ceil((yearsElapsed + 1) / 10) * 10;
  if (nextMile < 10) nextMile = 10;
  const date = new Date(start.getFullYear() + nextMile, start.getMonth(), start.getDate());
  return { date, years: nextMile };
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function daysUntil(date, today) {
  return Math.round((date - today) / (1000 * 60 * 60 * 24));
}

function computeItems(occasions, contacts) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const windowDays = parseInt(document.getElementById('windowSel').value, 10);
  const cutoff = new Date(today);
  cutoff.setDate(cutoff.getDate() + windowDays);

  const items = [];

  for (const o of occasions) {
    const start = new Date(o.start_date);
    let nextDate = null;
    let yearsCount = null;
    let isMilestone = false;

    if (o.frequency === 'yearly') {
      nextDate = nextYearlyDate(start, today);
      yearsCount = nextDate.getFullYear() - start.getFullYear();
    } else if (o.frequency === 'milestone') {
      const info = nextMilestoneInfo(start, today);
      nextDate = info.date;
      yearsCount = info.years;
      isMilestone = true;
    } else {
      if (start >= today) nextDate = start;
    }
    if (!nextDate || nextDate > cutoff) continue;

    items.push({
      type: isMilestone ? 'milestone' : 'occasion',
      contact_id: o.contact_id,
      contact_name: o.contact_name,
      occasion_name: o.name,
      next_date: nextDate,
      years_count: yearsCount,
    });
  }

  for (const c of contacts) {
    if (!c.birthday) continue;
    const start = new Date(c.birthday);
    if (isNaN(start.getTime())) continue;
    const nextDate = nextYearlyDate(start, today);
    if (!nextDate || nextDate > cutoff) continue;
    const age = nextDate.getFullYear() - start.getFullYear();
    items.push({
      type: 'birthday',
      contact_id: c.id,
      contact_name: c.name,
      occasion_name: 'Birthday',
      next_date: nextDate,
      years_count: age,
    });
  }

  for (const c of contacts) {
    if (!c.died_on) continue;
    const start = new Date(c.died_on);
    if (isNaN(start.getTime())) continue;
    const nextDate = nextYearlyDate(start, today);
    if (!nextDate || nextDate > cutoff) continue;
    const years = nextDate.getFullYear() - start.getFullYear();
    items.push({
      type: 'remembrance',
      contact_id: c.id,
      contact_name: c.name,
      occasion_name: 'Remembrance',
      next_date: nextDate,
      years_count: years,
    });
  }

  items.sort((a, b) => a.next_date - b.next_date);
  return items;
}

function render() {
  _items = computeItems(_rawOccasions, _contacts);

  const showBirthdays   = document.getElementById('cbBirthdays').checked;
  const showOccasions   = document.getElementById('cbOccasions').checked;
  const showRemembrance = document.getElementById('cbRemembrance').checked;

  const filtered = _items.filter(item => {
    if (item.type === 'birthday') return showBirthdays;
    if (item.type === 'remembrance') return showRemembrance;
    return showOccasions;
  });

  const container = document.getElementById('listContainer');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state">No upcoming occasions in this window.</div>';
    return;
  }

  const today = new Date();
  today.setHours(0,0,0,0);

  const byMonth = new Map();
  for (const item of filtered) {
    const key = `${item.next_date.getFullYear()}-${item.next_date.getMonth()}`;
    if (!byMonth.has(key)) byMonth.set(key, { label: `${MONTHS_FULL[item.next_date.getMonth()]} ${item.next_date.getFullYear()}`, items: [] });
    byMonth.get(key).items.push(item);
  }

  let html = '';
  for (const [, group] of byMonth) {
    html += `<div class="section-label">${esc(group.label)}</div>`;
    for (const item of group.items) {
      const days = daysUntil(item.next_date, today);
      const daysText = days === 0 ? 'Today!' : days === 1 ? 'Tomorrow' : `In ${days} days`;
      const daysClass = days <= 7 ? 'soon' : 'upcoming';
      const dateDisplay = `${item.next_date.getDate()} ${MONTHS[item.next_date.getMonth()]}`;
      const isActive = item.contact_id === _activeContactId;

      let icon, yearsText = '';
      if (item.type === 'birthday') { icon = '🎂'; yearsText = item.years_count ? `Turns ${item.years_count}` : ''; }
      else if (item.type === 'remembrance') { icon = '🕯'; yearsText = item.years_count ? `${ordinal(item.years_count)} anniversary` : ''; }
      else if (item.type === 'milestone') { icon = '⭐'; yearsText = item.years_count ? `${ordinal(item.years_count)} milestone` : ''; }
      else { icon = '✨'; yearsText = item.years_count ? `${ordinal(item.years_count)} year` : ''; }

      html += `
        <div class="occasion-card ${item.type}${isActive ? ' active' : ''}" data-contact-id="${item.contact_id}" onclick="openContact(${item.contact_id})" ondblclick="forceOpenContact(${item.contact_id})">
          <div class="oc-icon">${icon}</div>
          <div class="oc-main">
            <div class="oc-occasion">${esc(item.occasion_name)}</div>
            <div class="oc-contact">${esc(item.contact_name || 'Unknown')}</div>
            ${yearsText ? `<div class="oc-years">${esc(yearsText)}</div>` : ''}
          </div>
          <div class="oc-date-col">
            <div class="oc-date">${dateDisplay}</div>
            <div class="oc-days ${daysClass}">${daysText}</div>
          </div>
          <div class="oc-action">
            <a class="btn-loveogram" href="/?contact=${item.contact_id}" onclick="event.stopPropagation()">Send Loveogram</a>
          </div>
        </div>
      `;
    }
  }
  container.innerHTML = html;
}

let _rawOccasions = [];

async function load() {
  const res = await fetch('/api/occasions/upcoming');
  const data = await res.json();
  _rawOccasions = data.occasions || [];
  _contacts = data.contacts || [];
  render();
}

// ── Open contact in right panel ───────────────────────────────────────────────
function openContact(id) {
  _activeContactId = id;
  document.querySelectorAll('.occasion-card').forEach(el => {
    el.classList.toggle('active', el.dataset.contactId === String(id));
  });
  const pr = document.getElementById('panelRight');
  const panelOpen = window.innerWidth <= 1000 ? pr.classList.contains('mobile-open') : !pr.classList.contains('collapsed');
  if (panelOpen) CP.open(id);
  _updateShowDetailsBtn();
}

function forceOpenContact(id) {
  _activeContactId = id;
  document.querySelectorAll('.occasion-card').forEach(el => {
    el.classList.toggle('active', el.dataset.contactId === String(id));
  });
  const pr = document.getElementById('panelRight');
  if (window.innerWidth <= 1000) {
    pr.classList.add('mobile-open');
    document.getElementById('mobileBackdrop').classList.add('open');
  } else if (pr.classList.contains('collapsed')) {
    _setPanelCollapsed('right', false);
  }
  CP.open(id);
  _updateShowDetailsBtn();
}

// ── Panel collapse/expand ─────────────────────────────────────────────────────
const LS_LEFT = 'ts_panel_left', LS_RIGHT = 'ts_panel_right';

function initPanels() {
  if (localStorage.getItem(LS_LEFT) === 'collapsed') _setPanelCollapsed('left', true);
  if (localStorage.getItem(LS_RIGHT) === 'collapsed') _setPanelCollapsed('right', true);
}

function _setPanelCollapsed(side, collapsed) {
  const el = document.getElementById(side === 'left' ? 'panelLeft' : 'panelRight');
  el.classList.toggle('collapsed', collapsed);
  localStorage.setItem(side === 'left' ? LS_LEFT : LS_RIGHT, collapsed ? 'collapsed' : 'expanded');
  if (side === 'left') {
    const btn = document.getElementById('btnShowFilters');
    if (btn) btn.style.display = collapsed ? 'flex' : 'none';
  }
  if (side === 'right') _updateShowDetailsBtn();
}

function togglePanel(side) {
  const el = document.getElementById(side === 'left' ? 'panelLeft' : 'panelRight');
  if (window.innerWidth <= 1000) {
    const open = el.classList.contains('mobile-open');
    el.classList.toggle('mobile-open', !open);
    document.getElementById('mobileBackdrop').classList.toggle('open', !open);
  } else {
    _setPanelCollapsed(side, !el.classList.contains('collapsed'));
  }
}

function closeMobileOverlays() {
  document.getElementById('panelLeft').classList.remove('mobile-open');
  document.getElementById('panelRight').classList.remove('mobile-open');
  document.getElementById('mobileBackdrop').classList.remove('open');
}

function _updateShowDetailsBtn() {
  const pr = document.getElementById('panelRight');
  const btn = document.getElementById('btnShowDetails');
  if (!btn) return;
  btn.style.display = (_activeContactId && pr.classList.contains('collapsed')) ? 'flex' : 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMobileOverlays(); });

// ── Nav auth ──────────────────────────────────────────────────────────────────
async function initAuthNav() {
  try {
    const res = await fetch('/api/auth/status');
    const status = res.ok ? await res.json() : false;
    if (!status || !status.loggedIn) { window.location.href = '/login'; return; }
    document.getElementById('ddUserEmail').textContent = status.email;

    const [, groupsRes, relTypesRes] = await Promise.all([
      load(),
      fetch('/api/groups'),
      fetch('/api/relationship-types'),
    ]);
    _allGroups = groupsRes.ok ? await groupsRes.json() : [];
    _relTypes  = relTypesRes.ok ? await relTypesRes.json() : [];

    CP.init('cpContainer');
    CP.contacts  = _contacts;
    CP.allGroups = _allGroups;
    CP.relTypes  = _relTypes;
    CP.onSaved = (updated) => {
      const c = _contacts.find(x => x.id === updated.id);
      if (c) Object.assign(c, updated);
    };

    initPanels();
  } catch { window.location.href = '/login'; }
}

function handleAccountClick(e) {
  e.stopPropagation();
  document.getElementById('accountDropdown').classList.toggle('open');
}
document.addEventListener('click', () => document.getElementById('accountDropdown').classList.remove('open'));

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

initAuthNav();
</script>
