<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Occasions — Turtle and Sun</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:#FFF9E6;color:#1C0A00;display:flex;flex-direction:column;}


/* ── Main canvas (full width) ───────────────────────────────────── */
.main-canvas{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}

/* ── Floating overlays ──────────────────────────────────────────── */
.fo-filters,.fo-detail{position:fixed;z-index:50;}

.fo-filters{top:62px;left:14px;width:210px;max-height:calc(100vh - 82px);overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column;align-items:flex-start;gap:2px;}
.fo-filters::-webkit-scrollbar{display:none;}

.fo-detail{top:62px;right:14px;width:320px;max-height:calc(100vh - 82px);overflow:hidden;display:none;flex-direction:column;}
.fo-detail.fo-open{display:flex;}

.fo-filters.fo-hidden{display:none;}

.fo-hdr{display:flex;align-items:center;gap:6px;margin-bottom:0;background:#FFF9E6;border-radius:3px;padding:3px 6px;width:fit-content;}
.fo-close-btn{width:18px;height:18px;border:none;background:none;cursor:pointer;font-size:16px;color:rgba(28,10,0,0.35);line-height:1;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fo-close-btn:hover{color:#1C0A00;}
.fo-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(28,10,0,0.3);}
.fo-detail-hdr{display:flex;justify-content:flex-end;padding-bottom:4px;}
.fo-detail-hdr .fo-close-btn{background:#FFF9E6;border-radius:3px;padding:4px 6px;}

.fo-show-btn{position:fixed;top:64px;left:14px;z-index:50;border:none;cursor:pointer;font-size:18px;line-height:1;color:rgba(28,10,0,0.5);font-weight:700;display:none;background:#FFF9E6;border-radius:3px;padding:3px 6px;}
.fo-show-btn:hover{color:#1C0A00;}

/* Filter items – chip backgrounds for legibility */
#leftFilterContent{display:flex;flex-direction:column;align-items:flex-start;gap:2px;}
.fp-sep{height:4px;background:none;margin:0;}
.fp-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(28,10,0,0.3);margin:4px 0 0;background:#FFF9E6;border-radius:3px;padding:3px 6px;width:fit-content;}
.fp-check{display:flex;align-items:center;gap:6px;padding:3px 6px;cursor:pointer;background:#FFF9E6;border-radius:3px;width:fit-content;}
.fp-check label{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:#1C0A00;cursor:pointer;}
.fp-check input[type=checkbox]{width:13px;height:13px;accent-color:#3A6B20;cursor:pointer;flex-shrink:0;}
.fp-select{width:100%;padding:6px 8px;border:1.5px solid #e0dcd4;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;color:#1C0A00;background:#FFF9E6;outline:none;margin-top:4px;}
.fp-select:focus{border-color:#3A6B20;}

/* Mobile */
.fo-backdrop{display:none;position:fixed;inset:0;bottom:56px;background:rgba(0,0,0,0.35);z-index:190;}
.mob-toolbar{display:none;}

@media(max-width:1000px){
  .fo-filters,.fo-detail{
    position:fixed;top:0;left:0;right:0;bottom:56px;
    width:auto!important;max-height:none!important;
    background:rgba(255,249,230,0.97);backdrop-filter:blur(8px);
    z-index:200;overflow-y:auto;padding:20px 16px;
    display:none!important;flex-direction:column;
  }
  .fo-filters.fo-hidden{display:none!important;}
  .fo-filters.mob-open,.fo-detail.mob-open{display:flex!important;}
  .fo-backdrop.mob-open{display:block;}
  .fo-show-btn{display:none!important;}
  .mob-toolbar{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;
    background:rgba(255,249,230,0.97);backdrop-filter:blur(8px);
    border-top:1px solid rgba(28,10,0,0.1);
    align-items:center;justify-content:center;gap:10px;z-index:150;padding:0 16px;
  }
  .mob-btn{
    flex:1;max-width:180px;padding:9px;border:1.5px solid rgba(28,10,0,0.14);border-radius:8px;
    font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;
    cursor:pointer;background:transparent;color:#1C0A00;transition:background 0.12s;
  }
  .mob-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .mob-btn.active{background:#3A6B20;color:#fff;border-color:#3A6B20;}
  .main-canvas{padding-bottom:56px;}
}

/* ── Print ─────────────────────────────────────────────────────────────────── */
@media print {
  html,body{height:auto;overflow:visible;}
  .nav-bar,.fo-filters,.fo-detail,.fo-show-btn,.fo-backdrop,.mob-toolbar,.btn-print-occ{display:none!important;}
  .main-canvas{display:block;}
  .occ-scroll{overflow:visible;padding:0;}
  .occ-toolbar{border:none;padding:0 0 12px;}
  .occ-toolbar-text h2{font-size:18pt;margin-bottom:4pt;}
  .occ-toolbar-text p{font-size:10pt;}
  .section-label{font-size:9pt;margin:14pt 0 6pt;color:#555;}
  .occasion-card{box-shadow:none;border:1px solid #ddd;padding:8pt 12pt;margin-bottom:6pt;border-radius:0;page-break-inside:avoid;}
  .oc-icon{display:none;}
  .oc-action{display:none;}
  .oc-occasion{font-size:11pt;font-weight:700;}
  .oc-contact{font-size:10pt;}
  .oc-years{font-size:9pt;}
  .oc-date{font-size:11pt;}
  .oc-days{font-size:9pt;}
  @page{size:A4 portrait;margin:15mm 15mm 20mm;}
}

/* Occasions list */
.occ-toolbar{padding:14px 18px 10px;border-bottom:1px solid rgba(28,10,0,0.07);flex-shrink:0;background:#fff;display:flex;align-items:flex-start;justify-content:space-between;}
.occ-toolbar-text h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:800;color:#1C0A00;}
.occ-toolbar-text p{font-size:12px;color:rgba(28,10,0,0.45);margin-top:2px;}
.btn-print-occ{padding:7px 14px;background:#f0ede6;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:rgba(28,10,0,0.6);cursor:pointer;flex-shrink:0;margin-left:12px;}
.btn-print-occ:hover{background:#3A6B20;color:#fff;}
.occ-scroll{flex:1;overflow-y:auto;padding:12px 18px 40px;}

.section-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:rgba(28,10,0,0.35);margin:16px 0 8px;}
.occasion-card{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,0.06);display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow 0.15s,background 0.1s;}
.occasion-card:hover{box-shadow:0 3px 12px rgba(0,0,0,0.1);background:#f9f9f7;}
.occasion-card.active{outline:2px solid #3A6B20;outline-offset:-2px;}
.occasion-card.birthday .oc-icon{background:#e8f0e0;color:#3A6B20;}
.occasion-card.remembrance .oc-icon{background:#f0ede6;color:rgba(28,10,0,0.4);}
.occasion-card.occasion .oc-icon{background:#fef3e2;color:#b85e10;}
.occasion-card.milestone .oc-icon{background:#e8e0f0;color:#6b2d9a;}
.oc-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.oc-main{flex:1;min-width:0;}
.oc-occasion{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#1C0A00;}
.oc-contact{font-size:12px;color:rgba(28,10,0,0.55);margin-top:2px;}
.oc-years{font-size:11px;color:#3A6B20;font-weight:600;margin-top:1px;}
.oc-date-col{text-align:right;flex-shrink:0;}
.oc-date{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#1C0A00;}
.oc-days{font-size:11px;margin-top:2px;}
.oc-days.soon{color:#c0392b;font-weight:600;}
.oc-days.upcoming{color:rgba(28,10,0,0.4);}
.oc-action{flex-shrink:0;margin-left:4px;}
.btn-loveogram{padding:6px 12px;background:#3A6B20;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;display:inline-block;}
.btn-loveogram:hover{background:#1C0A00;}
.empty-state{text-align:center;padding:60px 32px;color:rgba(28,10,0,0.3);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:500;}
</style>
<script src="/nav.js"></script>
</head>
<body>

<!-- Full-width occasions list -->
<div class="main-canvas">
  <div class="occ-toolbar">
    <div class="occ-toolbar-text">
      <h2>Upcoming Occasions</h2>
      <p>Birthdays, anniversaries, and milestones for the people you care about.</p>
    </div>
    <button class="btn-print-occ" onclick="window.print()">Print list</button>
  </div>
  <div class="occ-scroll">
    <div id="listContainer"><div class="empty-state">Loading…</div></div>
  </div>
</div>

<!-- Floating filter overlay (left) -->
<div class="fo-filters" id="foFilters">
  <div class="fo-hdr">
    <button class="fo-close-btn" onclick="hideFilters()" aria-label="Hide filters">×</button>
    <span class="fo-title">Filters</span>
  </div>
  <div class="fp-label">Type</div>
  <div class="fp-check">
    <input type="checkbox" id="cbBirthdays" checked onchange="render()">
    <label for="cbBirthdays">🎂 Birthdays</label>
  </div>
  <div class="fp-check">
    <input type="checkbox" id="cbOccasions" checked onchange="render()">
    <label for="cbOccasions">✨ Occasions</label>
  </div>
  <div class="fp-check">
    <input type="checkbox" id="cbRemembrance" onchange="render()">
    <label for="cbRemembrance">🕯 Remembrance</label>
  </div>
  <div class="fp-sep"></div>
  <div class="fp-label">Window</div>
  <select class="fp-select" id="windowSel" onchange="render()">
    <option value="30">Next 30 days</option>
    <option value="90">Next 3 months</option>
    <option value="180">Next 6 months</option>
    <option value="365" selected>Next 12 months</option>
  </select>
</div>
<button class="fo-show-btn" id="foShowFilters" onclick="showFilters()" title="Show filters">+</button>

<!-- Floating contact detail overlay (right) -->
<div class="fo-detail" id="foDetail">
  <div id="cpContainer" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;"></div>
</div>

<!-- Mobile -->
<div class="fo-backdrop" id="foBackdrop" onclick="closeMobileOverlays()"></div>
<div class="mob-toolbar">
  <button class="mob-btn" id="mobFiltersBtn" onclick="toggleMobileFilters()">≡ Filters</button>
  <button class="mob-btn" id="mobDetailBtn" disabled onclick="toggleMobileDetail()">Selected contact</button>
</div>

<script src="/contact-panel.js"></script>
<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let _items = [];
let _contacts = [];
let _allGroups = [];
let _relTypes = [];
let _activeContactId = null;

function nextYearlyDate(start, today) {
  const thisYear = new Date(today.getFullYear(), start.getMonth(), start.getDate());
  if (thisYear >= today) return thisYear;
  return new Date(today.getFullYear() + 1, start.getMonth(), start.getDate());
}

function nextMilestoneInfo(start, today) {
  const yearsElapsed = today.getFullYear() - start.getFullYear() +
    (today >= new Date(today.getFullYear(), start.getMonth(), start.getDate()) ? 0 : -1);
  let nextMile = Math.ceil((yearsElapsed + 1) / 10) * 10;
  if (nextMile < 10) nextMile = 10;
  const date = new Date(start.getFullYear() + nextMile, start.getMonth(), start.getDate());
  return { date, years: nextMile };
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function daysUntil(date, today) {
  return Math.round((date - today) / (1000 * 60 * 60 * 24));
}

function computeItems(occasions, contacts) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const windowDays = parseInt(document.getElementById('windowSel').value, 10);
  const cutoff = new Date(today);
  cutoff.setDate(cutoff.getDate() + windowDays);

  const items = [];

  for (const o of occasions) {
    const start = new Date(o.start_date);
    let nextDate = null;
    let yearsCount = null;
    let isMilestone = false;

    if (o.frequency === 'yearly') {
      nextDate = nextYearlyDate(start, today);
      yearsCount = nextDate.getFullYear() - start.getFullYear();
    } else if (o.frequency === 'milestone') {
      const info = nextMilestoneInfo(start, today);
      nextDate = info.date;
      yearsCount = info.years;
      isMilestone = true;
    } else {
      if (start >= today) nextDate = start;
    }
    if (!nextDate || nextDate > cutoff) continue;

    items.push({
      type: isMilestone ? 'milestone' : 'occasion',
      contact_id: o.contact_id,
      contact_name: o.contact_name,
      occasion_name: o.name,
      next_date: nextDate,
      years_count: yearsCount,
    });
  }

  for (const c of contacts) {
    if (!c.birthday) continue;
    const start = new Date(c.birthday);
    if (isNaN(start.getTime())) continue;
    const nextDate = nextYearlyDate(start, today);
    if (!nextDate || nextDate > cutoff) continue;
    const age = nextDate.getFullYear() - start.getFullYear();
    items.push({ type: 'birthday', contact_id: c.id, contact_name: c.name, occasion_name: 'Birthday', next_date: nextDate, years_count: age });
  }

  for (const c of contacts) {
    if (!c.died_on) continue;
    const start = new Date(c.died_on);
    if (isNaN(start.getTime())) continue;
    const nextDate = nextYearlyDate(start, today);
    if (!nextDate || nextDate > cutoff) continue;
    const years = nextDate.getFullYear() - start.getFullYear();
    items.push({ type: 'remembrance', contact_id: c.id, contact_name: c.name, occasion_name: 'Remembrance', next_date: nextDate, years_count: years });
  }

  items.sort((a, b) => a.next_date - b.next_date);
  return items;
}

function render() {
  _items = computeItems(_rawOccasions, _contacts);

  const showBirthdays   = document.getElementById('cbBirthdays').checked;
  const showOccasions   = document.getElementById('cbOccasions').checked;
  const showRemembrance = document.getElementById('cbRemembrance').checked;

  const filtered = _items.filter(item => {
    if (item.type === 'birthday') return showBirthdays;
    if (item.type === 'remembrance') return showRemembrance;
    return showOccasions;
  });

  const container = document.getElementById('listContainer');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state">No upcoming occasions in this window.</div>';
    return;
  }

  const today = new Date();
  today.setHours(0,0,0,0);

  const byMonth = new Map();
  for (const item of filtered) {
    const key = `${item.next_date.getFullYear()}-${item.next_date.getMonth()}`;
    if (!byMonth.has(key)) byMonth.set(key, { label: `${MONTHS_FULL[item.next_date.getMonth()]} ${item.next_date.getFullYear()}`, items: [] });
    byMonth.get(key).items.push(item);
  }

  let html = '';
  for (const [, group] of byMonth) {
    html += `<div class="section-label">${esc(group.label)}</div>`;
    for (const item of group.items) {
      const days = daysUntil(item.next_date, today);
      const daysText = days === 0 ? 'Today!' : days === 1 ? 'Tomorrow' : `In ${days} days`;
      const daysClass = days <= 7 ? 'soon' : 'upcoming';
      const dateDisplay = `${item.next_date.getDate()} ${MONTHS[item.next_date.getMonth()]}`;
      const isActive = item.contact_id === _activeContactId;

      let icon, yearsText = '';
      if (item.type === 'birthday') { icon = '🎂'; yearsText = item.years_count ? `Turns ${item.years_count}` : ''; }
      else if (item.type === 'remembrance') { icon = '🕯'; yearsText = item.years_count ? `${ordinal(item.years_count)} anniversary` : ''; }
      else if (item.type === 'milestone') { icon = '⭐'; yearsText = item.years_count ? `${ordinal(item.years_count)} milestone` : ''; }
      else { icon = '✨'; yearsText = item.years_count ? `${ordinal(item.years_count)} year` : ''; }

      html += `
        <div class="occasion-card ${item.type}${isActive ? ' active' : ''}" data-contact-id="${item.contact_id}" onclick="openContact(${item.contact_id})" ondblclick="forceOpenContact(${item.contact_id})">
          <div class="oc-icon">${icon}</div>
          <div class="oc-main">
            <div class="oc-occasion">${esc(item.occasion_name)}</div>
            <div class="oc-contact">${esc(item.contact_name || 'Unknown')}</div>
            ${yearsText ? `<div class="oc-years">${esc(yearsText)}</div>` : ''}
          </div>
          <div class="oc-date-col">
            <div class="oc-date">${dateDisplay}</div>
            <div class="oc-days ${daysClass}">${daysText}</div>
          </div>
          <div class="oc-action">
            <a class="btn-loveogram" href="/?contact=${item.contact_id}" onclick="event.stopPropagation()">Send Loveogram</a>
          </div>
        </div>
      `;
    }
  }
  container.innerHTML = html;
}

let _rawOccasions = [];

async function load() {
  const res = await fetch('/api/occasions/upcoming');
  const data = await res.json();
  _rawOccasions = data.occasions || [];
  _contacts = data.contacts || [];
  render();
}

// ── Open contact in floating overlay ─────────────────────────────────────────
function openContact(id) {
  _activeContactId = id;
  document.querySelectorAll('.occasion-card').forEach(el => {
    el.classList.toggle('active', el.dataset.contactId === String(id));
  });
  const fo = document.getElementById('foDetail');
  if (fo.classList.contains('fo-open') || fo.classList.contains('mob-open')) CP.open(id);
  _updateMobileDetailBtn();
}

function forceOpenContact(id) {
  _activeContactId = id;
  document.querySelectorAll('.occasion-card').forEach(el => {
    el.classList.toggle('active', el.dataset.contactId === String(id));
  });
  openDetail(id);
}

// ── Floating overlay helpers ──────────────────────────────────────────────────
function showFilters() {
  document.getElementById('foFilters').classList.remove('fo-hidden');
  document.getElementById('foShowFilters').style.display = 'none';
  localStorage.setItem('ts_filters_v', 'visible');
}
function hideFilters() {
  document.getElementById('foFilters').classList.add('fo-hidden');
  document.getElementById('foShowFilters').style.display = 'flex';
  localStorage.setItem('ts_filters_v', 'hidden');
}
function initOverlays() {
  if (localStorage.getItem('ts_filters_v') === 'hidden') hideFilters();
}

function openDetail(id) {
  _activeContactId = id;
  document.getElementById('foDetail').classList.add('fo-open');
  CP.open(id);
  _updateMobileDetailBtn();
}
function hideDetail() {
  document.getElementById('foDetail').classList.remove('fo-open');
  document.getElementById('foDetail').classList.remove('mob-open');
  document.getElementById('foBackdrop').classList.remove('mob-open');
  document.querySelectorAll('.mob-btn').forEach(b => b.classList.remove('active'));
  CP.close();
  _updateMobileDetailBtn();
}
function _updateMobileDetailBtn() {
  const btn = document.getElementById('mobDetailBtn');
  if (btn) btn.disabled = !_activeContactId;
}

function toggleMobileFilters() {
  const fo = document.getElementById('foFilters');
  const bd = document.getElementById('foBackdrop');
  const btn = document.getElementById('mobFiltersBtn');
  const isOpen = fo.classList.contains('mob-open');
  closeMobileOverlays();
  if (!isOpen) { fo.classList.add('mob-open'); bd.classList.add('mob-open'); btn.classList.add('active'); }
}
function toggleMobileDetail() {
  if (!_activeContactId) return;
  const fo = document.getElementById('foDetail');
  const bd = document.getElementById('foBackdrop');
  const btn = document.getElementById('mobDetailBtn');
  const isOpen = fo.classList.contains('mob-open');
  closeMobileOverlays();
  if (!isOpen) {
    fo.classList.add('mob-open');
    bd.classList.add('mob-open');
    btn.classList.add('active');
    CP.open(_activeContactId);
  }
}
function closeMobileOverlays() {
  document.getElementById('foFilters').classList.remove('mob-open');
  document.getElementById('foDetail').classList.remove('mob-open');
  document.getElementById('foBackdrop').classList.remove('mob-open');
  document.querySelectorAll('.mob-btn').forEach(b => b.classList.remove('active'));
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeMobileOverlays(); hideDetail(); } });

// ── Nav auth ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

NavBar.init({ requireAuth: true }).then(async (status) => {
  if (!status) return;
  try {
    const [, groupsRes, relTypesRes] = await Promise.all([
      load(),
      fetch('/api/groups'),
      fetch('/api/relationship-types'),
    ]);
    _allGroups = groupsRes.ok ? await groupsRes.json() : [];
    _relTypes  = relTypesRes.ok ? await relTypesRes.json() : [];

    CP.init('cpContainer');
    CP.contacts  = _contacts;
    CP.allGroups = _allGroups;
    CP.relTypes  = _relTypes;
    CP.onSaved = (updated) => {
      const c = _contacts.find(x => x.id === updated.id);
      if (c) Object.assign(c, updated);
    };

    initOverlays();
  } catch { window.location.href = '/login'; }
});
</script>
</body>
</html>
