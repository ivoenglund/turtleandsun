<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contacts — Turtle and Sun</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:#FFF9E6;color:#1C0A00;display:flex;flex-direction:column;}

.nav-bar{background:#FFF9E6;border-bottom:1px solid rgba(28,10,0,0.08);flex-shrink:0;}
.nav-wrap{max-width:1200px;margin:0 auto;padding:0 32px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0 18px;}
.nav a img{height:72px;width:auto;margin-top:-42px;display:block;}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:#1C0A00;text-decoration:none;opacity:0.7;}
.nav-links a:hover{opacity:1;}
.nav-account-wrap{position:relative;}
.nav-account-btn{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:#1C0A00;text-decoration:none;opacity:0.7;cursor:pointer;background:none;border:none;padding:0;}
.nav-account-btn:hover{opacity:1;}
#accountDropdown{visibility:hidden;opacity:0;transform:translateY(-6px);transition:opacity 0.15s,transform 0.15s,visibility 0s 0.15s;position:absolute;top:calc(100% + 10px);right:0;background:#fff;border-radius:12px;box-shadow:0 8px 36px rgba(0,0,0,0.16);padding:14px 18px;width:220px;z-index:300;}
#accountDropdown.open{visibility:visible;opacity:1;transform:translateY(0);transition:opacity 0.15s,transform 0.15s,visibility 0s 0s;}
.dd-user-email{font-size:11px;color:rgba(60,20,0,0.5);padding-bottom:8px;border-bottom:1px solid #f0ede6;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dd-nav-link{display:block;padding:6px 0;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;color:#1C0A00;text-decoration:none;opacity:0.75;}
.dd-nav-link:hover{opacity:1;color:#3A6B20;}
.dd-nav-logout{color:#c0392b !important;opacity:1 !important;}
.dd-nav-sep{height:1px;background:rgba(28,10,0,0.07);margin:6px 0;}

#syncBanner{display:none;padding:10px 32px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;flex-shrink:0;}
#syncBanner.ok{background:#e8f0e0;color:#2d5a16;}
#syncBanner.err{background:#fdecea;color:#c0392b;}

/* ── Three-column layout ──────────────────────────────────────────── */
.three-col{flex:1;min-height:0;display:flex;overflow:hidden;}

.panel-left{display:flex;flex-direction:row;width:220px;flex-shrink:0;overflow:hidden;transition:width 0.2s ease;border-right:1px solid rgba(28,10,0,0.08);background:#fff;}
.panel-left.collapsed{width:28px;}
.pl-body{flex:1;display:flex;flex-direction:column;min-width:160px;overflow:hidden;}
.pl-header{padding:14px 0 6px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:rgba(28,10,0,0.35);flex-shrink:0;}
.pl-scroll{flex:1;overflow-y:auto;padding:4px 8px 16px 14px;}
.pl-toggle{width:28px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:12px;cursor:pointer;border-left:1px solid rgba(28,10,0,0.06);color:rgba(28,10,0,0.3);user-select:none;font-size:14px;transition:color 0.1s,background 0.1s;}
.pl-toggle:hover{color:#3A6B20;background:#f9f7f2;}
.panel-left.collapsed .pl-toggle{border-left:none;}

.panel-center{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}

.panel-right{display:flex;flex-direction:row-reverse;width:380px;flex-shrink:0;overflow:hidden;transition:width 0.2s ease;border-left:1px solid rgba(28,10,0,0.08);background:#FFF9E6;}
.panel-right.collapsed{width:28px;}
.pr-body{flex:1;min-width:160px;display:flex;flex-direction:column;overflow:hidden;}
.pr-toggle{width:28px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:12px;cursor:pointer;border-right:1px solid rgba(28,10,0,0.06);color:rgba(28,10,0,0.3);user-select:none;font-size:14px;transition:color 0.1s,background 0.1s;}
.pr-toggle:hover{color:#3A6B20;background:#f9f7f2;}
.panel-right.collapsed .pr-toggle{border-right:none;}

/* Resize handles */
.panel-resize-handle{width:4px;flex-shrink:0;cursor:ew-resize;background:transparent;transition:background 0.15s;}
.panel-resize-handle:hover,.panel-resize-handle.dragging{background:rgba(58,107,32,0.22);}
.panel-left.collapsed .panel-resize-handle,.panel-right.collapsed .panel-resize-handle{display:none;}

/* Filter panel items */
.fp-item{display:flex;align-items:center;gap:5px;padding:4px 0;cursor:pointer;user-select:none;}
.fp-item label{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:#1C0A00;cursor:pointer;display:flex;align-items:center;gap:5px;}
.fp-item input[type=checkbox]{width:13px;height:13px;accent-color:#3A6B20;cursor:pointer;flex-shrink:0;}
.fp-sub label{padding-left:10px;font-size:11px;opacity:0.85;}
.fp-sub2 label{padding-left:20px;font-size:11px;opacity:0.7;}
.fp-sep{height:1px;background:rgba(28,10,0,0.07);margin:8px 0;}

/* List (center panel) */
.list-toolbar{padding:12px 14px;border-bottom:1px solid rgba(28,10,0,0.07);display:flex;flex-direction:column;gap:8px;flex-shrink:0;background:#fff;}
.search-input{width:100%;padding:8px 12px;border:1.5px solid #e0dcd4;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;color:#1C0A00;background:#f9f7f2;outline:none;}
.search-input:focus{border-color:#3A6B20;background:#fff;}
.list-actions{display:flex;gap:6px;}
.btn-add-ph{flex:1;padding:7px 10px;background:transparent;border:1.5px dashed rgba(28,10,0,0.18);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;color:rgba(28,10,0,0.45);cursor:pointer;text-align:center;}
.btn-add-ph:hover{border-color:#3A6B20;color:#3A6B20;}
.btn-manage-groups{flex:1;padding:7px 10px;background:#f0ede6;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;color:rgba(28,10,0,0.6);cursor:pointer;text-align:center;}
.btn-manage-groups:hover{background:#e0dcd4;color:#1C0A00;}
.contact-list{flex:1;overflow-y:auto;}
.contact-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(28,10,0,0.05);transition:background 0.1s;}
.contact-item:hover{background:#f9f7f2;}
.contact-item.active{background:#e8f0e0;}
.ci-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-email{font-size:12px;color:rgba(28,10,0,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.ci-bday{font-size:11px;color:rgba(28,10,0,0.32);margin-top:2px;}
.ci-ph{display:inline-block;font-size:10px;background:#f0ede6;color:rgba(28,10,0,0.4);padding:1px 5px;border-radius:6px;font-weight:700;margin-left:4px;vertical-align:middle;}
.ci-deceased{display:inline-block;font-size:10px;background:#f0ede6;color:rgba(28,10,0,0.4);padding:1px 5px;border-radius:6px;font-weight:700;margin-left:4px;vertical-align:middle;}
.ci-me{display:inline-block;font-size:10px;background:#e8f0e0;color:#3A6B20;padding:1px 5px;border-radius:6px;font-weight:700;margin-left:4px;vertical-align:middle;}
.list-empty{padding:32px 16px;text-align:center;font-size:13px;color:rgba(28,10,0,0.3);line-height:1.7;}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.32);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:14px;padding:28px 32px;width:380px;max-width:95vw;box-shadow:0 12px 48px rgba(0,0,0,0.18);max-height:80vh;display:flex;flex-direction:column;}
.modal-box h3{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;margin-bottom:4px;}
.modal-box p{font-size:13px;color:rgba(28,10,0,0.6);margin-bottom:16px;line-height:1.5;}
.modal-box input{width:100%;padding:9px 12px;border:1.5px solid #e0dcd4;border-radius:7px;font-size:14px;font-family:'DM Sans';outline:none;margin-bottom:10px;}
.modal-box input:focus{border-color:#3A6B20;}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{flex:1;padding:9px;border:none;border-radius:7px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-modal-cancel{background:#f0ede6;color:#1C0A00;}
.btn-modal-confirm{background:#3A6B20;color:#fff;}
.btn-modal-cancel:hover{background:#e0dcd4;}
.btn-modal-confirm:hover{background:#1C0A00;}
.groups-mgr-list{flex:1;overflow-y:auto;margin-bottom:14px;}
.groups-mgr-item{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid #f0ede6;}
.groups-mgr-item:last-child{border-bottom:none;}
.groups-mgr-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:#1C0A00;}
.groups-mgr-lock{font-size:11px;color:rgba(28,10,0,0.35);margin-left:6px;}
.groups-mgr-sub{padding-left:22px;background:#faf8f5;}
.groups-mgr-sub .groups-mgr-name{font-size:12px;color:rgba(28,10,0,0.7);}
.add-group-row{display:flex;gap:8px;margin-bottom:14px;}
.add-group-row input{flex:1;padding:8px 12px;border:1.5px solid #e0dcd4;border-radius:7px;font-size:13px;font-family:'DM Sans';outline:none;}
.add-group-row input:focus{border-color:#3A6B20;}
.btn-add-group{padding:8px 14px;background:#3A6B20;color:#fff;border:none;border-radius:7px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-add-group:hover{background:#1C0A00;}
.btn-add-sub{padding:3px 8px;background:#f0ede6;border:1px solid #e0dcd4;border-radius:5px;font-size:11px;cursor:pointer;color:rgba(28,10,0,0.6);font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;white-space:nowrap;}
.btn-add-sub:hover{border-color:#3A6B20;color:#3A6B20;}
.btn-del{padding:3px 9px;background:none;border:1px solid #e0dcd4;border-radius:5px;font-size:11px;cursor:pointer;color:rgba(28,10,0,0.42);font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;}
.btn-del:hover{border-color:#c0392b;color:#c0392b;}

/* Mobile */
.mobile-backdrop{display:none;}
@media(max-width:1000px){
  .three-col{position:relative;}
  .panel-left{position:absolute;top:0;bottom:0;left:0;z-index:50;width:28px !important;box-shadow:none;transition:width 0.22s ease,box-shadow 0.22s;}
  .panel-left.mobile-open{width:260px !important;box-shadow:4px 0 20px rgba(0,0,0,0.13);}
  .panel-right{position:absolute;top:0;bottom:0;right:0;z-index:50;width:28px !important;transition:width 0.22s ease,box-shadow 0.22s;}
  .panel-right.mobile-open{width:340px !important;box-shadow:-4px 0 20px rgba(0,0,0,0.13);}
  .panel-center{padding:0 28px;}
  .mobile-backdrop{display:block;position:absolute;inset:0;background:rgba(0,0,0,0.25);z-index:49;pointer-events:none;opacity:0;transition:opacity 0.2s;}
  .mobile-backdrop.open{pointer-events:auto;opacity:1;}
  .panel-resize-handle{display:none;}
}
@media(min-width:1001px){
  .panel-left.collapsed,.panel-right.collapsed{transition:width 0.2s ease;}
}
</style>
</head>
<body>

<div class="nav-bar">
  <div class="nav-wrap">
    <div class="nav">
      <a href="/"><img src="/logo.png" alt="Turtle and Sun"></a>
      <div class="nav-links">
        <a href="/">Home</a><a href="/pricing">Pricing</a><a href="/faq">FAQ</a>
        <span class="nav-account-wrap">
          <button class="nav-account-btn" onclick="handleAccountClick(event)">Account</button>
          <div id="accountDropdown">
            <div class="dd-user-email" id="ddUserEmail"></div>
            <a class="dd-nav-link" href="/account/contacts">Contacts</a>
            <div class="dd-nav-sep"></div>
            <a class="dd-nav-link" href="/account/network?view=network">Network</a>
            <a class="dd-nav-link" href="/account/network?view=outline">Outline</a>
            <a class="dd-nav-link" href="/account/network?view=calendar">Calendar</a>
            <a class="dd-nav-link" href="/account/occasions">Occasions</a>
            <div class="dd-nav-sep"></div>
            <a class="dd-nav-link" href="/auth/google/contacts">↻ Sync Google contacts</a>
            <a class="dd-nav-link" href="/account">Account settings</a>
            <a class="dd-nav-link dd-nav-logout" href="/auth/logout">Log out</a>

        </span>
      </div>
    </div>
  </div>
</div>

<div id="syncBanner"></div>

<div class="three-col">

  <!-- LEFT: Filters -->
  <div class="panel-left" id="panelLeft">
    <div class="pl-body">
      <div class="pl-header">Filters</div>
      <div class="pl-scroll" id="leftFilterContent"></div>
    </div>
    <div class="panel-resize-handle" id="leftResizeHandle"></div>
    <div class="pl-toggle" onclick="togglePanel('left')" title="Toggle filters">
      <span id="plArrow">‹</span>
    </div>
  </div>

  <!-- CENTER: Contact list -->
  <div class="panel-center">
    <div class="list-toolbar">
      <input class="search-input" id="searchInput" type="text" placeholder="Search contacts…" oninput="applyContactFilter()">
      <div class="list-actions">
        <button class="btn-add-ph" onclick="openPlaceholderModal()">+ Add person</button>
        <button class="btn-manage-groups" onclick="openGroupsModal()">⚙ Groups</button>
      </div>
    </div>
    <div class="contact-list" id="contactList">
      <div class="list-empty">Loading…</div>
    </div>
  </div>

  <!-- RIGHT: Detail (shared CP component) -->
  <div class="panel-right" id="panelRight">
    <div class="pr-toggle" onclick="togglePanel('right')" title="Toggle detail">
      <span id="prArrow">›</span>
    </div>
    <div class="panel-resize-handle" id="rightResizeHandle"></div>
    <div class="pr-body">
      <div id="cpContainer" style="display:flex;flex-direction:column;flex:1;overflow:hidden;"></div>
    </div>
  </div>

  <div class="mobile-backdrop" id="mobileBackdrop" onclick="closeMobileOverlays()"></div>
</div>

<!-- Add person modal -->
<div class="modal-overlay" id="phModal" onclick="modalOverlayClick(event,'phModal')">
  <div class="modal-box">
    <h3>Add person manually</h3>
    <p>Add someone who isn't in your Google contacts yet.</p>
    <input type="text" id="phName" placeholder="Full name" onkeydown="if(event.key==='Enter')confirmPlaceholder()">
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closePlaceholderModal()">Cancel</button>
      <button class="btn-modal-confirm" onclick="confirmPlaceholder()">Add</button>
    </div>
  </div>
</div>

<!-- Manage groups modal -->
<div class="modal-overlay" id="groupsModal" onclick="modalOverlayClick(event,'groupsModal')">
  <div class="modal-box">
    <h3>Manage Groups</h3>
    <p>Family is a system group and cannot be deleted.</p>
    <div class="add-group-row">
      <input type="text" id="newGroupName" placeholder="New group name" onkeydown="if(event.key==='Enter')addGroup()">
      <button class="btn-add-group" onclick="addGroup()">Add group</button>
    </div>
    <div class="groups-mgr-list" id="groupsMgrList">Loading…</div>
    <div class="modal-btns">
      <button class="btn-modal-confirm" onclick="closeGroupsModal()">Done</button>
    </div>
  </div>
</div>

<script src="/contact-panel.js"></script>
<script>
let _contacts = [];
let _currentId = null;
let _allGroups = [];
let _relTypes = [];
let _contactGroupMap = {};
let _allGroupsById = {};

// ── Sync banner ───────────────────────────────────────────────────────────────
(function() {
  const p = new URLSearchParams(location.search);
  const banner = document.getElementById('syncBanner');
  if (p.get('synced') !== null) {
    const n = parseInt(p.get('synced'), 10);
    banner.className = 'ok';
    banner.textContent = `✓ Synced ${n} contact${n !== 1 ? 's' : ''} from Google.`;
    banner.style.display = 'block';
  } else if (p.get('error')) {
    banner.className = 'err';
    banner.textContent = p.get('error') === 'cancelled' ? 'Google sign-in was cancelled.' : 'Failed to sync contacts. Please try again.';
    banner.style.display = 'block';
  }
  if (p.get('synced') !== null || p.get('error')) history.replaceState(null, '', '/account/contacts');
})();

// ── Panel collapse/expand ─────────────────────────────────────────────────────
const LS_LEFT = 'ts_panel_left', LS_RIGHT = 'ts_panel_right';

function initPanels() {
  if (localStorage.getItem(LS_LEFT) === 'collapsed') _setPanelCollapsed('left', true);
  if (localStorage.getItem(LS_RIGHT) === 'collapsed') _setPanelCollapsed('right', true);
}

function _setPanelCollapsed(side, collapsed) {
  const el = document.getElementById(side === 'left' ? 'panelLeft' : 'panelRight');
  const arrow = document.getElementById(side === 'left' ? 'plArrow' : 'prArrow');
  el.classList.toggle('collapsed', collapsed);
  if (side === 'left') arrow.textContent = collapsed ? '›' : '‹';
  else arrow.textContent = collapsed ? '‹' : '›';
  localStorage.setItem(side === 'left' ? LS_LEFT : LS_RIGHT, collapsed ? 'collapsed' : 'expanded');
}

function togglePanel(side) {
  const el = document.getElementById(side === 'left' ? 'panelLeft' : 'panelRight');
  if (window.innerWidth <= 1000) {
    const open = el.classList.contains('mobile-open');
    el.classList.toggle('mobile-open', !open);
    document.getElementById('mobileBackdrop').classList.toggle('open', !open);
  } else {
    _setPanelCollapsed(side, !el.classList.contains('collapsed'));
  }
}

function closeMobileOverlays() {
  document.getElementById('panelLeft').classList.remove('mobile-open');
  document.getElementById('panelRight').classList.remove('mobile-open');
  document.getElementById('mobileBackdrop').classList.remove('open');
}

// ── Resize handles ────────────────────────────────────────────────────────────
function initResizeHandle(handleId, panelId, storageKey, isRight) {
  const handle = document.getElementById(handleId);
  const panel = document.getElementById(panelId);
  if (!handle || !panel) return;
  const saved = localStorage.getItem(storageKey);
  if (saved) panel.style.width = saved + 'px';
  let startX, startW;
  handle.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = panel.offsetWidth;
    panel.style.transition = 'none';
    handle.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
  function onMove(e) {
    const delta = isRight ? startX - e.clientX : e.clientX - startX;
    panel.style.width = Math.min(550, Math.max(160, startW + delta)) + 'px';
  }
  function onUp(e) {
    const delta = isRight ? startX - e.clientX : e.clientX - startX;
    localStorage.setItem(storageKey, Math.min(550, Math.max(160, startW + delta)));
    panel.style.transition = '';
    handle.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
}

// ── Filter panel ──────────────────────────────────────────────────────────────
async function loadGroupMemberships() {
  const res = await fetch('/api/group-memberships');
  if (!res.ok) return;
  const memberships = await res.json();
  _allGroupsById = {};
  function flattenTree(g, parentId) {
    _allGroupsById[g.id] = { id: g.id, name: g.name, parent_group_id: parentId };
    (g.subgroups || []).forEach(s => flattenTree(s, g.id));
  }
  _allGroups.forEach(g => flattenTree(g, null));
  _contactGroupMap = {};
  memberships.forEach(m => {
    if (!_contactGroupMap[m.contact_id]) _contactGroupMap[m.contact_id] = new Set();
    let gid = m.group_id;
    while (gid) {
      _contactGroupMap[m.contact_id].add(gid);
      const g = _allGroupsById[gid];
      gid = g ? g.parent_group_id : null;
    }
  });
}

function renderFilterPanel() {
  function renderEntry(g, depth, parentId) {
    const cls = depth === 0 ? '' : depth === 1 ? ' fp-sub' : ' fp-sub2';
    const parentAttr = parentId != null ? ` data-parent-id="${parentId}"` : '';
    let html = `<div class="fp-item${cls}"><label>
      <input type="checkbox" data-group-id="${g.id}"${parentAttr} checked onchange="filterPanelToggle(this)">
      ${esc(g.name)}
    </label></div>`;
    (g.subgroups || []).forEach(s => { html += renderEntry(s, depth + 1, g.id); });
    return html;
  }
  let html = _allGroups.map(g => renderEntry(g, 0, null)).join('');
  html += `<div class="fp-sep"></div>
    <div class="fp-item"><label>
      <input type="checkbox" id="cb-living-contacts" onchange="applyContactFilter()">
      Only living
    </label></div>`;
  document.getElementById('leftFilterContent').innerHTML = html;
}

function filterPanelToggle(cb) {
  const gid = parseInt(cb.dataset.groupId);
  const cascade = (id, checked) => {
    document.querySelectorAll(`#leftFilterContent input[data-parent-id="${id}"]`)
      .forEach(c => { c.checked = checked; cascade(parseInt(c.dataset.groupId), checked); });
  };
  cascade(gid, cb.checked);
  applyContactFilter();
}

function applyContactFilter() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const showLiving = document.getElementById('cb-living-contacts') && document.getElementById('cb-living-contacts').checked;
  const allCbs = [...document.querySelectorAll('#leftFilterContent input[data-group-id]')];
  const allChecked = !allCbs.length || allCbs.every(cb => cb.checked);
  const activeIds = allChecked ? null : new Set(allCbs.filter(cb => cb.checked).map(cb => parseInt(cb.dataset.groupId)));
  renderList(_contacts.filter(c => {
    if (c.is_me) return true;
    if (q && !(c.name || '').toLowerCase().includes(q) && !(c.email || '').toLowerCase().includes(q)) return false;
    if (showLiving && c.died_on) return false;
    if (activeIds) {
      const cg = _contactGroupMap[c.id];
      if (!cg || ![...activeIds].some(id => cg.has(id))) return false;
    }
    return true;
  }));
}

// ── Contacts list ─────────────────────────────────────────────────────────────
async function loadContacts() {
  const res = await fetch('/api/contacts');
  if (res.status === 401) { window.location.href = '/login'; return; }
  _contacts = await res.json();
  renderList(_contacts);
}

async function loadGroups() {
  const res = await fetch('/api/groups');
  if (res.ok) _allGroups = await res.json();
}

async function loadRelTypes() {
  const res = await fetch('/api/relationship-types');
  if (res.ok) _relTypes = await res.json();
}

function renderList(contacts) {
  const el = document.getElementById('contactList');
  if (!contacts.length) {
    el.innerHTML = '<div class="list-empty">No contacts match the current filters.</div>';
    return;
  }
  el.innerHTML = contacts.map(c => `
    <div class="contact-item${_currentId === c.id ? ' active' : ''}" onclick="selectContact(${c.id})" data-id="${c.id}">
      <div class="ci-name">${c.is_pet ? '🐾 ' : ''}${esc(c.name || 'Unnamed')}${c.is_me ? '<span class="ci-me">Me</span>' : ''}${c.is_placeholder ? '<span class="ci-ph">manual</span>' : ''}${c.died_on ? '<span class="ci-deceased">†</span>' : ''}</div>
      ${c.email ? `<div class="ci-email">${esc(c.email)}</div>` : ''}
      ${c.birthday ? `<div class="ci-bday">${esc(c.birthday)}</div>` : ''}
    </div>
  `).join('');
}

// ── Select contact ────────────────────────────────────────────────────────────
function selectContact(id) {
  _currentId = id;
  document.querySelectorAll('.contact-item').forEach(el => el.classList.toggle('active', +el.dataset.id === id));
  if (window.innerWidth <= 1000) {
    document.getElementById('panelRight').classList.add('mobile-open');
    document.getElementById('mobileBackdrop').classList.add('open');
  } else {
    const pr = document.getElementById('panelRight');
    if (pr.classList.contains('collapsed')) _setPanelCollapsed('right', false);
  }
  CP.open(id);
}

// ── Manage groups modal ───────────────────────────────────────────────────────
function openGroupsModal() {
  document.getElementById('newGroupName').value = '';
  renderGroupsMgr();
  document.getElementById('groupsModal').classList.add('open');
}
function closeGroupsModal() { document.getElementById('groupsModal').classList.remove('open'); }

function renderGroupsMgr() {
  const el = document.getElementById('groupsMgrList');
  if (!_allGroups.length) { el.innerHTML = '<div style="font-size:13px;color:rgba(28,10,0,0.4);padding:8px 0;">No groups yet.</div>'; return; }
  el.innerHTML = _allGroups.map(g => {
    const isFamily = g.name === 'Family';
    let html = `<div class="groups-mgr-item">
      <span class="groups-mgr-name">${esc(g.name)}${isFamily ? '<span class="groups-mgr-lock">🔒 system</span>' : ''}</span>
      <div style="display:flex;gap:4px;align-items:center;">
        ${isFamily ? '' : `<button class="btn-add-sub" onclick="openAddSubgroupModal(${g.id},${JSON.stringify(g.name)})">+ Sub</button>`}
        ${isFamily ? '' : `<button class="btn-del" onclick="deleteGroup(${g.id})">Remove</button>`}
      </div></div>`;
    if (g.subgroups && g.subgroups.length) {
      g.subgroups.forEach(s => {
        html += `<div class="groups-mgr-item groups-mgr-sub">
          <span class="groups-mgr-name">↳ ${esc(s.name)}</span>
          <button class="btn-del" onclick="deleteGroup(${s.id},true)">Remove</button>
        </div>`;
      });
    }
    return html;
  }).join('');
}

async function addGroup() {
  const name = document.getElementById('newGroupName').value.trim();
  if (!name) return;
  const res = await fetch('/api/groups', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
  if (res.ok) {
    const g = await res.json();
    _allGroups.push({ id: g.id, name: g.name, subgroups: [] });
    _allGroups.sort((a, b) => a.name === 'Family' ? -1 : b.name === 'Family' ? 1 : a.name.localeCompare(b.name));
    document.getElementById('newGroupName').value = '';
    CP.allGroups = _allGroups;
    renderGroupsMgr();
    renderFilterPanel();
    if (CP.currentId) CP.open(CP.currentId);
  }
}

async function openAddSubgroupModal(parentId, parentName) {
  const name = prompt(`New subgroup under "${parentName}":`);
  if (!name || !name.trim()) return;
  const res = await fetch('/api/groups', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name.trim(), parent_group_id: parentId }) });
  if (res.ok) {
    const g = await res.json();
    const parent = _allGroups.find(p => p.id === parentId);
    if (parent) { if (!parent.subgroups) parent.subgroups = []; parent.subgroups.push({ id: g.id, name: g.name, subgroups: [] }); parent.subgroups.sort((a, b) => a.name.localeCompare(b.name)); }
    CP.allGroups = _allGroups;
    renderGroupsMgr();
    renderFilterPanel();
    if (CP.currentId) CP.open(CP.currentId);
  } else { const d = await res.json(); alert(d.error || 'Failed to create subgroup.'); }
}

async function deleteGroup(id, isSubgroup = false) {
  const res = await fetch(`/api/groups/${id}`, { method: 'DELETE' });
  if (res.ok) {
    if (isSubgroup) { for (const g of _allGroups) { if (g.subgroups) g.subgroups = g.subgroups.filter(s => s.id !== id); } }
    else _allGroups = _allGroups.filter(g => g.id !== id);
    CP.allGroups = _allGroups;
    renderGroupsMgr();
    renderFilterPanel();
    if (CP.currentId) CP.open(CP.currentId);
  }
}

// ── Placeholder modal ─────────────────────────────────────────────────────────
function openPlaceholderModal() {
  document.getElementById('phName').value = '';
  document.getElementById('phModal').classList.add('open');
  setTimeout(() => document.getElementById('phName').focus(), 50);
}
function closePlaceholderModal() { document.getElementById('phModal').classList.remove('open'); }
function modalOverlayClick(e, id) { if (e.target === e.currentTarget) document.getElementById(id).classList.remove('open'); }
async function confirmPlaceholder() {
  const name = document.getElementById('phName').value.trim();
  if (!name) return;
  closePlaceholderModal();
  const res = await fetch('/api/contacts/placeholder', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
  if (res.ok) { const { id } = await res.json(); await loadContacts(); selectContact(id); }
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function handleAccountClick(e) {
  e.stopPropagation();
  document.getElementById('accountDropdown').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  const dd = document.getElementById('accountDropdown');
  const wrap = document.querySelector('.nav-account-wrap');
  if (dd && wrap && dd.classList.contains('open') && !wrap.contains(e.target)) dd.classList.remove('open');
});

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function initAuthNav() {
  try {
    const res = await fetch('/api/auth/status');
    const status = res.ok ? await res.json() : false;
    if (!status || !status.loggedIn) { window.location.href = '/login'; return; }
    document.getElementById('ddUserEmail').textContent = status.email;
    await Promise.all([loadContacts(), loadGroups(), loadRelTypes()]);
    await loadGroupMemberships();

    CP.init('cpContainer');
    CP.contacts = _contacts;
    CP.allGroups = _allGroups;
    CP.relTypes = _relTypes;
    CP.onSaved = (updated) => {
      const c = _contacts.find(x => x.id === updated.id);
      if (c) Object.assign(c, updated);
      applyContactFilter();
    };

    renderFilterPanel();
    initPanels();
    initResizeHandle('leftResizeHandle', 'panelLeft', 'ts_left_w', false);
    initResizeHandle('rightResizeHandle', 'panelRight', 'ts_right_w', true);

    const urlId = new URLSearchParams(location.search).get('id');
    if (urlId) { history.replaceState(null, '', '/account/contacts'); selectContact(+urlId); }
  } catch { window.location.href = '/login'; }
}

initAuthNav();
</script>
