<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Network — Turtle and Sun</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#fff;color:#1C0A00;display:flex;flex-direction:column;}

.nav-bar{background:#FFF9E6;border-bottom:1px solid rgba(28,10,0,0.08);flex-shrink:0;}
.nav-wrap{max-width:1200px;margin:0 auto;padding:0 32px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0 18px;}
.nav a img{height:72px;width:auto;margin-top:-42px;display:block;}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:#1C0A00;text-decoration:none;opacity:0.7;}
.nav-links a:hover{opacity:1;}

.top-bar{background:#FFF9E6;border-bottom:1px solid rgba(28,10,0,0.1);padding:10px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;flex-wrap:wrap;}
.top-bar h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;color:#1C0A00;}
.cb-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:1;min-width:0;}
.cb-label{display:flex;align-items:center;gap:5px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:#1C0A00;user-select:none;}
.cb-label input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#3A6B20;flex-shrink:0;}
.cb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cb-sub-label{padding-left:8px;opacity:0.88;}
.cb-sep{width:1px;height:14px;background:rgba(28,10,0,0.15);flex-shrink:0;}
.btn-back{padding:7px 16px;background:#3A6B20;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-back:hover{background:#1C0A00;}

#graph-container{flex:1;position:relative;overflow:hidden;background:#fff;}
#graph-svg{width:100%;height:100%;display:block;}

.tooltip{position:fixed;background:#1C0A00;color:#FFF9E6;padding:8px 12px;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity 0.12s;z-index:100;max-width:260px;line-height:1.4;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.tooltip.visible{opacity:1;}

.side-panel{position:fixed;top:0;right:-340px;width:320px;height:100%;background:#FFF9E6;box-shadow:-4px 0 24px rgba(0,0,0,0.12);transition:right 0.25s cubic-bezier(0.4,0,0.2,1);z-index:200;display:flex;flex-direction:column;}
.side-panel.open{right:0;}
.sp-header{padding:20px 20px 16px;border-bottom:1px solid rgba(28,10,0,0.08);display:flex;align-items:flex-start;justify-content:space-between;}
.sp-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800;color:#1C0A00;line-height:1.2;}
.sp-close{background:none;border:none;font-size:20px;cursor:pointer;color:rgba(28,10,0,0.4);padding:0;line-height:1;}
.sp-close:hover{color:#1C0A00;}
.sp-body{padding:16px 20px;flex:1;overflow-y:auto;}
.sp-field{margin-bottom:12px;}
.sp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:rgba(28,10,0,0.35);margin-bottom:3px;}
.sp-value{font-size:13px;color:#1C0A00;}
.sp-rels{margin-top:16px;}
.sp-rels-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:rgba(28,10,0,0.35);margin-bottom:8px;}
.sp-rel-item{font-size:12px;color:#1C0A00;padding:5px 0;border-bottom:1px solid rgba(28,10,0,0.06);}
.sp-rel-item:last-child{border-bottom:none;}
.sp-rel-name{font-weight:600;}
.sp-rel-type{color:rgba(28,10,0,0.5);margin-left:4px;}
.sp-footer{padding:16px 20px;border-top:1px solid rgba(28,10,0,0.08);}
.btn-view-full{display:block;width:100%;padding:10px;background:#3A6B20;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;}
.btn-view-full:hover{background:#1C0A00;}

#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:50;}
#loading p{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:rgba(28,10,0,0.4);}

.view-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(28,10,0,0.15);flex-shrink:0;}
.vtb{padding:6px 18px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;background:#fff;color:rgba(28,10,0,0.45);transition:background 0.15s,color 0.15s;}
.vtb.active{background:#3A6B20;color:#fff;}
.vtb:hover:not(.active){background:#f0ede6;color:#1C0A00;}

#outline-container{flex:1;overflow-y:auto;background:#fff;display:none;}
.outline-inner{max-width:760px;margin:0 auto;padding:24px 24px 100px;}
.ol-group{margin-bottom:10px;border-radius:10px;border:1px solid rgba(28,10,0,0.09);overflow:hidden;}
.ol-group-hdr{display:flex;align-items:center;gap:8px;padding:11px 16px;background:#f7f4ef;cursor:pointer;user-select:none;}
.ol-group-hdr:hover{background:#f0ede6;}
.ol-tri{font-size:9px;color:rgba(28,10,0,0.35);width:12px;text-align:center;transition:transform 0.15s;flex-shrink:0;}
.ol-group.ol-collapsed .ol-tri,.ol-sub.ol-collapsed .ol-tri{transform:rotate(-90deg);}
.ol-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ol-group-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:800;color:#1C0A00;flex:1;}
.ol-count{font-size:11px;color:rgba(28,10,0,0.35);flex-shrink:0;}
.ol-cb{width:14px;height:14px;cursor:pointer;accent-color:#3A6B20;flex-shrink:0;}
.ol-group-body{padding:4px 0;}
.ol-group.ol-collapsed .ol-group-body,.ol-sub.ol-collapsed .ol-sub-body{display:none;}
.ol-sub{margin:4px 16px 6px;border-radius:8px;border:1px solid rgba(28,10,0,0.07);overflow:hidden;}
.ol-sub-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fafaf8;cursor:pointer;user-select:none;}
.ol-sub-hdr:hover{background:#f5f2ea;}
.ol-sub-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:#1C0A00;flex:1;}
.ol-sub-body{padding:2px 0;}
.ol-row{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;border-bottom:1px solid rgba(28,10,0,0.04);}
.ol-row:last-child{border-bottom:none;}
.ol-row:hover{background:#FFF9E6;}
.ol-deceased .ol-row-name{color:#888;font-style:italic;}
.ol-row-cb{width:13px;height:13px;cursor:pointer;accent-color:#3A6B20;flex-shrink:0;}
.ol-row-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:#1C0A00;flex:1;min-width:0;}
.ol-row-meta{font-size:11px;color:rgba(28,10,0,0.4);flex-shrink:0;white-space:nowrap;}
#ol-bulk-bar{position:fixed;bottom:-64px;left:0;right:0;background:#1C0A00;color:#FFF9E6;padding:14px 24px;display:flex;align-items:center;justify-content:center;z-index:150;transition:bottom 0.2s;}
#ol-bulk-bar.visible{bottom:0;}
.btn-loveogram{padding:9px 24px;background:#c0195a;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-loveogram:hover{background:#9e1048;}
</style>

<div class="nav-bar">
  <div class="nav-wrap">
    <div class="nav">
      <a href="/"><img src="/logo.png" alt="Turtle and Sun"></a>
      <div class="nav-links">
        <a href="/">Home</a><a href="/pricing">Pricing</a><a href="/faq">FAQ</a>

<div class="top-bar">

      <div class="sp-value" id="spCity"></div>

      <div class="sp-rels-title">Relationships</div>
      <div id="spRels"></div>

    <a href="#" class="btn-view-full" id="spViewFull">View full record</a>
  </div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const PALETTE = ['#c0195a','#2a6b50','#1a5f8a','#b85e10','#6b2d9a','#1a8a6b','#8a4f1a','#1a3f8a','#4a8a1a'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const NW = 130, NH = 46, NRX = 10;
const GNW = 164, GNH = 60, GNRX = 14;
const SGW = 134, SGH = 44, SGRX = 11;  // subgroup hub size (smaller than top-level)
const ME_R = 26;
const FAMILY_COLOR = '#9e3a3a';

let _allNodes = [], _relLinks = [], _memberLinks = [], _contactMap = {};
let _nodeGroups = {};
let _groupNodeName = {};
let _contactGroupNames = {};
let _allGroupNames = [];
let GROUP_COLORS = {};
let _simulation, _svg, _g;
let _nodeSel, _groupNodeSel, _relLinkSel, _hitAreaSel, _memberLinkSel, _subgroupLinkSel;
let _width, _height;
let _subgroupIds = new Set();   // group IDs that are subgroups
let _subgroupParents = {};      // subgroupId → parentGroupId
let _rawGroups = [];
let _groupMembersMap = {};
let _groupByName = {};
let _groupById = {};
let _contactFamilyRelLabel = {};
let _currentView = 'network';
let _selectedContacts = new Set();
let _contactOccasions = {};  // contactId → [{ name, date, years }]
let _nodeHeights = {};        // contactId → computed pill height
const _today = new Date(); _today.setHours(0, 0, 0, 0);

function formatDate(str) {
  if (!str) return '';
  const p = (str.split('T')[0]).split('-');
  if (p.length < 3) return str;
  return `${parseInt(p[2], 10)} ${MONTHS[parseInt(p[1], 10) - 1] || p[1]} ${p[0]}`;
}
function formatBirthdayShort(str) {
  if (!str) return '';
  const p = (str.split('T')[0]).split('-');
  if (p.length < 3) return str;
  return `${parseInt(p[2], 10)} ${MONTHS[parseInt(p[1], 10) - 1] || p[1]}`;
}
function yearOf(str) { return str ? parseInt(str.split('-')[0]) : null; }

function truncate(s, n) { s = s || ''; return s.length > n ? s.slice(0, n - 1) + '…' : s; }
function cleanRel(s) { return (s || '').replace(/ of$/i, ''); }

function calcAge(birthdayStr, diedOnStr) {
  if (!birthdayStr) return null;
  const b = new Date(birthdayStr.split('T')[0]);
  const ref = diedOnStr ? new Date(diedOnStr.split('T')[0]) : _today;
  let age = ref.getFullYear() - b.getFullYear();
  const m = ref.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && ref.getDate() < b.getDate())) age--;
  return age >= 0 ? age : null;
}

function nextYearlyDate(dateStr) {
  if (!dateStr) return null;
  const p = dateStr.split('T')[0].split('-');
  const month = parseInt(p[1]) - 1, day = parseInt(p[2]);
  let next = new Date(_today.getFullYear(), month, day);
  if (next < _today) next = new Date(_today.getFullYear() + 1, month, day);
  return next;
}

function processOccasions(occasions) {
  _contactOccasions = {};
  occasions.forEach(o => {
    let label, daysUntil;
    if (o.frequency === 'yearly') {
      const next = nextYearlyDate(o.start_date);
      if (!next) return;
      const years = next.getFullYear() - yearOf(o.start_date);
      const yPart = years > 0 ? ` (${years}y)` : '';
      label = `${truncate(o.name, 11)}: ${next.getDate()} ${MONTHS[next.getMonth()]}${yPart}`;
      daysUntil = Math.round((next - _today) / 864e5);
    } else {
      const next = new Date(o.start_date.split('T')[0]);
      if (next < _today) return;
      label = `${truncate(o.name, 11)}: ${next.getDate()} ${MONTHS[next.getMonth()]}`;
      daysUntil = Math.round((next - _today) / 864e5);
    }
    if (!_contactOccasions[o.contact_id]) _contactOccasions[o.contact_id] = [];
    _contactOccasions[o.contact_id].push({ label, daysUntil });
  });
  Object.values(_contactOccasions).forEach(arr => arr.sort((a, b) => a.daysUntil - b.daysUntil));
}

function nodeLayout(d) {
  const ROWY = 13, PAD = 8, GAP = 2;
  const hasDate = !!(d.birthday || d.died_on);
  const occs = (_contactOccasions[d.id] || []).slice(0, 2);
  const rows = 1 + (hasDate ? 1 : 0) + occs.length;
  const contentH = rows * ROWY + Math.max(0, rows - 1) * GAP;
  const h = Math.max(38, PAD * 2 + contentH);
  const startY = -contentH / 2 + ROWY / 2;
  const items = [];
  let ri = 0;
  items.push({
    y: startY + ri++ * (ROWY + GAP),
    text: truncate((d.is_pet ? '🐾 ' : '') + (d.name || 'Unnamed'), 18),
    fontSize: 10, fontWeight: 800,
    fill: d.died_on ? '#888' : '#1C0A00',
    fontStyle: d.died_on ? 'italic' : 'normal',
  });
  if (hasDate) {
    let txt = '';
    if (d.died_on) {
      const by = yearOf(d.birthday), dy = yearOf(d.died_on);
      const age = calcAge(d.birthday, d.died_on);
      txt = by && dy ? `${by} – ${dy}` + (age !== null ? ` — ${age}` : '')
                     : dy ? `† ${dy}` + (age !== null ? ` — ${age}` : '') : '';
    } else {
      const age = calcAge(d.birthday, null);
      txt = formatBirthdayShort(d.birthday) + (age !== null ? ` — ${age}` : '');
    }
    items.push({
      y: startY + ri++ * (ROWY + GAP),
      text: txt, fontSize: 8.5, fontWeight: 600,
      fill: d.died_on ? '#999' : 'rgba(28,10,0,0.55)', fontStyle: 'normal',
    });
  }
  occs.forEach(o => {
    items.push({
      y: startY + ri++ * (ROWY + GAP),
      text: o.label, fontSize: 8, fontWeight: 500,
      fill: '#b85e10', fontStyle: 'normal',
    });
  });
  return { h, items };
}

function toggleParentCb(cb, parentGroupName) {
  document.querySelectorAll(`#cbGroup input[data-parent-group="${CSS.escape(parentGroupName)}"]`)
    .forEach(child => { child.checked = cb.checked; });
  applyFilter();
}

async function init() {
  const [netRes, occRes] = await Promise.all([
    fetch('/api/network'),
    fetch('/api/occasions/upcoming'),
  ]);
  if (netRes.status === 401) { window.location.href = '/login'; return; }
  const data = await netRes.json();
  if (occRes.ok) { const occData = await occRes.json(); processOccasions(occData.occasions || []); }

  data.contacts.forEach(c => { _contactMap[c.id] = c; });

  // Build subgroup hierarchy from data.groups
  _subgroupIds = new Set();
  _subgroupParents = {};
  const groupDefsById = {};
  (data.groups || []).forEach(g => {
    groupDefsById[g.id] = g;
    if (g.parent_group_id) { _subgroupIds.add(g.id); _subgroupParents[g.id] = g.parent_group_id; }
  });

  // Build group name maps from memberships
  _groupNodeName = {};
  _contactGroupNames = {};
  const groupNodeMap = {};

  (data.group_memberships || []).forEach(m => {
    if (!groupNodeMap[m.group_id]) {
      groupNodeMap[m.group_id] = { id: `g_${m.group_id}`, name: m.group_name, isGroup: true };
      _groupNodeName[`g_${m.group_id}`] = m.group_name;
    }
    if (!_contactGroupNames[m.contact_id]) _contactGroupNames[m.contact_id] = new Set();
    _contactGroupNames[m.contact_id].add(m.group_name);
  });

  // Create nodes for all defined groups (even those with no direct members)
  (data.groups || []).forEach(g => {
    if (!groupNodeMap[g.id]) {
      groupNodeMap[g.id] = { id: `g_${g.id}`, name: g.name, isGroup: true };
      _groupNodeName[`g_${g.id}`] = g.name;
    }
  });

  // Assign colors: top-level groups get palette colors; subgroups inherit parent's color
  const topGroupDefs = (data.groups || []).filter(g => !g.parent_group_id);
  topGroupDefs.sort((a, b) => a.name === 'Family' ? -1 : b.name === 'Family' ? 1 : a.name.localeCompare(b.name));
  GROUP_COLORS = {};
  topGroupDefs.forEach((g, i) => {
    GROUP_COLORS[g.name] = g.name === 'Family' ? FAMILY_COLOR : PALETTE[i % PALETTE.length];
  });
  // BFS so each generation inherits its parent's already-assigned color
  let bfsQueue = topGroupDefs.map(g => g.id);
  const bfsVisited = new Set(bfsQueue);
  while (bfsQueue.length) {
    const nextQueue = [];
    bfsQueue.forEach(pid => {
      (data.groups || []).filter(g => g.parent_group_id === pid && !bfsVisited.has(g.id)).forEach(g => {
        const parent = groupDefsById[g.parent_group_id];
        GROUP_COLORS[g.name] = parent ? GROUP_COLORS[parent.name] : PALETTE[0];
        bfsVisited.add(g.id);
        nextQueue.push(g.id);
      });
    });
    bfsQueue = nextQueue;
  }

  _allGroupNames = (data.groups || []).map(g => g.name);

  // Build filter checkboxes with parent/subgroup hierarchy
  const cbGroup = document.getElementById('cbGroup');
  const insertBefore = document.querySelector('#cbGroup .cb-sep:last-of-type');
  const subsByParentId = {};
  (data.groups || []).filter(g => g.parent_group_id).forEach(g => {
    if (!subsByParentId[g.parent_group_id]) subsByParentId[g.parent_group_id] = [];
    subsByParentId[g.parent_group_id].push(g);
  });
  topGroupDefs.forEach(g => {
    const color = GROUP_COLORS[g.name];
    const label = document.createElement('label');
    label.className = 'cb-label';
    const gAttr = g.name.replace(/"/g, '&quot;');
    const gJs = g.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    label.innerHTML = `<input type="checkbox" data-group="${gAttr}" checked onchange="toggleParentCb(this,'${gJs}')">`
      + `<span class="cb-dot" style="background:${color};"></span>${esc(g.name)}`;
    cbGroup.insertBefore(label, insertBefore);
    (subsByParentId[g.id] || []).sort((a, b) => a.name.localeCompare(b.name)).forEach(s => {
      const sLabel = document.createElement('label');
      sLabel.className = 'cb-label cb-sub-label';
      const sAttr = s.name.replace(/"/g, '&quot;');
      sLabel.innerHTML = `<input type="checkbox" data-group="${sAttr}" data-parent-group="${gAttr}" checked onchange="applyFilter()">`
        + `<span class="cb-dot" style="width:6px;height:6px;background:${color};opacity:0.7;"></span>${esc(s.name)}`;
      cbGroup.insertBefore(sLabel, insertBefore);
    });
  });

  const groupNodes = Object.values(groupNodeMap);
  _memberLinks = (data.group_memberships || []).map(m => ({
    source: `g_${m.group_id}`,
    target: m.contact_id,
    isMembership: true,
    groupName: m.group_name,
  }));

  _allNodes = [
    { id: '__me__', name: 'You', isMe: true },
    ...data.contacts.map(c => ({ id: c.id, name: c.name || 'Unnamed', ...c })),
    ...groupNodes,
  ];

  const pairMap = new Map();
  (data.relationships || []).forEach(r => {
    const lo = Math.min(r.contact_a_id, r.contact_b_id);
    const hi = Math.max(r.contact_a_id, r.contact_b_id);
    const key = `${lo}-${hi}`;
    if (!pairMap.has(key)) pairMap.set(key, { source: lo, target: hi, group: r.group_name, relA: null, relB: null });
    const link = pairMap.get(key);
    if (r.contact_a_id === lo) link.relA = r.relationship;
    else link.relB = r.relationship;
  });
  _relLinks = Array.from(pairMap.values());

  // Build outline data structures
  _rawGroups = data.groups || [];
  _groupByName = {};
  _groupById = {};
  _rawGroups.forEach(g => { _groupByName[g.name] = g; _groupById[g.id] = g; });
  _groupMembersMap = {};
  (data.group_memberships || []).forEach(m => {
    if (!_groupMembersMap[m.group_id]) _groupMembersMap[m.group_id] = [];
    const c = _contactMap[m.contact_id];
    if (c && !_groupMembersMap[m.group_id].find(x => x.id === c.id))
      _groupMembersMap[m.group_id].push(c);
  });
  _contactFamilyRelLabel = {};
  _relLinks.forEach(l => {
    if (l.group !== 'Family') return;
    if (l.relA && !_contactFamilyRelLabel[l.source]) _contactFamilyRelLabel[l.source] = cleanRel(l.relA);
    if (l.relB && !_contactFamilyRelLabel[l.target]) _contactFamilyRelLabel[l.target] = cleanRel(l.relB);
  });

  _relLinks.forEach(l => {
    [l.source, l.target].forEach(id => {
      if (!_nodeGroups[id]) _nodeGroups[id] = new Set();
      _nodeGroups[id].add(l.group);
    });
  });

  document.getElementById('loading').style.display = 'none';
  buildGraph();
}

function buildGraph() {
  const container = document.getElementById('graph-container');
  _width = container.clientWidth;
  _height = container.clientHeight;

  _svg = d3.select('#graph-svg').attr('width', _width).attr('height', _height);
  _svg.selectAll('*').remove();

  const zoom = d3.zoom().scaleExtent([0.05, 4]).on('zoom', e => _g.attr('transform', e.transform));
  _svg.call(zoom);
  _g = _svg.append('g');

  const nodesCopy = _allNodes.map(n => ({ ...n }));
  const idToNode = {};
  nodesCopy.forEach(n => { idToNode[n.id] = n; });

  const relLinksCopy = _relLinks
    .map(l => ({ ...l, source: idToNode[l.source], target: idToNode[l.target] }))
    .filter(l => l.source && l.target);

  const memberLinksCopy = _memberLinks
    .map(l => ({ ...l, source: idToNode[l.source], target: idToNode[l.target] }))
    .filter(l => l.source && l.target);

  // Pre-compute node heights for collision radii before simulation starts
  _nodeHeights = {};
  _allNodes.forEach(n => { if (!n.isGroup && !n.isMe) _nodeHeights[n.id] = nodeLayout(n).h; });

  // Build subgroup ↔ parent-group links for the simulation
  const subgroupLinksCopy = [];
  Object.entries(_subgroupParents).forEach(([subIdStr, parentId]) => {
    const subNode = idToNode[`g_${subIdStr}`];
    const parentNode = idToNode[`g_${parentId}`];
    if (subNode && parentNode) subgroupLinksCopy.push({ source: parentNode, target: subNode, isSubgroupLink: true });
  });

  _simulation = d3.forceSimulation(nodesCopy)
    .force('link', d3.forceLink([...relLinksCopy, ...memberLinksCopy, ...subgroupLinksCopy]).id(d => d.id)
      .distance(d => d.isSubgroupLink ? 55 : d.isMembership ? 80 : 120)
      .strength(d => d.isSubgroupLink ? 0.8 : d.isMembership ? 0.25 : 0.5))
    .force('charge', d3.forceManyBody().strength(d => d.isGroup ? -100 : -220))
    .force('center', d3.forceCenter(_width / 2, _height / 2).strength(1))
    .force('x', d3.forceX(_width / 2).strength(0.025))
    .force('y', d3.forceY(_height / 2).strength(0.025))
    .force('collision', d3.forceCollide().radius(d => {
      if (d.isMe) return Math.sqrt((GNW / 2) ** 2 + (GNH / 2) ** 2) + 6;
      if (d.isGroup) {
        const isSub = _subgroupIds.has(parseInt(d.id.replace('g_', '')));
        const w = isSub ? SGW : GNW, h = isSub ? SGH : GNH;
        return Math.sqrt((w / 2) ** 2 + (h / 2) ** 2) + 4;
      }
      const h = _nodeHeights[d.id] || NH;
      return Math.sqrt((NW / 2) ** 2 + (h / 2) ** 2) + 6;
    }));

  // Subgroup hierarchy lines (rendered first — below everything else)
  _subgroupLinkSel = _g.append('g').attr('class', 'subgroup-links')
    .selectAll('line').data(subgroupLinksCopy).join('line')
    .attr('stroke', d => GROUP_COLORS[_groupNodeName[d.target.id]] || '#888')
    .attr('stroke-opacity', 0.3)
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '3,4');

  // Membership links
  _memberLinkSel = _g.append('g').attr('class', 'member-links')
    .selectAll('line').data(memberLinksCopy).join('line')
    .attr('stroke', '#555')
    .attr('stroke-opacity', 0.45)
    .attr('stroke-width', 2)
    .attr('stroke-dasharray', '5,4');

  // Relationship links
  _relLinkSel = _g.append('g').attr('class', 'rel-links')
    .selectAll('line').data(relLinksCopy).join('line')
    .attr('stroke', d => GROUP_COLORS[d.group] || '#333')
    .attr('stroke-opacity', 0.75)
    .attr('stroke-width', 2.5)
    .style('cursor', 'pointer');

  // Invisible wider hit-area for edge hover/tooltip
  _hitAreaSel = _g.append('g').attr('class', 'rel-hitareas')
    .selectAll('line').data(relLinksCopy).join('line')
    .attr('stroke', 'transparent')
    .attr('stroke-width', 16)
    .style('cursor', 'pointer')
    .on('mouseenter', edgeEnter)
    .on('mousemove', moveTooltip)
    .on('mouseleave', hideTooltip);

  // Group hub nodes
  const groupNodesCopy = nodesCopy.filter(n => n.isGroup);
  const groupG = _g.append('g').attr('class', 'group-nodes')
    .selectAll('g').data(groupNodesCopy).join('g')
    .attr('class', 'group-node-g')
    .style('cursor', 'default')
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd));

  groupG.each(function(d) {
    const gid = parseInt(d.id.replace('g_', ''));
    const isSub = _subgroupIds.has(gid);
    const w = isSub ? SGW : GNW, h = isSub ? SGH : GNH, rx = isSub ? SGRX : GNRX;
    const color = GROUP_COLORS[_groupNodeName[d.id]] || '#3A6B20';
    const g = d3.select(this);
    // White background masks lines passing behind
    g.append('rect').attr('x', -w/2).attr('y', -h/2).attr('width', w).attr('height', h).attr('rx', rx)
      .attr('fill', '#fff').attr('stroke', 'none');
    // Colored overlay
    g.append('rect').attr('x', -w/2).attr('y', -h/2).attr('width', w).attr('height', h).attr('rx', rx)
      .attr('fill', color + '1a').attr('stroke', color)
      .attr('stroke-width', isSub ? 2 : 4)
      .attr('stroke-dasharray', isSub ? '4,3' : '6,4');
    // Label
    const name = _groupNodeName[d.id] || d.name;
    g.append('text')
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
      .attr('font-family', "'Plus Jakarta Sans', sans-serif")
      .attr('font-size', isSub ? 10 : 13).attr('font-weight', 800)
      .attr('fill', color)
      .text(truncate((name === 'Family' ? '♥ ' : '') + name, isSub ? 13 : 17));
  });

  _groupNodeSel = groupG;

  // Contact + me nodes
  const contactsCopy = nodesCopy.filter(n => !n.isGroup);
  const nodeG = _g.append('g').attr('class', 'contact-nodes')
    .selectAll('g').data(contactsCopy).join('g')
    .attr('class', 'contact-node-g')
    .style('cursor', d => d.isMe ? 'default' : 'pointer')
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd))
    .on('mouseenter', showTooltip).on('mousemove', moveTooltip).on('mouseleave', hideTooltip)
    .on('click', nodeClick);

  // Me node — same shape and size as group hubs, brand green
  const meG = nodeG.filter(d => d.isMe);
  meG.append('rect')  // white background
    .attr('x', -GNW / 2).attr('y', -GNH / 2)
    .attr('width', GNW).attr('height', GNH).attr('rx', GNRX)
    .attr('fill', '#fff').attr('stroke', 'none');
  meG.append('rect')
    .attr('x', -GNW / 2).attr('y', -GNH / 2)
    .attr('width', GNW).attr('height', GNH).attr('rx', GNRX)
    .attr('class', 'node-outline')
    .attr('fill', '#3A6B2022').attr('stroke', '#3A6B20').attr('stroke-width', 4)
    .attr('stroke-dasharray', '6,4');
  meG.append('text')
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('font-family', "'Plus Jakarta Sans', sans-serif")
    .attr('font-size', 13).attr('font-weight', 800).attr('fill', '#3A6B20').text('You');

  // Contact pills — dynamic per-node layout based on content
  const cG = nodeG.filter(d => !d.isMe);
  cG.each(function(d) {
    const { h, items } = nodeLayout(d);
    const g = d3.select(this);
    g.append('rect')
      .attr('class', 'node-outline')
      .attr('x', -NW / 2).attr('y', -h / 2)
      .attr('width', NW).attr('height', h).attr('rx', NRX)
      .attr('fill', d.died_on ? '#f0ede6' : d.is_pet ? '#FFF3DC' : '#f7f4ef')
      .attr('stroke', nodeStroke(d))
      .attr('stroke-width', 3);
    items.forEach(item => {
      g.append('text')
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('y', item.y)
        .attr('font-family', "'Plus Jakarta Sans', sans-serif")
        .attr('font-size', item.fontSize).attr('font-weight', item.fontWeight)
        .attr('fill', item.fill).attr('font-style', item.fontStyle)
        .text(item.text);
    });
  });

  _nodeSel = nodeG;

  _simulation.on('tick', () => {
    _subgroupLinkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    _relLinkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    _hitAreaSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    _memberLinkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
    groupG.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  applyVisibility();
}

// ── Filters ───────────────────────────────────────────────────────────────────
function getActiveGroups() {
  const active = new Set();
  document.querySelectorAll('#cbGroup input[data-group]').forEach(cb => {
    if (cb.checked) active.add(cb.dataset.group);
  });
  return active;
}

function toggleAll() {
  const checked = document.getElementById('cb-all').checked;
  document.querySelectorAll('#cbGroup input[data-group]').forEach(cb => cb.checked = checked);
  applyVisibility(); closePanel();
}

function applyFilter() {
  const allChecked = [...document.querySelectorAll('#cbGroup input[data-group]')].every(cb => cb.checked);
  document.getElementById('cb-all').checked = allChecked;
  applyVisibility(); closePanel();
}

// A group is active if it has a checkbox and is checked, OR if any ancestor is active.
function isGroupNameActive(groupName, active) {
  if (active.has(groupName)) return true;
  const g = _groupByName[groupName];
  if (!g || !g.parent_group_id) return false;
  const parent = _groupById[g.parent_group_id];
  return parent ? isGroupNameActive(parent.name, active) : false;
}

// Returns a Set of visible contact-node IDs given current filter state.
function computeVisibleNodeIds(active, showOnlyLiving) {
  const visible = new Set();
  _nodeSel.each(d => {
    if (d.isMe) { visible.add(d.id); return; }
    if (showOnlyLiving && d.died_on) return;
    const relGroups = _nodeGroups[d.id];
    if (relGroups) { for (const g of relGroups) { if (isGroupNameActive(g, active)) { visible.add(d.id); return; } } }
    const memGroups = _contactGroupNames[d.id];
    if (memGroups) { for (const g of memGroups) { if (isGroupNameActive(g, active)) { visible.add(d.id); return; } } }
  });
  return visible;
}

// Returns a Set of visible group-hub node IDs.
function computeVisibleGroupIds(active) {
  const visible = new Set();
  _groupNodeSel.each(d => {
    if (isGroupNameActive(_groupNodeName[d.id], active)) visible.add(d.id);
  });
  return visible;
}

function applyVisibility() {
  if (_currentView === 'outline') { renderOutline(); return; }
  if (!_nodeSel || !_relLinkSel) return;
  const active = getActiveGroups();
  const showOnlyLiving = document.getElementById('cb-living').checked;

  const visibleNodeIds  = computeVisibleNodeIds(active, showOnlyLiving);
  const visibleGroupIds = computeVisibleGroupIds(active);

  // Contact nodes
  _nodeSel.attr('display', d => visibleNodeIds.has(d.id) ? null : 'none');

  // Group hub nodes
  _groupNodeSel.attr('display', d => visibleGroupIds.has(d.id) ? null : 'none');

  // Rel links: group must be active AND both endpoint nodes visible
  const relVisible = l => {
    if (!active.has(l.group)) return false;
    const sId = typeof l.source === 'object' ? l.source.id : l.source;
    const tId = typeof l.target === 'object' ? l.target.id : l.target;
    return visibleNodeIds.has(sId) && visibleNodeIds.has(tId);
  };
  _relLinkSel.attr('display', l => relVisible(l) ? null : 'none');
  _hitAreaSel.attr('display', l => relVisible(l) ? null : 'none');

  // Membership links: group must be active (or have an active ancestor), hub visible, contact visible
  _memberLinkSel.attr('display', l => {
    const srcId = typeof l.source === 'object' ? l.source.id : l.source;
    const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
    const gname = _groupNodeName[srcId] || l.groupName;
    if (!isGroupNameActive(gname, active)) return 'none';
    if (!visibleGroupIds.has(srcId)) return 'none';
    if (!visibleNodeIds.has(tgtId)) return 'none';
    return null;
  });

  // Subgroup hierarchy lines: both group hubs must be visible
  if (_subgroupLinkSel) {
    _subgroupLinkSel.attr('display', l => {
      const srcId = typeof l.source === 'object' ? l.source.id : l.source;
      const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
      return visibleGroupIds.has(srcId) && visibleGroupIds.has(tgtId) ? null : 'none';
    });
  }
}

// ── Drag ──────────────────────────────────────────────────────────────────────
function dragStart(event, d) {
  if (!event.active) _simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) _simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(event, d) {
  if (d.isMe) return;
  tooltip.textContent = d.name || 'Unnamed';
  tooltip.classList.add('visible');
  moveTooltip(event);
}

function edgeEnter(event, d) {
  const sNode = typeof d.source === 'object' ? d.source : null;
  const tNode = typeof d.target === 'object' ? d.target : null;
  const sName = sNode ? (sNode.name || 'Unknown') : 'Unknown';
  const tName = tNode ? (tNode.name || 'Unknown') : 'Unknown';
  let text;
  const rA = cleanRel(d.relA), rB = cleanRel(d.relB);
  if (!rA && !rB) {
    text = `${sName} ↔ ${tName}`;
  } else if (!rB || rA === rB) {
    text = `${sName} & ${tName}: ${rA}`;
  } else {
    text = `${truncate(sName,16)}: ${rA}\n${truncate(tName,16)}: ${rB}`;
  }
  tooltip.style.whiteSpace = 'pre';
  tooltip.textContent = text;
  tooltip.classList.add('visible');
  moveTooltip(event);
}

function moveTooltip(event) {
  tooltip.style.left = (event.clientX + 14) + 'px';
  tooltip.style.top  = (event.clientY - 10) + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
  tooltip.style.whiteSpace = 'normal';
}

// ── Side panel ────────────────────────────────────────────────────────────────
function nodeClick(event, d) {
  if (d.isMe) return;
  event.stopPropagation();
  openPanel(d);
}

function openPanel(d) {
  document.getElementById('spName').textContent = (d.is_pet ? '🐾 ' : '') + (d.name || 'Unnamed');

  const bday = d.birthday;
  document.getElementById('spBirthdayWrap').style.display = bday ? '' : 'none';
  document.getElementById('spBirthday').textContent = bday ? formatDate(bday) : '';

  const died = d.died_on;
  document.getElementById('spDiedWrap').style.display = died ? '' : 'none';
  document.getElementById('spDied').textContent = died ? formatDate(died) : '';

  const city = d.city;
  document.getElementById('spCityWrap').style.display = city ? '' : 'none';
  document.getElementById('spCity').textContent = city || '';

  const nodeId = d.id;
  const rels = _relLinks.filter(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s === nodeId || t === nodeId;
  });

  const relsEl = document.getElementById('spRels');
  if (!rels.length) {
    relsEl.innerHTML = '<div style="font-size:12px;color:rgba(28,10,0,0.35);">No relationships recorded.</div>';
  } else {
    relsEl.innerHTML = rels.map(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const isSource = s === nodeId;
      const otherId = isSource
        ? (typeof l.target === 'object' ? l.target.id : l.target)
        : s;
      const other = _contactMap[otherId];
      const myRel = cleanRel(isSource ? (l.relA || l.relB) : (l.relB || l.relA));
      return `<div class="sp-rel-item"><span class="sp-rel-name">${esc(other ? other.name || 'Unnamed' : 'Unknown')}</span><span class="sp-rel-type">${esc(myRel || '')}</span></div>`;
    }).join('');
  }

  document.getElementById('spViewFull').href = `/account/contacts?id=${nodeId}`;
  document.getElementById('sidePanel').classList.add('open');
  highlightNode(nodeId);
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  clearHighlight();
}

function nodeStroke(d) {
  return d.died_on ? '#999' : d.is_pet ? '#b85e10' : '#333';
}

function highlightNode(nodeId) {
  if (!_nodeSel) return;
  _nodeSel.select('.node-outline')
    .attr('stroke', d => d.isMe ? '#3A6B20' : d.id === nodeId ? '#3A6B20' : nodeStroke(d))
    .attr('stroke-width', d => (d.isMe || d.id === nodeId) ? 4 : 3);
}

function clearHighlight() {
  if (!_nodeSel) return;
  _nodeSel.select('.node-outline')
    .attr('stroke', d => d.isMe ? '#3A6B20' : nodeStroke(d))
    .attr('stroke-width', d => d.isMe ? 4 : 3);
}

document.getElementById('graph-svg').addEventListener('click', () => closePanel());

window.addEventListener('resize', () => {
  const container = document.getElementById('graph-container');
  _width = container.clientWidth;
  _height = container.clientHeight;
  _svg.attr('width', _width).attr('height', _height);
  if (_simulation) _simulation.force('center', d3.forceCenter(_width / 2, _height / 2)).alpha(0.3).restart();
});

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Outline view ──────────────────────────────────────────────────────────────
function switchView(view) {
  _currentView = view;
  document.getElementById('btn-view-network').classList.toggle('active', view === 'network');
  document.getElementById('btn-view-outline').classList.toggle('active', view === 'outline');
  document.getElementById('graph-container').style.display = view === 'network' ? '' : 'none';
  document.getElementById('outline-container').style.display = view === 'outline' ? '' : 'none';
  if (view === 'network') { applyVisibility(); closePanel(); }
  else renderOutline();
}

// Recursive total count of visible contacts in a group + all its descendants
function olGroupTotalCount(groupId, showOnlyLiving, active) {
  const direct = (_groupMembersMap[groupId] || []).filter(c => !showOnlyLiving || !c.died_on).length;
  const children = _rawGroups.filter(g => g.parent_group_id === groupId && isGroupNameActive(g.name, active));
  return direct + children.reduce((sum, g) => sum + olGroupTotalCount(g.id, showOnlyLiving, active), 0);
}

function renderOutline() {
  const active = getActiveGroups();
  const showOnlyLiving = document.getElementById('cb-living').checked;
  const inner = document.getElementById('outline-inner');
  inner.innerHTML = '';
  _selectedContacts.clear();
  updateBulkBar();

  const topGroups = _rawGroups.filter(g => !g.parent_group_id);
  topGroups.sort((a, b) => a.name === 'Family' ? -1 : b.name === 'Family' ? 1 : a.name.localeCompare(b.name));

  topGroups.forEach(g => {
    if (!active.has(g.name)) return;
    const totalVisible = olGroupTotalCount(g.id, showOnlyLiving, active);
    if (totalVisible === 0) return;

    const color = GROUP_COLORS[g.name] || '#3A6B20';
    const isFamily = g.name === 'Family';
    const el = document.createElement('div');
    el.className = 'ol-group';
    el.dataset.groupId = g.id;
    el.innerHTML = `<div class="ol-group-hdr" onclick="toggleOlGroup(this)">
      <input type="checkbox" class="ol-cb" onchange="olGroupCbChange(this,${g.id})" onclick="event.stopPropagation()">
      <span class="ol-tri">▼</span>
      <span class="ol-dot" style="background:${color}"></span>
      <span class="ol-group-name">${isFamily ? '♥ ' : ''}${esc(g.name)}</span>
      <span class="ol-count">${totalVisible}</span>
    </div><div class="ol-group-body"></div>`;

    const body = el.querySelector('.ol-group-body');
    if (isFamily) {
      const members = (_groupMembersMap[g.id] || []).filter(c => !showOnlyLiving || !c.died_on);
      renderOlFamilySection(body, members);
    } else {
      renderOlChildren(body, g.id, showOnlyLiving, active);
    }
    inner.appendChild(el);
  });
}

function renderOlFamilySection(body, members) {
  const pets = members.filter(c => c.is_pet).sort((a, b) => (a.name||'').localeCompare(b.name||''));
  const nonPets = members.filter(c => !c.is_pet).sort((a, b) => (a.name||'').localeCompare(b.name||''));
  nonPets.forEach(c => body.appendChild(makeOlRow(c, 0, true)));
  if (!pets.length) return;
  const petsEl = document.createElement('div');
  petsEl.className = 'ol-sub';
  petsEl.innerHTML = `<div class="ol-sub-hdr" onclick="toggleOlSub(this)">
    <input type="checkbox" class="ol-cb" onchange="olSubCbChange(this)" onclick="event.stopPropagation()">
    <span class="ol-tri">▼</span>
    <span class="ol-sub-name">🐾 Pets</span>
    <span class="ol-count">${pets.length}</span>
  </div><div class="ol-sub-body"></div>`;
  const pb = petsEl.querySelector('.ol-sub-body');
  pets.forEach(c => pb.appendChild(makeOlRow(c, 1, false)));
  body.appendChild(petsEl);
}

// Recursively renders children of a group: direct members first, then child subgroups
function renderOlChildren(body, groupId, showOnlyLiving, active) {
  const allMembers = (_groupMembersMap[groupId] || []).filter(c => !showOnlyLiving || !c.died_on);
  const childGroups = _rawGroups.filter(g => g.parent_group_id === groupId && isGroupNameActive(g.name, active))
    .sort((a, b) => a.name.localeCompare(b.name));

  // Exclude members that live in child groups (so they only appear once)
  const childMemberIds = new Set();
  const collectDescendantMembers = gid => {
    (_groupMembersMap[gid] || []).forEach(c => childMemberIds.add(c.id));
    _rawGroups.filter(g => g.parent_group_id === gid).forEach(g => collectDescendantMembers(g.id));
  };
  childGroups.forEach(g => collectDescendantMembers(g.id));

  allMembers.filter(c => !childMemberIds.has(c.id))
    .sort((a, b) => (a.name||'').localeCompare(b.name||''))
    .forEach(c => body.appendChild(makeOlRow(c, 0, false)));

  childGroups.forEach(g => {
    const count = olGroupTotalCount(g.id, showOnlyLiving, active);
    if (!count) return;
    const subEl = document.createElement('div');
    subEl.className = 'ol-sub';
    subEl.dataset.subId = g.id;
    subEl.innerHTML = `<div class="ol-sub-hdr" onclick="toggleOlSub(this)">
      <input type="checkbox" class="ol-cb" onchange="olSubCbChange(this)" onclick="event.stopPropagation()">
      <span class="ol-tri">▼</span>
      <span class="ol-sub-name">${esc(g.name)}</span>
      <span class="ol-count">${count}</span>
    </div><div class="ol-sub-body"></div>`;
    const sb = subEl.querySelector('.ol-sub-body');
    renderOlChildren(sb, g.id, showOnlyLiving, active);
    body.appendChild(subEl);
  });
}

function makeOlRow(c, depth, showRelLabel) {
  const row = document.createElement('div');
  row.className = 'ol-row' + (c.died_on ? ' ol-deceased' : '');
  row.dataset.contactId = c.id;
  if (depth > 0) row.style.paddingLeft = (depth * 12 + 16) + 'px';
  const name = (c.is_pet ? '🐾 ' : '') + (c.name || 'Unnamed');
  const metaRaw = olMeta(c);
  const relLabel = showRelLabel ? (_contactFamilyRelLabel[c.id] || '') : '';
  let metaStr = '';
  if (metaRaw && relLabel) metaStr = `(${metaRaw}) — ${relLabel}`;
  else if (metaRaw) metaStr = `(${metaRaw})`;
  else if (relLabel) metaStr = relLabel;
  row.innerHTML = `<input type="checkbox" class="ol-row-cb" onclick="event.stopPropagation()" onchange="olRowCbChange(this,${c.id})">
    <span class="ol-row-name">${esc(name)}</span>
    <span class="ol-row-meta">${esc(metaStr)}</span>`;
  row.addEventListener('click', e => { if (e.target.tagName === 'INPUT') return; openPanel(c); });
  return row;
}

function olMeta(c) {
  if (c.died_on) {
    const by = yearOf(c.birthday), dy = yearOf(c.died_on);
    const age = calcAge(c.birthday, c.died_on);
    if (by && dy) return `${by}–${dy}${age !== null ? `, ${age} yrs` : ''} †`;
    return dy ? `† ${dy}` : '†';
  }
  const parts = [];
  if (c.birthday) { const y = yearOf(c.birthday); if (y) parts.push(y); }
  const age = calcAge(c.birthday, null);
  if (age !== null) parts.push(`${age} yrs`);
  return parts.join(', ');
}

function toggleOlGroup(hdr) { hdr.closest('.ol-group').classList.toggle('ol-collapsed'); }
function toggleOlSub(hdr) { hdr.closest('.ol-sub').classList.toggle('ol-collapsed'); }

function olGroupCbChange(cb, groupId) {
  const el = document.querySelector(`.ol-group[data-group-id="${groupId}"]`);
  if (!el) return;
  el.querySelectorAll('.ol-row-cb').forEach(rc => {
    rc.checked = cb.checked;
    const id = parseInt(rc.closest('.ol-row').dataset.contactId);
    cb.checked ? _selectedContacts.add(id) : _selectedContacts.delete(id);
  });
  updateBulkBar();
}

function olSubCbChange(cb) {
  cb.closest('.ol-sub').querySelectorAll('.ol-row-cb').forEach(rc => {
    rc.checked = cb.checked;
    const id = parseInt(rc.closest('.ol-row').dataset.contactId);
    cb.checked ? _selectedContacts.add(id) : _selectedContacts.delete(id);
  });
  updateBulkBar();
}

function olRowCbChange(cb, contactId) {
  cb.checked ? _selectedContacts.add(contactId) : _selectedContacts.delete(contactId);
  updateBulkBar();
}

function updateBulkBar() {
  const n = _selectedContacts.size;
  document.getElementById('ol-bulk-bar').classList.toggle('visible', n > 0);
  document.getElementById('btn-loveogram').textContent = `Send Loveogram to ${n} contact${n !== 1 ? 's' : ''}`;
}

init();
</script>
</body>
</html>
