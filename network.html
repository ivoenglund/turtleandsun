<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Network — Turtle and Sun</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#fff;color:#1C0A00;display:flex;flex-direction:column;}

.nav-bar{background:#FFF9E6;border-bottom:1px solid rgba(28,10,0,0.08);flex-shrink:0;}
.nav-wrap{max-width:1200px;margin:0 auto;padding:0 32px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0 18px;}
.nav a img{height:72px;width:auto;margin-top:-42px;display:block;}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:#1C0A00;text-decoration:none;opacity:0.7;}
.nav-links a:hover{opacity:1;}

.top-bar{background:#FFF9E6;border-bottom:1px solid rgba(28,10,0,0.1);padding:10px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;flex-wrap:wrap;}
.top-bar h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;color:#1C0A00;}
.cb-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:1;min-width:0;}
.cb-label{display:flex;align-items:center;gap:5px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:#1C0A00;user-select:none;}
.cb-label input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#3A6B20;flex-shrink:0;}
.cb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cb-sep{width:1px;height:14px;background:rgba(28,10,0,0.15);flex-shrink:0;}
.btn-back{padding:7px 16px;background:#3A6B20;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-back:hover{background:#1C0A00;}

#graph-container{flex:1;position:relative;overflow:hidden;background:#fff;}
#graph-svg{width:100%;height:100%;display:block;}

.tooltip{position:fixed;background:#1C0A00;color:#FFF9E6;padding:8px 12px;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity 0.12s;z-index:100;max-width:260px;line-height:1.4;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.tooltip.visible{opacity:1;}

.side-panel{position:fixed;top:0;right:-340px;width:320px;height:100%;background:#FFF9E6;box-shadow:-4px 0 24px rgba(0,0,0,0.12);transition:right 0.25s cubic-bezier(0.4,0,0.2,1);z-index:200;display:flex;flex-direction:column;}
.side-panel.open{right:0;}
.sp-header{padding:20px 20px 16px;border-bottom:1px solid rgba(28,10,0,0.08);display:flex;align-items:flex-start;justify-content:space-between;}
.sp-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800;color:#1C0A00;line-height:1.2;}
.sp-close{background:none;border:none;font-size:20px;cursor:pointer;color:rgba(28,10,0,0.4);padding:0;line-height:1;}
.sp-close:hover{color:#1C0A00;}
.sp-body{padding:16px 20px;flex:1;overflow-y:auto;}
.sp-field{margin-bottom:12px;}
.sp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:rgba(28,10,0,0.35);margin-bottom:3px;}
.sp-value{font-size:13px;color:#1C0A00;}
.sp-rels{margin-top:16px;}
.sp-rels-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:rgba(28,10,0,0.35);margin-bottom:8px;}
.sp-rel-item{font-size:12px;color:#1C0A00;padding:5px 0;border-bottom:1px solid rgba(28,10,0,0.06);}
.sp-rel-item:last-child{border-bottom:none;}
.sp-rel-name{font-weight:600;}
.sp-rel-type{color:rgba(28,10,0,0.5);margin-left:4px;}
.sp-footer{padding:16px 20px;border-top:1px solid rgba(28,10,0,0.08);}
.btn-view-full{display:block;width:100%;padding:10px;background:#3A6B20;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;}
.btn-view-full:hover{background:#1C0A00;}

#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:50;}
#loading p{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:rgba(28,10,0,0.4);}
</style>
</head>
<body>

<div class="nav-bar">
  <div class="nav-wrap">
    <div class="nav">
      <a href="/"><img src="/logo.png" alt="Turtle and Sun"></a>
      <div class="nav-links">
        <a href="/">Home</a><a href="/pricing">Pricing</a><a href="/faq">FAQ</a>
        <a href="/account/contacts">Contacts</a>
      </div>
    </div>
  </div>
</div>

<div class="top-bar">
  <h1>My Network</h1>
  <div class="cb-group" id="cbGroup">
    <label class="cb-label">
      <input type="checkbox" id="cb-all" checked onchange="toggleAll()">All
    </label>
    <div class="cb-sep"></div>
    <!-- dynamic group checkboxes rendered here -->
    <div class="cb-sep"></div>
    <label class="cb-label">
      <input type="checkbox" id="cb-living" onchange="applyVisibility()">
      Show only living
    </label>
  </div>
  <a href="/account/contacts" class="btn-back">← Contacts</a>
</div>

<div id="graph-container">
  <div id="loading"><p>Loading network…</p></div>
  <svg id="graph-svg"></svg>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="side-panel" id="sidePanel">
  <div class="sp-header">
    <div class="sp-name" id="spName"></div>
    <button class="sp-close" onclick="closePanel()">×</button>
  </div>
  <div class="sp-body">
    <div class="sp-field" id="spBirthdayWrap">
      <div class="sp-label">Birthday</div>
      <div class="sp-value" id="spBirthday"></div>
    </div>
    <div class="sp-field" id="spDiedWrap">
      <div class="sp-label">Died on</div>
      <div class="sp-value" id="spDied"></div>
    </div>
    <div class="sp-field" id="spCityWrap">
      <div class="sp-label">City</div>
      <div class="sp-value" id="spCity"></div>
    </div>
    <div class="sp-rels">
      <div class="sp-rels-title">Relationships</div>
      <div id="spRels"></div>
    </div>
  </div>
  <div class="sp-footer">
    <a href="#" class="btn-view-full" id="spViewFull">View full record</a>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const PALETTE = ['#c0195a','#2a6b50','#1a5f8a','#b85e10','#6b2d9a','#1a8a6b','#8a4f1a','#1a3f8a','#4a8a1a'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const NW = 130, NH = 46, NRX = 10;
const GNW = 120, GNH = 34, GNRX = 17;
const ME_R = 26;

let _allNodes = [], _relLinks = [], _memberLinks = [], _contactMap = {};
let _nodeGroups = {};
let _groupNodeName = {};
let _contactGroupNames = {};
let _allGroupNames = [];
let GROUP_COLORS = {};
let _simulation, _svg, _g;
let _nodeSel, _groupNodeSel, _relLinkSel, _hitAreaSel, _memberLinkSel;
let _width, _height;
let _contactOccasions = {};  // contactId → [{ name, date, years }]
let _nodeHeights = {};        // contactId → computed pill height
const _today = new Date(); _today.setHours(0, 0, 0, 0);

function formatDate(str) {
  if (!str) return '';
  const p = (str.split('T')[0]).split('-');
  if (p.length < 3) return str;
  return `${parseInt(p[2], 10)} ${MONTHS[parseInt(p[1], 10) - 1] || p[1]} ${p[0]}`;
}
function formatBirthdayShort(str) {
  if (!str) return '';
  const p = (str.split('T')[0]).split('-');
  if (p.length < 3) return str;
  return `${parseInt(p[2], 10)} ${MONTHS[parseInt(p[1], 10) - 1] || p[1]}`;
}
function yearOf(str) { return str ? parseInt(str.split('-')[0]) : null; }

function truncate(s, n) { s = s || ''; return s.length > n ? s.slice(0, n - 1) + '…' : s; }
function cleanRel(s) { return (s || '').replace(/ of$/i, ''); }

function calcAge(birthdayStr, diedOnStr) {
  if (!birthdayStr) return null;
  const b = new Date(birthdayStr.split('T')[0]);
  const ref = diedOnStr ? new Date(diedOnStr.split('T')[0]) : _today;
  let age = ref.getFullYear() - b.getFullYear();
  const m = ref.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && ref.getDate() < b.getDate())) age--;
  return age >= 0 ? age : null;
}

function nextYearlyDate(dateStr) {
  if (!dateStr) return null;
  const p = dateStr.split('T')[0].split('-');
  const month = parseInt(p[1]) - 1, day = parseInt(p[2]);
  let next = new Date(_today.getFullYear(), month, day);
  if (next < _today) next = new Date(_today.getFullYear() + 1, month, day);
  return next;
}

function processOccasions(occasions) {
  _contactOccasions = {};
  occasions.forEach(o => {
    let label, daysUntil;
    if (o.frequency === 'yearly') {
      const next = nextYearlyDate(o.start_date);
      if (!next) return;
      const years = next.getFullYear() - yearOf(o.start_date);
      const yPart = years > 0 ? ` (${years}y)` : '';
      label = `${truncate(o.name, 11)}: ${next.getDate()} ${MONTHS[next.getMonth()]}${yPart}`;
      daysUntil = Math.round((next - _today) / 864e5);
    } else {
      const next = new Date(o.start_date.split('T')[0]);
      if (next < _today) return;
      label = `${truncate(o.name, 11)}: ${next.getDate()} ${MONTHS[next.getMonth()]}`;
      daysUntil = Math.round((next - _today) / 864e5);
    }
    if (!_contactOccasions[o.contact_id]) _contactOccasions[o.contact_id] = [];
    _contactOccasions[o.contact_id].push({ label, daysUntil });
  });
  Object.values(_contactOccasions).forEach(arr => arr.sort((a, b) => a.daysUntil - b.daysUntil));
}

function nodeLayout(d) {
  const ROWY = 13, PAD = 8, GAP = 2;
  const hasDate = !!(d.birthday || d.died_on);
  const occs = (_contactOccasions[d.id] || []).slice(0, 2);
  const rows = 1 + (hasDate ? 1 : 0) + occs.length;
  const contentH = rows * ROWY + Math.max(0, rows - 1) * GAP;
  const h = Math.max(38, PAD * 2 + contentH);
  const startY = -contentH / 2 + ROWY / 2;
  const items = [];
  let ri = 0;
  items.push({
    y: startY + ri++ * (ROWY + GAP),
    text: truncate((d.is_pet ? '🐾 ' : '') + (d.name || 'Unnamed'), 18),
    fontSize: 10, fontWeight: 800,
    fill: d.died_on ? '#888' : '#1C0A00',
    fontStyle: d.died_on ? 'italic' : 'normal',
  });
  if (hasDate) {
    let txt = '';
    if (d.died_on) {
      const by = yearOf(d.birthday), dy = yearOf(d.died_on);
      const age = calcAge(d.birthday, d.died_on);
      txt = by && dy ? `${by} – ${dy}` + (age !== null ? ` — ${age}` : '')
                     : dy ? `† ${dy}` + (age !== null ? ` — ${age}` : '') : '';
    } else {
      const age = calcAge(d.birthday, null);
      txt = formatBirthdayShort(d.birthday) + (age !== null ? ` — ${age}` : '');
    }
    items.push({
      y: startY + ri++ * (ROWY + GAP),
      text: txt, fontSize: 8.5, fontWeight: 600,
      fill: d.died_on ? '#999' : 'rgba(28,10,0,0.55)', fontStyle: 'normal',
    });
  }
  occs.forEach(o => {
    items.push({
      y: startY + ri++ * (ROWY + GAP),
      text: o.label, fontSize: 8, fontWeight: 500,
      fill: '#b85e10', fontStyle: 'normal',
    });
  });
  return { h, items };
}

async function init() {
  const [netRes, occRes] = await Promise.all([
    fetch('/api/network'),
    fetch('/api/occasions/upcoming'),
  ]);
  if (netRes.status === 401) { window.location.href = '/login'; return; }
  const data = await netRes.json();
  if (occRes.ok) { const occData = await occRes.json(); processOccasions(occData.occasions || []); }

  data.contacts.forEach(c => { _contactMap[c.id] = c; });

  // Build group name maps from memberships
  _groupNodeName = {};
  _contactGroupNames = {};
  const groupNodeMap = {};
  const groupNameSet = new Set();

  (data.group_memberships || []).forEach(m => {
    if (!groupNodeMap[m.group_id]) {
      groupNodeMap[m.group_id] = { id: `g_${m.group_id}`, name: m.group_name, isGroup: true };
      _groupNodeName[`g_${m.group_id}`] = m.group_name;
    }
    groupNameSet.add(m.group_name);
    if (!_contactGroupNames[m.contact_id]) _contactGroupNames[m.contact_id] = new Set();
    _contactGroupNames[m.contact_id].add(m.group_name);
  });

  // Also collect group names from relationships
  (data.relationships || []).forEach(r => groupNameSet.add(r.group_name));

  _allGroupNames = Array.from(groupNameSet).sort((a, b) => {
    if (a === 'Family') return -1;
    if (b === 'Family') return 1;
    return a.localeCompare(b);
  });

  // Assign colors
  GROUP_COLORS = {};
  _allGroupNames.forEach((g, i) => { GROUP_COLORS[g] = PALETTE[i % PALETTE.length]; });

  // Build dynamic checkboxes
  const cbGroup = document.getElementById('cbGroup');
  const insertBefore = document.querySelector('#cbGroup .cb-sep:last-of-type');
  _allGroupNames.forEach((g, i) => {
    const label = document.createElement('label');
    label.className = 'cb-label';
    label.innerHTML = `<input type="checkbox" data-group="${g.replace(/"/g,'&quot;')}" checked onchange="applyFilter()"><span class="cb-dot" style="background:${GROUP_COLORS[g]};"></span>${esc(g)}`;
    cbGroup.insertBefore(label, insertBefore);
  });

  const groupNodes = Object.values(groupNodeMap);
  _memberLinks = (data.group_memberships || []).map(m => ({
    source: `g_${m.group_id}`,
    target: m.contact_id,
    isMembership: true,
    groupName: m.group_name,
  }));

  _allNodes = [
    { id: '__me__', name: 'You', isMe: true },
    ...data.contacts.map(c => ({ id: c.id, name: c.name || 'Unnamed', ...c })),
    ...groupNodes,
  ];

  const pairMap = new Map();
  (data.relationships || []).forEach(r => {
    const lo = Math.min(r.contact_a_id, r.contact_b_id);
    const hi = Math.max(r.contact_a_id, r.contact_b_id);
    const key = `${lo}-${hi}`;
    if (!pairMap.has(key)) pairMap.set(key, { source: lo, target: hi, group: r.group_name, relA: null, relB: null });
    const link = pairMap.get(key);
    if (r.contact_a_id === lo) link.relA = r.relationship;
    else link.relB = r.relationship;
  });
  _relLinks = Array.from(pairMap.values());

  _relLinks.forEach(l => {
    [l.source, l.target].forEach(id => {
      if (!_nodeGroups[id]) _nodeGroups[id] = new Set();
      _nodeGroups[id].add(l.group);
    });
  });

  document.getElementById('loading').style.display = 'none';
  buildGraph();
}

function buildGraph() {
  const container = document.getElementById('graph-container');
  _width = container.clientWidth;
  _height = container.clientHeight;

  _svg = d3.select('#graph-svg').attr('width', _width).attr('height', _height);
  _svg.selectAll('*').remove();

  const zoom = d3.zoom().scaleExtent([0.05, 4]).on('zoom', e => _g.attr('transform', e.transform));
  _svg.call(zoom);
  _g = _svg.append('g');

  const nodesCopy = _allNodes.map(n => ({ ...n }));
  const idToNode = {};
  nodesCopy.forEach(n => { idToNode[n.id] = n; });

  const relLinksCopy = _relLinks
    .map(l => ({ ...l, source: idToNode[l.source], target: idToNode[l.target] }))
    .filter(l => l.source && l.target);

  const memberLinksCopy = _memberLinks
    .map(l => ({ ...l, source: idToNode[l.source], target: idToNode[l.target] }))
    .filter(l => l.source && l.target);

  // Pre-compute node heights for collision radii before simulation starts
  _nodeHeights = {};
  _allNodes.forEach(n => { if (!n.isGroup && !n.isMe) _nodeHeights[n.id] = nodeLayout(n).h; });

  _simulation = d3.forceSimulation(nodesCopy)
    .force('link', d3.forceLink([...relLinksCopy, ...memberLinksCopy]).id(d => d.id)
      .distance(d => d.isMembership ? 80 : 120)
      .strength(d => d.isMembership ? 0.25 : 0.5))
    .force('charge', d3.forceManyBody().strength(d => d.isGroup ? -100 : -220))
    .force('center', d3.forceCenter(_width / 2, _height / 2).strength(1))
    .force('x', d3.forceX(_width / 2).strength(0.025))
    .force('y', d3.forceY(_height / 2).strength(0.025))
    .force('collision', d3.forceCollide().radius(d => {
      if (d.isMe)    return ME_R + 8;
      if (d.isGroup) return Math.sqrt((GNW / 2) ** 2 + (GNH / 2) ** 2) + 4;
      const h = _nodeHeights[d.id] || NH;
      return Math.sqrt((NW / 2) ** 2 + (h / 2) ** 2) + 6;
    }));

  // Membership links
  _memberLinkSel = _g.append('g').attr('class', 'member-links')
    .selectAll('line').data(memberLinksCopy).join('line')
    .attr('stroke', '#555')
    .attr('stroke-opacity', 0.45)
    .attr('stroke-width', 2)
    .attr('stroke-dasharray', '5,4');

  // Relationship links
  _relLinkSel = _g.append('g').attr('class', 'rel-links')
    .selectAll('line').data(relLinksCopy).join('line')
    .attr('stroke', d => GROUP_COLORS[d.group] || '#333')
    .attr('stroke-opacity', 0.75)
    .attr('stroke-width', 2.5)
    .style('cursor', 'pointer');

  // Invisible wider hit-area for edge hover/tooltip
  _hitAreaSel = _g.append('g').attr('class', 'rel-hitareas')
    .selectAll('line').data(relLinksCopy).join('line')
    .attr('stroke', 'transparent')
    .attr('stroke-width', 16)
    .style('cursor', 'pointer')
    .on('mouseenter', edgeEnter)
    .on('mousemove', moveTooltip)
    .on('mouseleave', hideTooltip);

  // Group hub nodes
  const groupNodesCopy = nodesCopy.filter(n => n.isGroup);
  const groupG = _g.append('g').attr('class', 'group-nodes')
    .selectAll('g').data(groupNodesCopy).join('g')
    .attr('class', 'group-node-g')
    .style('cursor', 'default')
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd));

  groupG.append('rect')
    .attr('x', -GNW / 2).attr('y', -GNH / 2)
    .attr('width', GNW).attr('height', GNH).attr('rx', GNRX)
    .attr('fill', d => {
      const c = GROUP_COLORS[_groupNodeName[d.id]] || '#3A6B20';
      return c + '18';
    })
    .attr('stroke', d => GROUP_COLORS[_groupNodeName[d.id]] || '#3A6B20')
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '5,3');

  groupG.append('text')
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('font-family', "'Plus Jakarta Sans', sans-serif")
    .attr('font-size', 10).attr('font-weight', 700)
    .attr('fill', d => GROUP_COLORS[_groupNodeName[d.id]] || '#2a5016')
    .text(d => truncate(d.name, 15));

  _groupNodeSel = groupG;

  // Contact + me nodes
  const contactsCopy = nodesCopy.filter(n => !n.isGroup);
  const nodeG = _g.append('g').attr('class', 'contact-nodes')
    .selectAll('g').data(contactsCopy).join('g')
    .attr('class', 'contact-node-g')
    .style('cursor', d => d.isMe ? 'default' : 'pointer')
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd))
    .on('mouseenter', showTooltip).on('mousemove', moveTooltip).on('mouseleave', hideTooltip)
    .on('click', nodeClick);

  // Me circle
  const meG = nodeG.filter(d => d.isMe);
  meG.append('circle').attr('r', ME_R)
    .attr('fill', '#3A6B20').attr('stroke', '#fff').attr('stroke-width', 3);
  meG.append('text')
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('font-family', "'Plus Jakarta Sans', sans-serif")
    .attr('font-size', 11).attr('font-weight', 800).attr('fill', '#fff').text('You');

  // Contact pills — dynamic per-node layout based on content
  const cG = nodeG.filter(d => !d.isMe);
  cG.each(function(d) {
    const { h, items } = nodeLayout(d);
    const g = d3.select(this);
    g.append('rect')
      .attr('x', -NW / 2).attr('y', -h / 2)
      .attr('width', NW).attr('height', h).attr('rx', NRX)
      .attr('fill', d.died_on ? '#f0ede6' : d.is_pet ? '#FFF3DC' : '#f7f4ef')
      .attr('stroke', nodeStroke(d))
      .attr('stroke-width', 3);
    items.forEach(item => {
      g.append('text')
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('y', item.y)
        .attr('font-family', "'Plus Jakarta Sans', sans-serif")
        .attr('font-size', item.fontSize).attr('font-weight', item.fontWeight)
        .attr('fill', item.fill).attr('font-style', item.fontStyle)
        .text(item.text);
    });
  });

  _nodeSel = nodeG;

  _simulation.on('tick', () => {
    _relLinkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    _hitAreaSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    _memberLinkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
    groupG.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  applyVisibility();
}

// ── Filters ───────────────────────────────────────────────────────────────────
function getActiveGroups() {
  const active = new Set();
  document.querySelectorAll('#cbGroup input[data-group]').forEach(cb => {
    if (cb.checked) active.add(cb.dataset.group);
  });
  return active;
}

function toggleAll() {
  const checked = document.getElementById('cb-all').checked;
  document.querySelectorAll('#cbGroup input[data-group]').forEach(cb => cb.checked = checked);
  applyVisibility(); closePanel();
}

function applyFilter() {
  const allChecked = [...document.querySelectorAll('#cbGroup input[data-group]')].every(cb => cb.checked);
  document.getElementById('cb-all').checked = allChecked;
  applyVisibility(); closePanel();
}

// Returns a Set of visible contact-node IDs given current filter state.
function computeVisibleNodeIds(active, showOnlyLiving) {
  const visible = new Set();
  _nodeSel.each(d => {
    if (d.isMe) { visible.add(d.id); return; }
    if (showOnlyLiving && d.died_on) return;
    const relGroups = _nodeGroups[d.id];
    if (relGroups) { for (const g of relGroups) { if (active.has(g)) { visible.add(d.id); return; } } }
    const memGroups = _contactGroupNames[d.id];
    if (memGroups) { for (const g of memGroups) { if (active.has(g)) { visible.add(d.id); return; } } }
  });
  return visible;
}

// Returns a Set of visible group-hub node IDs.
function computeVisibleGroupIds(active) {
  const visible = new Set();
  _groupNodeSel.each(d => { if (active.has(_groupNodeName[d.id])) visible.add(d.id); });
  return visible;
}

function applyVisibility() {
  if (!_nodeSel || !_relLinkSel) return;
  const active = getActiveGroups();
  const showOnlyLiving = document.getElementById('cb-living').checked;

  const visibleNodeIds  = computeVisibleNodeIds(active, showOnlyLiving);
  const visibleGroupIds = computeVisibleGroupIds(active);

  // Contact nodes
  _nodeSel.attr('display', d => visibleNodeIds.has(d.id) ? null : 'none');

  // Group hub nodes
  _groupNodeSel.attr('display', d => visibleGroupIds.has(d.id) ? null : 'none');

  // Rel links: group must be active AND both endpoint nodes visible
  const relVisible = l => {
    if (!active.has(l.group)) return false;
    const sId = typeof l.source === 'object' ? l.source.id : l.source;
    const tId = typeof l.target === 'object' ? l.target.id : l.target;
    return visibleNodeIds.has(sId) && visibleNodeIds.has(tId);
  };
  _relLinkSel.attr('display', l => relVisible(l) ? null : 'none');
  _hitAreaSel.attr('display', l => relVisible(l) ? null : 'none');

  // Membership links: group must be active, group hub visible, contact node visible
  _memberLinkSel.attr('display', l => {
    const srcId = typeof l.source === 'object' ? l.source.id : l.source;
    const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
    const gname = _groupNodeName[srcId] || l.groupName;
    if (!active.has(gname)) return 'none';
    if (!visibleGroupIds.has(srcId)) return 'none';
    if (!visibleNodeIds.has(tgtId)) return 'none';
    return null;
  });
}

// ── Drag ──────────────────────────────────────────────────────────────────────
function dragStart(event, d) {
  if (!event.active) _simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) _simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(event, d) {
  if (d.isMe) return;
  tooltip.textContent = d.name || 'Unnamed';
  tooltip.classList.add('visible');
  moveTooltip(event);
}

function edgeEnter(event, d) {
  const sNode = typeof d.source === 'object' ? d.source : null;
  const tNode = typeof d.target === 'object' ? d.target : null;
  const sName = sNode ? (sNode.name || 'Unknown') : 'Unknown';
  const tName = tNode ? (tNode.name || 'Unknown') : 'Unknown';
  let text;
  const rA = cleanRel(d.relA), rB = cleanRel(d.relB);
  if (!rA && !rB) {
    text = `${sName} ↔ ${tName}`;
  } else if (!rB || rA === rB) {
    text = `${sName} & ${tName}: ${rA}`;
  } else {
    text = `${truncate(sName,16)}: ${rA}\n${truncate(tName,16)}: ${rB}`;
  }
  tooltip.style.whiteSpace = 'pre';
  tooltip.textContent = text;
  tooltip.classList.add('visible');
  moveTooltip(event);
}

function moveTooltip(event) {
  tooltip.style.left = (event.clientX + 14) + 'px';
  tooltip.style.top  = (event.clientY - 10) + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
  tooltip.style.whiteSpace = 'normal';
}

// ── Side panel ────────────────────────────────────────────────────────────────
function nodeClick(event, d) {
  if (d.isMe) return;
  event.stopPropagation();
  openPanel(d);
}

function openPanel(d) {
  document.getElementById('spName').textContent = (d.is_pet ? '🐾 ' : '') + (d.name || 'Unnamed');

  const bday = d.birthday;
  document.getElementById('spBirthdayWrap').style.display = bday ? '' : 'none';
  document.getElementById('spBirthday').textContent = bday ? formatDate(bday) : '';

  const died = d.died_on;
  document.getElementById('spDiedWrap').style.display = died ? '' : 'none';
  document.getElementById('spDied').textContent = died ? formatDate(died) : '';

  const city = d.city;
  document.getElementById('spCityWrap').style.display = city ? '' : 'none';
  document.getElementById('spCity').textContent = city || '';

  const nodeId = d.id;
  const rels = _relLinks.filter(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s === nodeId || t === nodeId;
  });

  const relsEl = document.getElementById('spRels');
  if (!rels.length) {
    relsEl.innerHTML = '<div style="font-size:12px;color:rgba(28,10,0,0.35);">No relationships recorded.</div>';
  } else {
    relsEl.innerHTML = rels.map(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const isSource = s === nodeId;
      const otherId = isSource
        ? (typeof l.target === 'object' ? l.target.id : l.target)
        : s;
      const other = _contactMap[otherId];
      const myRel = cleanRel(isSource ? (l.relA || l.relB) : (l.relB || l.relA));
      return `<div class="sp-rel-item"><span class="sp-rel-name">${esc(other ? other.name || 'Unnamed' : 'Unknown')}</span><span class="sp-rel-type">${esc(myRel || '')}</span></div>`;
    }).join('');
  }

  document.getElementById('spViewFull').href = `/account/contacts?id=${nodeId}`;
  document.getElementById('sidePanel').classList.add('open');
  highlightNode(nodeId);
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  clearHighlight();
}

function nodeStroke(d) {
  return d.died_on ? '#999' : d.is_pet ? '#b85e10' : '#333';
}

function highlightNode(nodeId) {
  if (!_nodeSel) return;
  _nodeSel.select('rect')
    .attr('stroke', d => d.id === nodeId ? '#3A6B20' : nodeStroke(d))
    .attr('stroke-width', d => d.id === nodeId ? 4 : 3);
}

function clearHighlight() {
  if (!_nodeSel) return;
  _nodeSel.select('rect')
    .attr('stroke', d => nodeStroke(d))
    .attr('stroke-width', 3);
}

document.getElementById('graph-svg').addEventListener('click', () => closePanel());

window.addEventListener('resize', () => {
  const container = document.getElementById('graph-container');
  _width = container.clientWidth;
  _height = container.clientHeight;
  _svg.attr('width', _width).attr('height', _height);
  if (_simulation) _simulation.force('center', d3.forceCenter(_width / 2, _height / 2)).alpha(0.3).restart();
});

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
