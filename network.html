<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Network — Turtle and Sun</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#fff;color:#1C0A00;display:flex;flex-direction:column;}

.nav-bar{background:#FFF9E6;border-bottom:1px solid rgba(28,10,0,0.08);flex-shrink:0;position:relative;z-index:100;}
.nav-wrap{max-width:1200px;margin:0 auto;padding:0 32px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0 18px;}
.nav a img{height:72px;width:auto;margin-top:-42px;display:block;}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:#1C0A00;text-decoration:none;opacity:0.7;}
.nav-links a:hover{opacity:1;}
.nav-account-btn{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:#1C0A00;background:none;border:1px solid rgba(28,10,0,0.18);border-radius:8px;padding:7px 16px;cursor:pointer;transition:background 0.15s;}
.nav-account-btn:hover{background:rgba(28,10,0,0.06);}
#accountDropdown{position:absolute;top:calc(100% - 4px);right:32px;background:#fff;border:1px solid rgba(28,10,0,0.12);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.12);min-width:200px;z-index:500;padding:8px 0;opacity:0;visibility:hidden;transform:translateY(-6px);transition:opacity 0.18s ease,visibility 0.18s ease,transform 0.18s ease;}
#accountDropdown.open{opacity:1;visibility:visible;transform:translateY(0);}
.dd-user-email{padding:10px 16px 8px;font-size:12px;color:rgba(28,10,0,0.45);font-family:'Plus Jakarta Sans',sans-serif;border-bottom:1px solid rgba(28,10,0,0.08);margin-bottom:4px;}
.dd-nav-link{display:block;padding:8px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;color:#1C0A00;text-decoration:none;transition:background 0.1s;}
.dd-nav-link:hover{background:#FFF9E6;}
.dd-nav-sep{height:1px;background:rgba(28,10,0,0.08);margin:4px 0;}
.dd-nav-logout{color:#c0195a;}

/* ── Main canvas (full width) ───────────────────────────────────── */
.main-canvas{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}

/* ── Floating overlays ──────────────────────────────────────────── */
.fo-filters,.fo-detail{position:fixed;z-index:50;}

.fo-filters{top:76px;left:14px;width:210px;max-height:calc(100vh - 96px);overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column;}
.fo-filters::-webkit-scrollbar{display:none;}

.fo-detail{top:76px;right:14px;width:220px;max-width:220px;max-height:calc(100vh - 96px);overflow:hidden;display:none;flex-direction:column;}
.fo-detail.fo-open{display:flex;}

.fo-filters.fo-hidden{display:none;}

.fo-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.fo-close-btn{width:18px;height:18px;border:none;background:none;cursor:pointer;font-size:16px;color:rgba(28,10,0,0.45);line-height:1;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-shadow:0 0 8px rgba(255,249,230,1);}
.fo-close-btn:hover{color:#1C0A00;}
.fo-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(28,10,0,0.35);text-shadow:0 0 8px rgba(255,249,230,1),0 0 4px rgba(255,249,230,0.9);}
.fo-detail-hdr{display:flex;justify-content:flex-end;padding-bottom:4px;}

.fo-show-btn{position:fixed;top:78px;left:14px;z-index:50;border:none;background:none;cursor:pointer;font-size:22px;line-height:1;color:rgba(28,10,0,0.4);font-weight:700;display:none;padding:0;text-shadow:0 0 8px rgba(255,249,230,1),0 0 4px rgba(255,249,230,0.9);}
.fo-show-btn:hover{color:#1C0A00;}

/* Filter items – text-shadow for legibility over canvas */
.fp-item{padding:3px 0;display:flex;align-items:center;gap:6px;}
.fp-item label{display:flex;align-items:center;gap:7px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:#1C0A00;user-select:none;text-shadow:0 0 8px rgba(255,249,230,1),0 0 4px rgba(255,249,230,0.9);}
.fp-item input[type=checkbox]{width:13px;height:13px;cursor:pointer;accent-color:#3A6B20;flex-shrink:0;}
.fp-sub{padding-left:16px;}
.fp-sub2{padding-left:28px;}
.fp-sep{height:6px;background:none;margin:0;}

/* Label fade transition for zoom-based hiding */
.contact-node-g text,.group-node-g text{transition:opacity 0.2s;}

/* Mobile */
.fo-backdrop{display:none;position:fixed;inset:0;bottom:56px;background:rgba(0,0,0,0.35);z-index:190;}
.mob-toolbar{display:none;}

@media(max-width:1000px){
  .fo-filters,.fo-detail{
    position:fixed;top:0;left:0;right:0;bottom:56px;
    width:auto!important;max-height:none!important;
    background:rgba(255,249,230,0.97);backdrop-filter:blur(8px);
    z-index:200;overflow-y:auto;padding:20px 16px;
    display:none!important;flex-direction:column;
  }
  .fo-filters.fo-hidden{display:none!important;}
  .fo-filters.mob-open,.fo-detail.mob-open{display:flex!important;}
  .fo-backdrop.mob-open{display:block;}
  .fo-show-btn{display:none!important;}
  .mob-toolbar{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;
    background:rgba(255,249,230,0.97);backdrop-filter:blur(8px);
    border-top:1px solid rgba(28,10,0,0.1);
    align-items:center;justify-content:center;gap:10px;z-index:150;padding:0 16px;
  }
  .mob-btn{
    flex:1;max-width:180px;padding:9px;border:1.5px solid rgba(28,10,0,0.14);border-radius:8px;
    font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;
    cursor:pointer;background:transparent;color:#1C0A00;transition:background 0.12s;
  }
  .mob-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .mob-btn.active{background:#3A6B20;color:#fff;border-color:#3A6B20;}
  .main-canvas{padding-bottom:56px;}
}

.tooltip{position:fixed;background:#1C0A00;color:#FFF9E6;padding:8px 12px;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity 0.12s;z-index:400;max-width:260px;line-height:1.4;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.tooltip.visible{opacity:1;}

#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:50;}
#loading p{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:rgba(28,10,0,0.4);}

#graph-container{flex:1;position:relative;overflow:hidden;background:#fff;}
#graph-svg{width:100%;height:100%;display:block;}

#outline-container{flex:1;overflow-y:auto;background:#fff;display:none;}
.outline-inner{max-width:760px;margin:0 auto;padding:24px 24px 100px;}
.ol-group{margin-bottom:10px;border-radius:10px;border:1px solid rgba(28,10,0,0.09);overflow:hidden;}
.ol-group-hdr{display:flex;align-items:center;gap:8px;padding:11px 16px;background:#f7f4ef;cursor:pointer;user-select:none;}
.ol-group-hdr:hover{background:#f0ede6;}
.ol-tri{font-size:9px;color:rgba(28,10,0,0.35);width:12px;text-align:center;transition:transform 0.15s;flex-shrink:0;}
.ol-group.ol-collapsed .ol-tri,.ol-sub.ol-collapsed .ol-tri{transform:rotate(-90deg);}
.ol-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ol-group-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:800;color:#1C0A00;flex:1;}
.ol-count{font-size:11px;color:rgba(28,10,0,0.35);flex-shrink:0;}
.ol-cb{width:14px;height:14px;cursor:pointer;accent-color:#3A6B20;flex-shrink:0;}
.ol-group-body{padding:4px 0;}
.ol-group.ol-collapsed .ol-group-body,.ol-sub.ol-collapsed .ol-sub-body{display:none;}
.ol-sub{margin:4px 16px 6px;border-radius:8px;border:1px solid rgba(28,10,0,0.07);overflow:hidden;}
.ol-sub-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fafaf8;cursor:pointer;user-select:none;}
.ol-sub-hdr:hover{background:#f5f2ea;}
.ol-sub-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:#1C0A00;flex:1;}
.ol-sub-body{padding:2px 0;}
.ol-row{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;border-bottom:1px solid rgba(28,10,0,0.04);}
.ol-row:last-child{border-bottom:none;}
.ol-row:hover{background:#FFF9E6;}
.ol-deceased .ol-row-name{color:#888;font-style:italic;}
.ol-row-cb{width:13px;height:13px;cursor:pointer;accent-color:#3A6B20;flex-shrink:0;}
.ol-row-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:#1C0A00;flex:1;min-width:0;}
.ol-row-meta{font-size:11px;color:rgba(28,10,0,0.4);flex-shrink:0;white-space:nowrap;}
#ol-bulk-bar{position:fixed;bottom:-64px;left:0;right:0;background:#1C0A00;color:#FFF9E6;padding:14px 24px;display:flex;align-items:center;justify-content:center;z-index:150;transition:bottom 0.2s;}
#ol-bulk-bar.visible{bottom:0;}
.btn-loveogram{padding:9px 24px;background:#c0195a;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-loveogram:hover{background:#9e1048;}

/* Calendar */
#calendar-container{flex:1;flex-direction:column;overflow:hidden;display:none;background:#fff;}
.cal-toolbar{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid rgba(28,10,0,0.08);flex-shrink:0;background:#fff;flex-wrap:wrap;}
.cal-today-btn{padding:5px 12px;background:#3A6B20;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;}
.cal-today-btn:hover{background:#1C0A00;}
.cal-nav-btn{padding:5px 10px;background:#f0ede6;border:none;border-radius:6px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:rgba(28,10,0,0.7);}
.cal-nav-btn:hover{background:#e0dcd4;}
.cal-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:800;color:#1C0A00;flex:1;text-align:center;min-width:140px;}
.cal-zoom-btn{padding:4px 10px;background:#f0ede6;border:none;border-radius:6px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:rgba(28,10,0,0.55);}
.cal-zoom-btn.active{background:#3A6B20;color:#fff;}
.cal-print-btn{padding:4px 11px;background:#f0ede6;border:none;border-radius:6px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:rgba(28,10,0,0.55);}
.cal-print-btn:hover{background:#3A6B20;color:#fff;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px;flex-shrink:0;border-bottom:1px solid rgba(28,10,0,0.06);}
.cal-dow{text-align:center;padding:5px 2px;font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;color:rgba(28,10,0,0.35);text-transform:uppercase;letter-spacing:0.04em;}
.cal-grid-wrap{flex:1;overflow-y:auto;padding:6px 12px 24px;}
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{min-height:80px;border-radius:7px;padding:5px 6px;background:#f9f7f2;}
.cal-cell.today{background:#e8f0e0;outline:2px solid #3A6B20;}
.cal-cell.other-month{opacity:0.4;}
.cal-day-num{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:rgba(28,10,0,0.45);margin-bottom:3px;}
.cal-cell.today .cal-day-num{color:#3A6B20;}
.cal-chip{display:block;font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.4;}
.cal-chip:hover{opacity:0.75;}
.cal-chip.birthday{background:#e8f0e0;color:#2d5a16;}
.cal-chip.occasion{background:#fef3e2;color:#b85e10;}
.cal-chip.remembrance{background:#f0ede6;color:rgba(28,10,0,0.55);}
.cal-chip.milestone{background:#e8e0f0;color:#6b2d9a;}

</style>

<!-- Full-width canvas -->

<script>
const PALETTE = ['#1A5C32','#1A3566','#4A2060','#5A3010','#1A4A5A','#3D5A1A','#6B2A14','#1A4A3A'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const NW = 130, NH = 46, NRX = 10;
const GNW = 164, GNH = 60, GNRX = 14;
const SGW = 134, SGH = 44, SGRX = 11;
const FAMILY_COLOR = '#7B1D2E';

function lightenHex(hex, t) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(v => Math.round(v+(255-v)*t).toString(16).padStart(2,'0')).join('');
}

let _allNodes = [], _relLinks = [], _memberLinks = [], _contactMap = {};
let _meNodeId = '__me__';
let _unrelatedIds = new Set();
let _nodeGroups = {};
let _groupNodeName = {};
let _contactGroupNames = {};
let _allGroupNames = [];
let GROUP_COLORS = {};
let GROUP_DEPTH = {};
let _simulation, _svg, _g;
let _nodeSel, _groupNodeSel, _relLinkSel, _hitAreaSel, _memberLinkSel, _subgroupLinkSel, _meLinkSel;
let _width, _height;
let _currentTransform = d3.zoomIdentity;
let _filteredOutNodeIds = new Set();
let _filteredOutGroupIds = new Set();
let _cullTimer = null;
let _isDragging = false;
let _subgroupIds = new Set();
let _subgroupParents = {};
let _rawGroups = [];
let _groupMembersMap = {};
let _groupByName = {};
let _groupById = {};
let _contactFamilyRelLabel = {};
let _currentView = new URLSearchParams(location.search).get('view') || 'network';
let _selectedContacts = new Set();
let _groupsWithCheckbox = new Set();
let _contactOccasions = {};
let _nodeHeights = {};
let _rawOccasions = [];
const _today = new Date(); _today.setHours(0, 0, 0, 0);

// Calendar state
let _calYear = null, _calMonth = null, _calZoom = 'month', _calWeekStart = null;

function formatDate(str) {
  if (!str) return '';
  const p = (str.split('T')[0]).split('-');
  if (p.length < 3) return str;
  return `${parseInt(p[2], 10)} ${MONTHS[parseInt(p[1], 10) - 1] || p[1]} ${p[0]}`;
}
function formatBirthdayShort(str) {
  if (!str) return '';
  const p = (str.split('T')[0]).split('-');
  if (p.length < 3) return str;
  return `${parseInt(p[2], 10)} ${MONTHS[parseInt(p[1], 10) - 1] || p[1]}`;
}
function yearOf(str) { return str ? parseInt(str.split('-')[0]) : null; }
function truncate(s, n) { s = s || ''; return s.length > n ? s.slice(0, n - 1) + '…' : s; }
function cleanRel(s) { return (s || '').replace(/ of$/i, ''); }

function calcAge(birthdayStr, diedOnStr) {
  if (!birthdayStr) return null;
  const b = new Date(birthdayStr.split('T')[0]);
  const ref = diedOnStr ? new Date(diedOnStr.split('T')[0]) : _today;
  let age = ref.getFullYear() - b.getFullYear();
  const m = ref.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && ref.getDate() < b.getDate())) age--;
  return age >= 0 ? age : null;
}

function nextYearlyDate(dateStr) {
  if (!dateStr) return null;
  const p = dateStr.split('T')[0].split('-');
  const month = parseInt(p[1]) - 1, day = parseInt(p[2]);
  let next = new Date(_today.getFullYear(), month, day);
  if (next < _today) next = new Date(_today.getFullYear() + 1, month, day);
  return next;
}

function processOccasions(occasions) {
  _contactOccasions = {};
  occasions.forEach(o => {
    let label, daysUntil;
    if (o.frequency === 'yearly') {
      const next = nextYearlyDate(o.start_date);
      if (!next) return;
      const years = next.getFullYear() - yearOf(o.start_date);
      const yPart = years > 0 ? ` (${years}y)` : '';
      label = `${truncate(o.name, 11)}: ${next.getDate()} ${MONTHS[next.getMonth()]}${yPart}`;
      daysUntil = Math.round((next - _today) / 864e5);
    } else {
      const next = new Date(o.start_date.split('T')[0]);
      if (next < _today) return;
      label = `${truncate(o.name, 11)}: ${next.getDate()} ${MONTHS[next.getMonth()]}`;
      daysUntil = Math.round((next - _today) / 864e5);
    }
    if (!_contactOccasions[o.contact_id]) _contactOccasions[o.contact_id] = [];
    _contactOccasions[o.contact_id].push({ label, daysUntil });
  });
  Object.values(_contactOccasions).forEach(arr => arr.sort((a, b) => a.daysUntil - b.daysUntil));
}

function nodeLayout(d) {
  const ROWY = 13, PAD = 8, GAP = 2;
  const hasDate = !!(d.birthday || d.died_on);
  const occs = (_contactOccasions[d.id] || []).slice(0, 2);
  const rows = 1 + (hasDate ? 1 : 0) + occs.length;
  const contentH = rows * ROWY + Math.max(0, rows - 1) * GAP;
  const h = Math.max(38, PAD * 2 + contentH);
  const startY = -contentH / 2 + ROWY / 2;
  const items = [];
  let ri = 0;
  items.push({
    y: startY + ri++ * (ROWY + GAP),
    text: truncate((d.is_pet ? '🐾 ' : '') + (d.name || 'Unnamed'), 18),
    fontSize: 10, fontWeight: 800,
    fill: d.died_on ? '#888' : '#1C0A00',
    fontStyle: d.died_on ? 'italic' : 'normal',
  });
  if (hasDate) {
    let txt = '';
    if (d.died_on) {
      const by = yearOf(d.birthday), dy = yearOf(d.died_on);
      const age = calcAge(d.birthday, d.died_on);
      txt = by && dy ? `${by} – ${dy}` + (age !== null ? ` — ${age}` : '')
                     : dy ? `† ${dy}` + (age !== null ? ` — ${age}` : '') : '';
    } else {
      const age = calcAge(d.birthday, null);
      txt = formatBirthdayShort(d.birthday) + (age !== null ? ` — ${age}` : '');
    }
    items.push({
      y: startY + ri++ * (ROWY + GAP),
      text: txt, fontSize: 8.5, fontWeight: 600,
      fill: d.died_on ? '#999' : 'rgba(28,10,0,0.55)', fontStyle: 'normal',
    });
  }
  occs.forEach(o => {
    items.push({
      y: startY + ri++ * (ROWY + GAP),
      text: o.label, fontSize: 8, fontWeight: 500,
      fill: '#b85e10', fontStyle: 'normal',
    });
  });
  return { h, items };
}

function toggleParentCb(cb) {
  const cascade = (name, checked) => {
    document.querySelectorAll(`#cbGroup input[data-parent-group="${CSS.escape(name)}"]`)
      .forEach(child => { child.checked = checked; cascade(child.dataset.group, checked); });
  };
  cascade(cb.dataset.group, cb.checked);
  applyFilter();
}

async function init() {
  const [netRes, occRes] = await Promise.all([
    fetch('/api/network'),
    fetch('/api/occasions/upcoming'),
  ]);
  const data = await netRes.json();
  if (occRes.ok) {
    const occData = await occRes.json();
    _rawOccasions = occData.occasions || [];
    processOccasions(_rawOccasions);
  }

  data.contacts.forEach(c => { _contactMap[c.id] = c; });

  _subgroupIds = new Set();
  _subgroupParents = {};
  const groupDefsById = {};
  (data.groups || []).forEach(g => {
    groupDefsById[g.id] = g;
    if (g.parent_group_id) { _subgroupIds.add(g.id); _subgroupParents[g.id] = g.parent_group_id; }
  });

  _groupNodeName = {};
  _contactGroupNames = {};
  const groupNodeMap = {};

  (data.group_memberships || []).forEach(m => {
    if (!groupNodeMap[m.group_id]) {
      groupNodeMap[m.group_id] = { id: `g_${m.group_id}`, name: m.group_name, isGroup: true };
      _groupNodeName[`g_${m.group_id}`] = m.group_name;
    }
    if (!_contactGroupNames[m.contact_id]) _contactGroupNames[m.contact_id] = new Set();
    _contactGroupNames[m.contact_id].add(m.group_name);
  });

  (data.groups || []).forEach(g => {
    if (!groupNodeMap[g.id]) {
      groupNodeMap[g.id] = { id: `g_${g.id}`, name: g.name, isGroup: true };
      _groupNodeName[`g_${g.id}`] = g.name;
    }
  });

  const topGroupDefs = (data.groups || []).filter(g => !g.parent_group_id);
  topGroupDefs.sort((a, b) => a.name === 'Family' ? -1 : b.name === 'Family' ? 1 : a.name.localeCompare(b.name));
  GROUP_COLORS = {};
  GROUP_DEPTH = {};
  topGroupDefs.forEach((g, i) => {
    GROUP_COLORS[g.name] = g.name === 'Family' ? FAMILY_COLOR : PALETTE[i % PALETTE.length];
    GROUP_DEPTH[g.name] = 0;
  });
  let bfsQueue = topGroupDefs.map(g => g.id);
  const bfsVisited = new Set(bfsQueue);
  while (bfsQueue.length) {
    const nextQueue = [];
    bfsQueue.forEach(pid => {
      (data.groups || []).filter(g => g.parent_group_id === pid && !bfsVisited.has(g.id)).forEach(g => {
        const parent = groupDefsById[g.parent_group_id];
        GROUP_COLORS[g.name] = parent ? GROUP_COLORS[parent.name] : PALETTE[0];
        GROUP_DEPTH[g.name] = (GROUP_DEPTH[parent ? parent.name : ''] || 0) + 1;
        bfsVisited.add(g.id);
        nextQueue.push(g.id);
      });
    });
    bfsQueue = nextQueue;
  }

  _allGroupNames = (data.groups || []).map(g => g.name);

  const cbGroup = document.getElementById('cbGroup');
  const subsByParentId = {};
  (data.groups || []).filter(g => g.parent_group_id).forEach(g => {
    if (!subsByParentId[g.parent_group_id]) subsByParentId[g.parent_group_id] = [];
    subsByParentId[g.parent_group_id].push(g);
  });
  function addCbForGroup(g, depth, color) {
    const depthClass = depth === 0 ? '' : depth === 1 ? ' fp-sub' : ' fp-sub2';
    const item = document.createElement('div');
    item.className = 'fp-item' + depthClass;
    const gAttr = g.name.replace(/"/g, '&quot;');
    const dotSize = depth === 0 ? '8px' : depth === 1 ? '6px' : '5px';
    const dotOpacity = depth === 1 ? ';opacity:0.7' : depth >= 2 ? ';opacity:0.55' : '';
    const pName = depth > 0 ? ((groupDefsById[g.parent_group_id] || {}).name || '') : '';
    const pAttr = pName ? ` data-parent-group="${pName.replace(/"/g, '&quot;')}"` : '';
    item.innerHTML = `<label><input type="checkbox" data-group="${gAttr}"${pAttr} checked onchange="toggleParentCb(this)"><span style="display:inline-block;width:${dotSize};height:${dotSize};border-radius:50%;background:${color}${dotOpacity};flex-shrink:0;"></span> ${esc(g.name)}</label>`;
    cbGroup.appendChild(item);
    (subsByParentId[g.id] || []).sort((a, b) => a.name.localeCompare(b.name))
      .forEach(s => addCbForGroup(s, depth + 1, color));
  }
  topGroupDefs.forEach(g => addCbForGroup(g, 0, GROUP_COLORS[g.name]));
  _groupsWithCheckbox.clear();
  document.querySelectorAll('#cbGroup input[data-group]').forEach(cb => _groupsWithCheckbox.add(cb.dataset.group));

  const groupNodes = Object.values(groupNodeMap);
  _memberLinks = (data.group_memberships || []).map(m => ({
    source: `g_${m.group_id}`,
    target: m.contact_id,
    isMembership: true,
    groupName: m.group_name,
  }));

  const meContact = (data.contacts || []).find(c => c.is_me);
  _meNodeId = meContact ? meContact.id : '__me__';
  _allNodes = [
    meContact
      ? { ...meContact, id: meContact.id, name: meContact.name || 'Me', isMe: true }
      : { id: '__me__', name: 'Me', isMe: true },
    ...data.contacts.filter(c => !c.is_me).map(c => ({ id: c.id, name: c.name || 'Unnamed', ...c })),
    ...groupNodes,
  ];

  const pairMap = new Map();
  (data.relationships || []).forEach(r => {
    const lo = Math.min(r.contact_a_id, r.contact_b_id);
    const hi = Math.max(r.contact_a_id, r.contact_b_id);
    const key = `${lo}-${hi}`;
    if (!pairMap.has(key)) pairMap.set(key, { source: lo, target: hi, group: r.group_name, relA: null, relB: null });
    const link = pairMap.get(key);
    if (r.contact_a_id === lo) link.relA = r.relationship;
    else link.relB = r.relationship;
  });
  _relLinks = Array.from(pairMap.values());

  _rawGroups = data.groups || [];
  _groupByName = {};
  _groupById = {};
  _rawGroups.forEach(g => { _groupByName[g.name] = g; _groupById[g.id] = g; });
  _groupMembersMap = {};
  (data.group_memberships || []).forEach(m => {
    if (!_groupMembersMap[m.group_id]) _groupMembersMap[m.group_id] = [];
    const c = _contactMap[m.contact_id];
    if (c && !_groupMembersMap[m.group_id].find(x => x.id === c.id))
      _groupMembersMap[m.group_id].push(c);
  });
  _contactFamilyRelLabel = {};
  _relLinks.forEach(l => {
    if (l.group !== 'Family') return;
    if (l.relA && !_contactFamilyRelLabel[l.source]) _contactFamilyRelLabel[l.source] = cleanRel(l.relA);
    if (l.relB && !_contactFamilyRelLabel[l.target]) _contactFamilyRelLabel[l.target] = cleanRel(l.relB);
  });

  _relLinks.forEach(l => {
    [l.source, l.target].forEach(id => {
      if (!_nodeGroups[id]) _nodeGroups[id] = new Set();
      _nodeGroups[id].add(l.group);
    });
  });

  // Compute unrelated contacts and add virtual Unrelated hub
  _unrelatedIds = new Set(
    Object.values(_contactMap)
      .filter(c => !c.is_me && !_nodeGroups[c.id] && !_contactGroupNames[c.id])
      .map(c => c.id)
  );
  if (_unrelatedIds.size > 0) {
    GROUP_COLORS['Unrelated'] = '#9aa5b4';
    _groupNodeName['g_unrelated'] = 'Unrelated';
    _allNodes.push({ id: 'g_unrelated', name: 'Unrelated', isGroup: true, isUnrelated: true });
    for (const cid of _unrelatedIds) {
      _memberLinks.push({ source: 'g_unrelated', target: cid, isMembership: true, groupName: 'Unrelated', isUnrelated: true });
    }
    document.getElementById('cb-unrelated-wrap').style.display = '';
  }

  document.getElementById('loading').style.display = 'none';
  buildGraph();
}

function buildGraph() {
  const container = document.getElementById('graph-container');
  _width = container.clientWidth;
  _height = container.clientHeight;

  _svg = d3.select('#graph-svg').attr('width', _width).attr('height', _height);
  _svg.selectAll('*').remove();

  const zoom = d3.zoom().scaleExtent([0.05, 4])
    .filter(event => event.type !== 'dblclick')
    .on('start', () => { if (_simulation && !_isDragging) _simulation.stop(); })
    .on('zoom', e => {
      _g.attr('transform', e.transform);
      _currentTransform = e.transform;
      updateLabelVisibility(e.transform.k);
    })
    .on('end', e => {
      if (e.transform) _currentTransform = e.transform;
      scheduleViewportCull();
    });
  _svg.call(zoom);
  _g = _svg.append('g');

  const nodesCopy = _allNodes.map(n => ({ ...n }));
  const idToNode = {};
  nodesCopy.forEach(n => { idToNode[n.id] = n; });

  const relLinksCopy = _relLinks
    .map(l => ({ ...l, source: idToNode[l.source], target: idToNode[l.target] }))
    .filter(l => l.source && l.target);

  const memberLinksCopy = _memberLinks
    .map(l => ({ ...l, source: idToNode[l.source], target: idToNode[l.target] }))
    .filter(l => l.source && l.target);

  _nodeHeights = {};
  _allNodes.forEach(n => { if (!n.isGroup && !n.isMe) _nodeHeights[n.id] = nodeLayout(n).h; });

  const subgroupLinksCopy = [];
  Object.entries(_subgroupParents).forEach(([subIdStr, parentId]) => {
    const subNode = idToNode[`g_${subIdStr}`];
    const parentNode = idToNode[`g_${parentId}`];
    if (subNode && parentNode) subgroupLinksCopy.push({ source: parentNode, target: subNode, isSubgroupLink: true });
  });

  const childGroupIds = new Set(_rawGroups.filter(g => g.parent_group_id).map(g => g.parent_group_id));
  const meNode = idToNode[_meNodeId];
  const meLinksCopy = [];
  if (meNode) {
    _rawGroups.filter(g => !childGroupIds.has(g.id)).forEach(g => {
      const gNode = idToNode[`g_${g.id}`];
      if (gNode) meLinksCopy.push({ source: meNode, target: gNode, isMeLink: true });
    });
    const unrelatedHub = idToNode['g_unrelated'];
    if (unrelatedHub) meLinksCopy.push({ source: meNode, target: unrelatedHub, isMeLink: true, isUnrelated: true });
  }

  _simulation = d3.forceSimulation(nodesCopy)
    .force('link', d3.forceLink([...relLinksCopy, ...memberLinksCopy, ...subgroupLinksCopy, ...meLinksCopy]).id(d => d.id)
      .distance(d => d.isSubgroupLink ? 55 : d.isMembership ? 80 : d.isMeLink ? 120 : 120)
      .strength(d => d.isSubgroupLink ? 0.8 : d.isMembership ? 0.25 : d.isMeLink ? 0.12 : 0.5))
    .force('charge', d3.forceManyBody().strength(d => d.isGroup ? -100 : -220))
    .force('center', d3.forceCenter(_width / 2, _height / 2).strength(1))
    .force('x', d3.forceX(_width / 2).strength(0.025))
    .force('y', d3.forceY(_height / 2).strength(0.025))
    .force('collision', d3.forceCollide().radius(d => {
      if (d.isMe) return Math.sqrt((GNW / 2) ** 2 + (GNH / 2) ** 2) + 6;
      if (d.isGroup) {
        const isSub = _subgroupIds.has(parseInt(d.id.replace('g_', '')));
        const w = isSub ? SGW : GNW, h = isSub ? SGH : GNH;
        return Math.sqrt((w / 2) ** 2 + (h / 2) ** 2) + 4;
      }
      const h = _nodeHeights[d.id] || NH;
      return Math.sqrt((NW / 2) ** 2 + (h / 2) ** 2) + 6;
    }));

  _meLinkSel = _g.append('g').attr('class', 'me-links')
    .selectAll('line').data(meLinksCopy).join('line')
    .attr('stroke', '#3A6B20').attr('stroke-opacity', 0.3)
    .attr('stroke-width', 1.5).attr('stroke-dasharray', '3,6');

  _subgroupLinkSel = _g.append('g').attr('class', 'subgroup-links')
    .selectAll('line').data(subgroupLinksCopy).join('line')
    .attr('stroke', d => GROUP_COLORS[_groupNodeName[d.target.id]] || '#888')
    .attr('stroke-opacity', 0.3).attr('stroke-width', 1.5).attr('stroke-dasharray', '3,4');

  _memberLinkSel = _g.append('g').attr('class', 'member-links')
    .selectAll('line').data(memberLinksCopy).join('line')
    .attr('stroke', '#555').attr('stroke-opacity', 0.45)
    .attr('stroke-width', 2).attr('stroke-dasharray', '5,4');

  _relLinkSel = _g.append('g').attr('class', 'rel-links')
    .selectAll('line').data(relLinksCopy).join('line')
    .attr('stroke', d => GROUP_COLORS[d.group] || '#333')
    .attr('stroke-opacity', 0.75).attr('stroke-width', 2.5).style('cursor', 'pointer');

  _hitAreaSel = _g.append('g').attr('class', 'rel-hitareas')
    .selectAll('line').data(relLinksCopy).join('line')
    .attr('stroke', 'transparent').attr('stroke-width', 16).style('cursor', 'pointer')
    .on('mouseenter', edgeEnter).on('mousemove', moveTooltip).on('mouseleave', hideTooltip);

  const groupNodesCopy = nodesCopy.filter(n => n.isGroup);
  const groupG = _g.append('g').attr('class', 'group-nodes')
    .selectAll('g').data(groupNodesCopy).join('g')
    .attr('class', 'group-node-g').style('cursor', 'default')
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd));

  groupG.each(function(d) {
    const gid = parseInt(d.id.replace('g_', ''));
    const isSub = _subgroupIds.has(gid);
    const w = isSub ? SGW : GNW, h = isSub ? SGH : GNH, rx = isSub ? SGRX : GNRX;
    const baseColor = GROUP_COLORS[_groupNodeName[d.id]] || '#3A6B20';
    const depth = GROUP_DEPTH[_groupNodeName[d.id]] || 0;
    const fillColor = lightenHex(baseColor, depth * 0.18);
    const g = d3.select(this);
    g.append('rect').attr('x', -w/2).attr('y', -h/2).attr('width', w).attr('height', h).attr('rx', rx)
      .attr('fill', '#fff').attr('stroke', 'none');
    g.append('rect').attr('x', -w/2).attr('y', -h/2).attr('width', w).attr('height', h).attr('rx', rx)
      .attr('fill', fillColor).attr('stroke', 'none');
    const name = _groupNodeName[d.id] || d.name;
    g.append('text')
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
      .attr('font-family', "'Plus Jakarta Sans', sans-serif")
      .attr('font-size', isSub ? 10 : 13).attr('font-weight', 800).attr('fill', '#FFF9E6')
      .text(truncate((name === 'Family' ? '♥ ' : '') + name, isSub ? 13 : 17));
  });

  _groupNodeSel = groupG;

  const contactsCopy = nodesCopy.filter(n => !n.isGroup);
  const nodeG = _g.append('g').attr('class', 'contact-nodes')
    .selectAll('g').data(contactsCopy).join('g')
    .attr('class', 'contact-node-g')
    .style('cursor', d => (d.isMe && !Number.isInteger(d.id)) ? 'default' : 'pointer')
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd))
    .on('mouseenter', showTooltip).on('mousemove', moveTooltip).on('mouseleave', hideTooltip)
    .on('click', nodeClick)
    .on('dblclick', nodeDoubleClick);

  const meG = nodeG.filter(d => d.isMe);
  meG.append('rect').attr('x', -GNW / 2).attr('y', -GNH / 2)
    .attr('width', GNW).attr('height', GNH).attr('rx', GNRX)
    .attr('fill', '#fff').attr('stroke', 'none');
  meG.append('rect').attr('x', -GNW / 2).attr('y', -GNH / 2)
    .attr('width', GNW).attr('height', GNH).attr('rx', GNRX)
    .attr('class', 'node-outline')
    .attr('fill', '#3A6B2022').attr('stroke', '#3A6B20').attr('stroke-width', 4)
    .attr('stroke-dasharray', '6,4');
  meG.append('text')
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('font-family', "'Plus Jakarta Sans', sans-serif")
    .attr('font-size', 13).attr('font-weight', 800).attr('fill', '#3A6B20').text(d => d.name || 'Me');

  const cG = nodeG.filter(d => !d.isMe);
  cG.each(function(d) {
    const { h, items } = nodeLayout(d);
    const g = d3.select(this);
    g.append('rect').attr('class', 'node-outline')
      .attr('x', -NW / 2).attr('y', -h / 2).attr('width', NW).attr('height', h).attr('rx', NRX)
      .attr('fill', d.died_on ? '#f0ede6' : d.is_pet ? '#FFF3DC' : '#f7f4ef')
      .attr('stroke', nodeStroke(d)).attr('stroke-width', 3);
    items.forEach(item => {
      g.append('text')
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central').attr('y', item.y)
        .attr('font-family', "'Plus Jakarta Sans', sans-serif")
        .attr('font-size', item.fontSize).attr('font-weight', item.fontWeight)
        .attr('fill', item.fill).attr('font-style', item.fontStyle).text(item.text);
    });
  });

  _nodeSel = nodeG;

  _simulation.on('tick', () => {
    _meLinkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    _subgroupLinkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    _relLinkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    _hitAreaSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    _memberLinkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
    groupG.attr('transform', d => `translate(${d.x},${d.y})`);
  }).on('end', () => {
    scheduleViewportCull();
  });

  applyVisibility();
}

// ── Filters ───────────────────────────────────────────────────────────────────
function getActiveGroups() {
  const active = new Set();
  document.querySelectorAll('#cbGroup input[data-group]').forEach(cb => {
    if (cb.checked) active.add(cb.dataset.group);
  });
  return active;
}

function toggleAll() {
  const checked = document.getElementById('cb-all').checked;
  document.querySelectorAll('#cbGroup input[data-group]').forEach(cb => cb.checked = checked);
  applyVisibility();
}

function applyFilter() {
  const allChecked = [...document.querySelectorAll('#cbGroup input[data-group]')].every(cb => cb.checked);
  document.getElementById('cb-all').checked = allChecked;
  if (_simulation) _simulation.alpha(0.1).restart();
  applyVisibility();
}

function isGroupNameActive(groupName, active) {
  if (_groupsWithCheckbox.has(groupName)) return active.has(groupName);
  if (active.has(groupName)) return true;
  const g = _groupByName[groupName];
  if (!g || !g.parent_group_id) return false;
  const parent = _groupById[g.parent_group_id];
  return parent ? isGroupNameActive(parent.name, active) : false;
}

function computeVisibleNodeIds(active, showOnlyLiving) {
  const showUnrelated = !document.getElementById('cb-show-unrelated') || document.getElementById('cb-show-unrelated').checked;
  const visible = new Set();
  _nodeSel.each(d => {
    if (d.isMe) { visible.add(d.id); return; }
    if (showOnlyLiving && d.died_on) return;
    if (_unrelatedIds.has(d.id)) {
      if (showUnrelated) visible.add(d.id);
      return;
    }
    const relGroups = _nodeGroups[d.id];
    if (relGroups) { for (const g of relGroups) { if (isGroupNameActive(g, active)) { visible.add(d.id); return; } } }
    const memGroups = _contactGroupNames[d.id];
    if (memGroups) { for (const g of memGroups) { if (isGroupNameActive(g, active)) { visible.add(d.id); return; } } }
  });
  return visible;
}

function computeVisibleGroupIds(active) {
  const showUnrelated = !document.getElementById('cb-show-unrelated') || document.getElementById('cb-show-unrelated').checked;
  const visible = new Set();
  _groupNodeSel.each(d => {
    if (d.id === 'g_unrelated') {
      if (showUnrelated && _unrelatedIds.size > 0) visible.add(d.id);
      return;
    }
    if (isGroupNameActive(_groupNodeName[d.id], active)) visible.add(d.id);
  });
  return visible;
}

function applyVisibility() {
  if (_currentView === 'outline') { renderOutline(); return; }
  if (_currentView === 'calendar') { renderCalendar(); return; }
  if (!_nodeSel || !_relLinkSel) return;
  const active = getActiveGroups();
  const showOnlyLiving = document.getElementById('cb-living').checked;

  const visibleNodeIds  = computeVisibleNodeIds(active, showOnlyLiving);
  const visibleGroupIds = computeVisibleGroupIds(active);

  // Track filter state separately so viewport culling can respect it
  _filteredOutNodeIds = new Set();
  _filteredOutGroupIds = new Set();
  _nodeSel.each(d => { if (!visibleNodeIds.has(d.id)) _filteredOutNodeIds.add(d.id); });
  _groupNodeSel.each(d => { if (!visibleGroupIds.has(d.id)) _filteredOutGroupIds.add(d.id); });

  _nodeSel.attr('display', d => visibleNodeIds.has(d.id) ? null : 'none');
  _groupNodeSel.attr('display', d => visibleGroupIds.has(d.id) ? null : 'none');

  const relVisible = l => {
    if (!active.has(l.group)) return false;
    const sId = typeof l.source === 'object' ? l.source.id : l.source;
    const tId = typeof l.target === 'object' ? l.target.id : l.target;
    return visibleNodeIds.has(sId) && visibleNodeIds.has(tId);
  };
  _relLinkSel.attr('display', l => relVisible(l) ? null : 'none');
  _hitAreaSel.attr('display', l => relVisible(l) ? null : 'none');

  _memberLinkSel.attr('display', l => {
    const srcId = typeof l.source === 'object' ? l.source.id : l.source;
    const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
    if (!visibleGroupIds.has(srcId)) return 'none';
    if (!visibleNodeIds.has(tgtId)) return 'none';
    if (srcId === 'g_unrelated') return null;
    const gname = _groupNodeName[srcId] || l.groupName;
    if (!isGroupNameActive(gname, active)) return 'none';
    return null;
  });

  if (_subgroupLinkSel) {
    _subgroupLinkSel.attr('display', l => {
      const srcId = typeof l.source === 'object' ? l.source.id : l.source;
      const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
      return visibleGroupIds.has(srcId) && visibleGroupIds.has(tgtId) ? null : 'none';
    });
  }

  if (_meLinkSel) {
    _meLinkSel.attr('display', l => {
      const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
      return visibleGroupIds.has(tgtId) ? null : 'none';
    });
  }

  scheduleViewportCull();
}

// ── Drag ──────────────────────────────────────────────────────────────────────
function dragStart(event, d) {
  _isDragging = true;
  if (!event.active) {
    // Un-cull all nodes before restarting so moving nodes reveal neighbours
    if (_nodeSel) _nodeSel.attr('display', n => _filteredOutNodeIds.has(n.id) ? 'none' : null);
    if (_groupNodeSel) _groupNodeSel.attr('display', n => _filteredOutGroupIds.has(n.id) ? 'none' : null);
    _simulation.alphaTarget(0.3).restart();
  }
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) { _isDragging = false; if (!event.active) _simulation.alphaTarget(0); d.fx = null; d.fy = null; }

// ── Label visibility (zoom-based) ────────────────────────────────────────────
function updateLabelVisibility(scale) {
  if (!_nodeSel || !_groupNodeSel) return;
  _nodeSel.selectAll('text').style('opacity', scale < 0.5 ? '0' : '1');
  _groupNodeSel.selectAll('text').style('opacity', scale < 0.3 ? '0' : '1');
}

// ── Viewport culling ──────────────────────────────────────────────────────────
function scheduleViewportCull() {
  clearTimeout(_cullTimer);
  _cullTimer = setTimeout(runViewportCull, 150);
}

function runViewportCull() {
  if (!_nodeSel || !_groupNodeSel) return;
  if (_simulation && _simulation.alpha() > 0.02) return; // skip during active sim
  const container = document.getElementById('graph-container');
  if (!container || container.style.display === 'none') return;
  const W = container.clientWidth, H = container.clientHeight;
  const buf = 200;
  const t = _currentTransform;
  const x0 = (-t.x - buf) / t.k, x1 = (W - t.x + buf) / t.k;
  const y0 = (-t.y - buf) / t.k, y1 = (H - t.y + buf) / t.k;
  _nodeSel.attr('display', d => {
    if (_filteredOutNodeIds.has(d.id)) return 'none';
    if (d.x == null) return null;
    return (d.x >= x0 && d.x <= x1 && d.y >= y0 && d.y <= y1) ? null : 'none';
  });
  _groupNodeSel.attr('display', d => {
    if (_filteredOutGroupIds.has(d.id)) return 'none';
    if (d.x == null) return null;
    return (d.x >= x0 && d.x <= x1 && d.y >= y0 && d.y <= y1) ? null : 'none';
  });
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(event, d) {
  if (d.isMe && !Number.isInteger(d.id)) return;
  tooltip.textContent = d.name || 'Unnamed';
  tooltip.classList.add('visible');
  moveTooltip(event);
}

function edgeEnter(event, d) {
  const sNode = typeof d.source === 'object' ? d.source : null;
  const tNode = typeof d.target === 'object' ? d.target : null;
  const sName = sNode ? (sNode.name || 'Unknown') : 'Unknown';
  const tName = tNode ? (tNode.name || 'Unknown') : 'Unknown';
  let text;
  const rA = cleanRel(d.relA), rB = cleanRel(d.relB);
  if (!rA && !rB) text = `${sName} ↔ ${tName}`;
  else if (!rB || rA === rB) text = `${sName} & ${tName}: ${rA}`;
  else text = `${truncate(sName,16)}: ${rA}\n${truncate(tName,16)}: ${rB}`;
  tooltip.style.whiteSpace = 'pre';
  tooltip.textContent = text;
  tooltip.classList.add('visible');
  moveTooltip(event);
}

function moveTooltip(event) {
  tooltip.style.left = (event.clientX + 14) + 'px';
  tooltip.style.top  = (event.clientY - 10) + 'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); tooltip.style.whiteSpace = 'normal'; }

// ── Detail overlay ────────────────────────────────────────────────────────────
let _detailId = null;

function nodeClick(event, d) { if (d.isMe && !Number.isInteger(d.id)) return; event.stopPropagation(); openDetailPanel(d.id); }
function nodeDoubleClick(event, d) { if (d.isMe && !Number.isInteger(d.id)) return; event.stopPropagation(); forceOpenDetailPanel(d.id); }

function openDetailPanel(id) {
  const fo = document.getElementById('foDetail');
  const desktopOpen = fo.classList.contains('fo-open');
  const mobileOpen = fo.classList.contains('mob-open');
  if (desktopOpen || mobileOpen) {
    _detailId = id;
    CP.open(id);
    if (_currentView === 'network') highlightNode(id);
  }
}

function forceOpenDetailPanel(id) {
  _detailId = id;
  if (window.innerWidth <= 1000) {
    document.getElementById('foDetail').classList.add('mob-open');
    document.getElementById('foBackdrop').classList.add('mob-open');
    document.getElementById('mobDetailBtn').classList.add('active');
  } else {
    document.getElementById('foDetail').classList.add('fo-open');
  }
  CP.open(id);
  if (_currentView === 'network') highlightNode(id);
  _updateMobileDetailBtn();
}

function hideDetail() {
  document.getElementById('foDetail').classList.remove('fo-open');
  document.getElementById('foDetail').classList.remove('mob-open');
  document.getElementById('foBackdrop').classList.remove('mob-open');
  document.querySelectorAll('.mob-btn').forEach(b => b.classList.remove('active'));
  CP.close();
  clearHighlight();
  _detailId = null;
  _updateMobileDetailBtn();
}

function closePanel() {
  hideDetail();
}

function _updateMobileDetailBtn() {
  const btn = document.getElementById('mobDetailBtn');
  if (btn) btn.disabled = !_detailId;
}

function nodeStroke(d) { return d.died_on ? '#999' : d.is_pet ? '#b85e10' : '#333'; }

function highlightNode(nodeId) {
  if (!_nodeSel) return;
  _nodeSel.select('.node-outline')
    .attr('stroke', d => d.isMe ? '#3A6B20' : d.id === nodeId ? '#3A6B20' : nodeStroke(d))
    .attr('stroke-width', d => (d.isMe || d.id === nodeId) ? 4 : 3);
}

function clearHighlight() {
  if (!_nodeSel) return;
  _nodeSel.select('.node-outline')
    .attr('stroke', d => d.isMe ? '#3A6B20' : nodeStroke(d))
    .attr('stroke-width', d => d.isMe ? 4 : 3);
}

document.getElementById('graph-svg').addEventListener('click', () => closePanel());

function resizeGraph() {
  const container = document.getElementById('graph-container');
  _width = container.clientWidth;
  _height = container.clientHeight;
  if (_svg) _svg.attr('width', _width).attr('height', _height);
  if (_simulation) _simulation.force('center', d3.forceCenter(_width / 2, _height / 2)).alpha(0.1).restart();
}

window.addEventListener('resize', resizeGraph);

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── View switching ────────────────────────────────────────────────────────────
function switchView(view) {
  _currentView = view;
  document.getElementById('graph-container').style.display = view === 'network' ? '' : 'none';
  document.getElementById('outline-container').style.display = view === 'outline' ? 'block' : 'none';
  document.getElementById('calendar-container').style.display = view === 'calendar' ? 'flex' : 'none';
  if (view === 'network') { applyVisibility(); closePanel(); }
  else if (view === 'outline') renderOutline();
  else if (view === 'calendar') renderCalendar();
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function initCalendar() {
  const now = new Date();
  _calYear = now.getFullYear();
  _calMonth = now.getMonth();
  _calWeekStart = new Date(now);
  _calWeekStart.setDate(now.getDate() - now.getDay());
  _calWeekStart.setHours(0,0,0,0);
}

function setCalZoom(zoom) {
  _calZoom = zoom;
  document.querySelectorAll('.cal-zoom-btn').forEach(b => b.classList.toggle('active', b.dataset.zoom === zoom));
  const grid = document.getElementById('calGrid');
  grid.className = zoom === 'week' ? 'cal-week-grid' : 'cal-month-grid';
  const dowRow = document.getElementById('calDowRow');
  dowRow.style.display = zoom === 'week' ? 'none' : '';
  renderCalendar();
}

function calNav(delta) {
  if (_calZoom === 'month') {
    _calMonth += delta;
    if (_calMonth > 11) { _calMonth = 0; _calYear++; }
    if (_calMonth < 0) { _calMonth = 11; _calYear--; }
  } else {
    _calWeekStart = new Date(_calWeekStart);
    _calWeekStart.setDate(_calWeekStart.getDate() + delta * 7);
  }
  renderCalendar();
}

function calToday() {
  const now = new Date();
  _calYear = now.getFullYear();
  _calMonth = now.getMonth();
  _calWeekStart = new Date(now);
  _calWeekStart.setDate(now.getDate() - now.getDay());
  _calWeekStart.setHours(0,0,0,0);
  renderCalendar();
}

function getOccasionsForMonth(year, month) {
  const showOnlyLiving = document.getElementById('cb-living') && document.getElementById('cb-living').checked;
  const showUnrelated = !document.getElementById('cb-show-unrelated') || document.getElementById('cb-show-unrelated').checked;
  const byDay = {};
  const add = (day, chip) => { if (!byDay[day]) byDay[day] = []; byDay[day].push(chip); };

  for (const c of Object.values(_contactMap)) {
    if (showOnlyLiving && c.died_on) continue;
    if (!showUnrelated && _unrelatedIds.has(c.id)) continue;
    if (c.birthday) {
      const b = new Date(c.birthday);
      if (!isNaN(b.getTime()) && b.getMonth() === month) {
        add(b.getDate(), { contact_id: c.id, label: `🎂 ${c.name || 'Unnamed'}`, type: 'birthday' });
      }
    }
    if (c.died_on) {
      const d = new Date(c.died_on);
      if (!isNaN(d.getTime()) && d.getMonth() === month) {
        add(d.getDate(), { contact_id: c.id, label: `🕯 ${c.name || 'Unnamed'}`, type: 'remembrance' });
      }
    }
  }
  for (const o of _rawOccasions) {
    if (!o.start_date) continue;
    const s = new Date(o.start_date);
    if (isNaN(s.getTime())) continue;
    if (o.frequency === 'yearly' || o.frequency === 'milestone') {
      if (s.getMonth() === month) {
        add(s.getDate(), { contact_id: o.contact_id, label: o.name, type: o.frequency === 'milestone' ? 'milestone' : 'occasion' });
      }
    } else if (s.getFullYear() === year && s.getMonth() === month) {
      add(s.getDate(), { contact_id: o.contact_id, label: o.name, type: 'occasion' });
    }
  }
  return byDay;
}

function getOccasionsForDate(date) {
  const showOnlyLiving = document.getElementById('cb-living') && document.getElementById('cb-living').checked;
  const showUnrelated = !document.getElementById('cb-show-unrelated') || document.getElementById('cb-show-unrelated').checked;
  const result = [];
  const month = date.getMonth(), day = date.getDate(), year = date.getFullYear();
  for (const c of Object.values(_contactMap)) {
    if (showOnlyLiving && c.died_on) continue;
    if (!showUnrelated && _unrelatedIds.has(c.id)) continue;
    if (c.birthday) {
      const b = new Date(c.birthday);
      if (!isNaN(b.getTime()) && b.getMonth() === month && b.getDate() === day)
        result.push({ contact_id: c.id, label: `🎂 ${c.name || 'Unnamed'}`, type: 'birthday' });
    }
    if (c.died_on) {
      const d = new Date(c.died_on);
      if (!isNaN(d.getTime()) && d.getMonth() === month && d.getDate() === day)
        result.push({ contact_id: c.id, label: `🕯 ${c.name || 'Unnamed'}`, type: 'remembrance' });
    }
  }
  for (const o of _rawOccasions) {
    if (!o.start_date) continue;
    const s = new Date(o.start_date);
    if (isNaN(s.getTime())) continue;
    if ((o.frequency === 'yearly' || o.frequency === 'milestone') && s.getMonth() === month && s.getDate() === day)
      result.push({ contact_id: o.contact_id, label: o.name, type: o.frequency === 'milestone' ? 'milestone' : 'occasion' });
    else if (!o.frequency || o.frequency === 'one-time') {
      if (s.getFullYear() === year && s.getMonth() === month && s.getDate() === day)
        result.push({ contact_id: o.contact_id, label: o.name, type: 'occasion' });
    }
  }
  return result;
}

function renderCalendar() {
  if (_calZoom === 'month') {
    document.getElementById('calTitle').textContent = `${MONTHS_FULL[_calMonth]} ${_calYear}`;
    renderCalMonth(_calYear, _calMonth);
  } else {
    const end = new Date(_calWeekStart); end.setDate(end.getDate() + 6);
    document.getElementById('calTitle').textContent =
      `${MONTHS[_calWeekStart.getMonth()]} ${_calWeekStart.getDate()} – ${MONTHS[end.getMonth()]} ${end.getDate()}, ${end.getFullYear()}`;
    renderCalWeek(_calWeekStart);
  }
}

function renderCalMonth(year, month) {
  const grid = document.getElementById('calGrid');
  if (!grid) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayY = today.getFullYear(), todayM = today.getMonth(), todayD = today.getDate();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const byDay = getOccasionsForMonth(year, month);
  let html = '';
  for (let i = 0; i < 42; i++) {
    const off = i - firstDow;
    let day, cur;
    if (off < 0) { day = daysInPrevMonth + off + 1; cur = false; }
    else if (off >= daysInMonth) { day = off - daysInMonth + 1; cur = false; }
    else { day = off + 1; cur = true; }
    const isToday = cur && year === todayY && month === todayM && day === todayD;
    const chips = cur ? (byDay[day] || []) : [];
    html += `<div class="cal-cell${!cur?' other-month':''}${isToday?' today':''}">
      <div class="cal-day-num">${day}</div>
      ${chips.slice(0,3).map(o=>`<span class="cal-chip ${o.type}" onclick="openDetailPanel(${o.contact_id})" ondblclick="forceOpenDetailPanel(${o.contact_id})" title="${esc(o.label)}">${esc(o.label)}</span>`).join('')}
      ${chips.length>3?`<span style="font-size:9px;color:rgba(28,10,0,0.4);">+${chips.length-3} more</span>`:''}
    </div>`;
  }
  grid.innerHTML = html;
}

function printCalendarMonth() {
  const year  = _calZoom === 'month' ? _calYear  : _calWeekStart.getFullYear();
  const month = _calZoom === 'month' ? _calMonth : _calWeekStart.getMonth();
  window.open(`/print/calendar?year=${year}&month=${month}`, '_blank');
}

function printCalendarYear() {
  const year = _calZoom === 'month' ? _calYear : _calWeekStart.getFullYear();
  window.open(`/print/calendar?year=${year}`, '_blank');
}

function renderCalWeek(weekStart) {
  const grid = document.getElementById('calGrid');
  if (!grid) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
    const isToday = d.getTime() === today.getTime();
    const chips = getOccasionsForDate(d);
    html += `<div class="cal-cell${isToday?' today':''}" style="min-height:140px;">
      <div class="cal-day-num">${DOW[i]} ${d.getDate()}</div>
      ${chips.map(o=>`<span class="cal-chip ${o.type}" onclick="openDetailPanel(${o.contact_id})" ondblclick="forceOpenDetailPanel(${o.contact_id})" title="${esc(o.label)}">${esc(o.label)}</span>`).join('')}
    </div>`;
  }
  grid.innerHTML = html;
}

// ── Outline view ──────────────────────────────────────────────────────────────
function olGroupTotalCount(groupId, showOnlyLiving, active) {
  const grp = _groupById[groupId];
  const selfActive = !grp || active.has(grp.name);
  const direct = selfActive
    ? (_groupMembersMap[groupId] || []).filter(c => !showOnlyLiving || !c.died_on).length
    : 0;
  const children = _rawGroups.filter(g => g.parent_group_id === groupId);
  return direct + children.reduce((sum, g) => sum + olGroupTotalCount(g.id, showOnlyLiving, active), 0);
}

function renderOutline() {
  const active = getActiveGroups();
  const showOnlyLiving = document.getElementById('cb-living').checked;
  const inner = document.getElementById('outline-inner');
  inner.innerHTML = '';
  _selectedContacts.clear();
  updateBulkBar();

  const topGroups = _rawGroups.filter(g => !g.parent_group_id);
  topGroups.sort((a, b) => a.name === 'Family' ? -1 : b.name === 'Family' ? 1 : a.name.localeCompare(b.name));

  topGroups.forEach(g => {
    const totalVisible = olGroupTotalCount(g.id, showOnlyLiving, active);
    if (totalVisible === 0) return;
    const color = GROUP_COLORS[g.name] || '#3A6B20';
    const isFamily = g.name === 'Family';
    const el = document.createElement('div');
    el.className = 'ol-group';
    el.dataset.groupId = g.id;
    el.innerHTML = `<div class="ol-group-hdr" onclick="toggleOlGroup(this)">
      <input type="checkbox" class="ol-cb" onchange="olGroupCbChange(this,${g.id})" onclick="event.stopPropagation()">
      <span class="ol-tri">▼</span>
      <span class="ol-dot" style="background:${color}"></span>
      <span class="ol-group-name">${isFamily ? '♥ ' : ''}${esc(g.name)}</span>
      <span class="ol-count">${totalVisible}</span>
    </div><div class="ol-group-body"></div>`;
    const body = el.querySelector('.ol-group-body');
    if (isFamily) {
      const members = (_groupMembersMap[g.id] || []).filter(c => !showOnlyLiving || !c.died_on);
      renderOlFamilySection(body, members);
    } else {
      renderOlChildren(body, g.id, showOnlyLiving, active);
    }
    inner.appendChild(el);
  });

  // Unrelated section at bottom
  const showUnrelated = !document.getElementById('cb-show-unrelated') || document.getElementById('cb-show-unrelated').checked;
  if (showUnrelated && _unrelatedIds.size > 0) {
    const unrelatedContacts = [..._unrelatedIds]
      .map(id => _contactMap[id]).filter(c => c && (!showOnlyLiving || !c.died_on))
      .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    if (unrelatedContacts.length > 0) {
      const el = document.createElement('div');
      el.className = 'ol-group';
      el.innerHTML = `<div class="ol-group-hdr" onclick="toggleOlGroup(this)">
        <span class="ol-tri">▼</span>
        <span class="ol-dot" style="background:#9aa5b4"></span>
        <span class="ol-group-name">Unrelated</span>
        <span class="ol-count">${unrelatedContacts.length}</span>
      </div><div class="ol-group-body"></div>`;
      const body = el.querySelector('.ol-group-body');
      unrelatedContacts.forEach(c => body.appendChild(makeOlRow(c, 0, false)));
      inner.appendChild(el);
    }
  }
}

function renderOlFamilySection(body, members) {
  const pets = members.filter(c => c.is_pet).sort((a, b) => (a.name||'').localeCompare(b.name||''));
  const nonPets = members.filter(c => !c.is_pet).sort((a, b) => (a.name||'').localeCompare(b.name||''));
  nonPets.forEach(c => body.appendChild(makeOlRow(c, 0, true)));
  if (!pets.length) return;
  const petsEl = document.createElement('div');
  petsEl.className = 'ol-sub';
  petsEl.innerHTML = `<div class="ol-sub-hdr" onclick="toggleOlSub(this)">
    <input type="checkbox" class="ol-cb" onchange="olSubCbChange(this)" onclick="event.stopPropagation()">
    <span class="ol-tri">▼</span>
    <span class="ol-sub-name">🐾 Pets</span>
    <span class="ol-count">${pets.length}</span>
  </div><div class="ol-sub-body"></div>`;
  const pb = petsEl.querySelector('.ol-sub-body');
  pets.forEach(c => pb.appendChild(makeOlRow(c, 1, false)));
  body.appendChild(petsEl);
}

function renderOlChildren(body, groupId, showOnlyLiving, active) {
  const grp = _groupById[groupId];
  const selfActive = !grp || active.has(grp.name);
  const allMembers = selfActive
    ? (_groupMembersMap[groupId] || []).filter(c => !showOnlyLiving || !c.died_on)
    : [];
  const childGroups = _rawGroups
    .filter(g => g.parent_group_id === groupId && olGroupTotalCount(g.id, showOnlyLiving, active) > 0)
    .sort((a, b) => a.name.localeCompare(b.name));
  const childMemberIds = new Set();
  const collectDescendantMembers = gid => {
    (_groupMembersMap[gid] || []).forEach(c => childMemberIds.add(c.id));
    _rawGroups.filter(g => g.parent_group_id === gid).forEach(g => collectDescendantMembers(g.id));
  };
  childGroups.forEach(g => collectDescendantMembers(g.id));
  allMembers.filter(c => !childMemberIds.has(c.id))
    .sort((a, b) => (a.name||'').localeCompare(b.name||''))
    .forEach(c => body.appendChild(makeOlRow(c, 0, false)));
  childGroups.forEach(g => {
    const count = olGroupTotalCount(g.id, showOnlyLiving, active);
    if (!count) return;
    const subEl = document.createElement('div');
    subEl.className = 'ol-sub';
    subEl.dataset.subId = g.id;
    subEl.innerHTML = `<div class="ol-sub-hdr" onclick="toggleOlSub(this)">
      <input type="checkbox" class="ol-cb" onchange="olSubCbChange(this)" onclick="event.stopPropagation()">
      <span class="ol-tri">▼</span>
      <span class="ol-sub-name">${esc(g.name)}</span>
      <span class="ol-count">${count}</span>
    </div><div class="ol-sub-body"></div>`;
    const sb = subEl.querySelector('.ol-sub-body');
    renderOlChildren(sb, g.id, showOnlyLiving, active);
    body.appendChild(subEl);
  });
}

function makeOlRow(c, depth, showRelLabel) {
  const row = document.createElement('div');
  row.className = 'ol-row' + (c.died_on ? ' ol-deceased' : '');
  row.dataset.contactId = c.id;
  if (depth > 0) row.style.paddingLeft = (depth * 12 + 16) + 'px';
  const name = (c.is_pet ? '🐾 ' : '') + (c.name || 'Unnamed');
  const metaRaw = olMeta(c);
  const relLabel = showRelLabel ? (_contactFamilyRelLabel[c.id] || '') : '';
  let metaStr = '';
  if (metaRaw && relLabel) metaStr = `(${metaRaw}) — ${relLabel}`;
  else if (metaRaw) metaStr = `(${metaRaw})`;
  else if (relLabel) metaStr = relLabel;
  row.innerHTML = `<input type="checkbox" class="ol-row-cb" onclick="event.stopPropagation()" onchange="olRowCbChange(this,${c.id})">
    <span class="ol-row-name">${esc(name)}</span>
    <span class="ol-row-meta">${esc(metaStr)}</span>`;
  row.addEventListener('click', e => { if (e.target.tagName === 'INPUT') return; openDetailPanel(c.id); });
  row.addEventListener('dblclick', e => { if (e.target.tagName === 'INPUT') return; forceOpenDetailPanel(c.id); });
  return row;
}

function olMeta(c) {
  if (c.died_on) {
    const by = yearOf(c.birthday), dy = yearOf(c.died_on);
    const age = calcAge(c.birthday, c.died_on);
    if (by && dy) return `${by}–${dy}${age !== null ? `, ${age} yrs` : ''} †`;
    return dy ? `† ${dy}` : '†';
  }
  const parts = [];
  if (c.birthday) { const y = yearOf(c.birthday); if (y) parts.push(y); }
  const age = calcAge(c.birthday, null);
  if (age !== null) parts.push(`${age} yrs`);
  return parts.join(', ');
}

function toggleOlGroup(hdr) { hdr.closest('.ol-group').classList.toggle('ol-collapsed'); }
function toggleOlSub(hdr) { hdr.closest('.ol-sub').classList.toggle('ol-collapsed'); }

function olGroupCbChange(cb, groupId) {
  const el = document.querySelector(`.ol-group[data-group-id="${groupId}"]`);
  if (!el) return;
  el.querySelectorAll('.ol-row-cb').forEach(rc => {
    rc.checked = cb.checked;
    const id = parseInt(rc.closest('.ol-row').dataset.contactId);
    cb.checked ? _selectedContacts.add(id) : _selectedContacts.delete(id);
  });
  updateBulkBar();
}

function olSubCbChange(cb) {
  cb.closest('.ol-sub').querySelectorAll('.ol-row-cb').forEach(rc => {
    rc.checked = cb.checked;
    const id = parseInt(rc.closest('.ol-row').dataset.contactId);
    cb.checked ? _selectedContacts.add(id) : _selectedContacts.delete(id);
  });
  updateBulkBar();
}

function olRowCbChange(cb, contactId) {
  cb.checked ? _selectedContacts.add(contactId) : _selectedContacts.delete(contactId);
  updateBulkBar();
}

function updateBulkBar() {
  const n = _selectedContacts.size;
  document.getElementById('ol-bulk-bar').classList.toggle('visible', n > 0);
  document.getElementById('btn-loveogram').textContent = `Send Loveogram to ${n} contact${n !== 1 ? 's' : ''}`;
}

// ── Nav dropdown ──────────────────────────────────────────────────────────────
function handleAccountClick(e) {
  e.stopPropagation();
  document.getElementById('accountDropdown').classList.toggle('open');
}
document.addEventListener('click', () => document.getElementById('accountDropdown').classList.remove('open'));

// ── Filter/overlay helpers ────────────────────────────────────────────────────
function showFilters() {
  document.getElementById('foFilters').classList.remove('fo-hidden');
  document.getElementById('foShowFilters').style.display = 'none';
  localStorage.setItem('ts_filters_v', 'visible');
}
function hideFilters() {
  document.getElementById('foFilters').classList.add('fo-hidden');
  document.getElementById('foShowFilters').style.display = 'flex';
  localStorage.setItem('ts_filters_v', 'hidden');
}
function initOverlays() {
  if (localStorage.getItem('ts_filters_v') === 'hidden') hideFilters();
}

function toggleMobileFilters() {
  const fo = document.getElementById('foFilters');
  const bd = document.getElementById('foBackdrop');
  const btn = document.getElementById('mobFiltersBtn');
  const isOpen = fo.classList.contains('mob-open');
  closeMobileOverlays();
  if (!isOpen) { fo.classList.add('mob-open'); bd.classList.add('mob-open'); btn.classList.add('active'); }
}
function toggleMobileDetail() {
  if (!_detailId) return;
  const fo = document.getElementById('foDetail');
  const bd = document.getElementById('foBackdrop');
  const btn = document.getElementById('mobDetailBtn');
  const isOpen = fo.classList.contains('mob-open');
  closeMobileOverlays();
  if (!isOpen) {
    fo.classList.add('mob-open');
    bd.classList.add('mob-open');
    btn.classList.add('active');
    CP.open(_detailId);
  }
}
function closeMobileOverlays() {
  document.getElementById('foFilters').classList.remove('mob-open');
  document.getElementById('foDetail').classList.remove('mob-open');
  document.getElementById('foBackdrop').classList.remove('mob-open');
  document.querySelectorAll('.mob-btn').forEach(b => b.classList.remove('active'));
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeMobileOverlays(); hideDetail(); } });

// ── Auth & boot ───────────────────────────────────────────────────────────────
async function initAuthNav() {
  try {
    const res = await fetch('/api/auth/status');
    const status = res.ok ? await res.json() : false;
    if (!status || !status.loggedIn) { window.location.href = '/login'; return; }
    document.getElementById('ddUserEmail').textContent = status.email;

    const [, contactsRes, groupsRes, relTypesRes] = await Promise.all([
      init(),
      fetch('/api/contacts'),
      fetch('/api/groups'),
      fetch('/api/relationship-types'),
    ]);
    const contacts = contactsRes.ok ? await contactsRes.json() : [];
    const allGroups = groupsRes.ok ? await groupsRes.json() : [];
    const relTypes = relTypesRes.ok ? await relTypesRes.json() : [];

    CP.init('cpContainer');
    CP.contacts = contacts;
    CP.allGroups = allGroups;
    CP.relTypes = relTypes;
    CP.onSaved = () => {};

    initOverlays();
    initCalendar();
    setTimeout(resizeGraph, 250);
    switchView(_currentView);
  } catch { window.location.href = '/login'; }
}

initAuthNav();
</script>
