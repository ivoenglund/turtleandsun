<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Network — Turtle and Sun</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#fff;color:#1C0A00;display:flex;flex-direction:column;}

.nav-bar{background:#FFF9E6;border-bottom:1px solid rgba(28,10,0,0.08);flex-shrink:0;}
.nav-wrap{max-width:1200px;margin:0 auto;padding:0 32px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0 18px;}
.nav a img{height:72px;width:auto;margin-top:-42px;display:block;}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:#1C0A00;text-decoration:none;opacity:0.7;}
.nav-links a:hover{opacity:1;}

.top-bar{background:#FFF9E6;border-bottom:1px solid rgba(28,10,0,0.1);padding:10px 24px;display:flex;align-items:center;gap:20px;flex-shrink:0;flex-wrap:wrap;}
.top-bar h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;color:#1C0A00;flex:1;min-width:0;}
.cb-group{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.cb-label{display:flex;align-items:center;gap:6px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:#1C0A00;user-select:none;}
.cb-label input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#3A6B20;flex-shrink:0;}
.cb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cb-sep{width:1px;height:16px;background:rgba(28,10,0,0.15);flex-shrink:0;}
.btn-back{padding:7px 16px;background:#3A6B20;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-back:hover{background:#1C0A00;}

#graph-container{flex:1;position:relative;overflow:hidden;background:#fff;}
#graph-svg{width:100%;height:100%;display:block;}

.tooltip{position:fixed;background:#1C0A00;color:#FFF9E6;padding:8px 12px;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:100;max-width:200px;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.tooltip.visible{opacity:1;}

.side-panel{position:fixed;top:0;right:-340px;width:320px;height:100%;background:#FFF9E6;box-shadow:-4px 0 24px rgba(0,0,0,0.12);transition:right 0.25s cubic-bezier(0.4,0,0.2,1);z-index:200;display:flex;flex-direction:column;}
.side-panel.open{right:0;}
.sp-header{padding:20px 20px 16px;border-bottom:1px solid rgba(28,10,0,0.08);display:flex;align-items:flex-start;justify-content:space-between;}
.sp-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800;color:#1C0A00;line-height:1.2;}
.sp-close{background:none;border:none;font-size:20px;cursor:pointer;color:rgba(28,10,0,0.4);padding:0;line-height:1;}
.sp-close:hover{color:#1C0A00;}
.sp-body{padding:16px 20px;flex:1;overflow-y:auto;}
.sp-field{margin-bottom:12px;}
.sp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:rgba(28,10,0,0.35);margin-bottom:3px;}
.sp-value{font-size:13px;color:#1C0A00;}
.sp-rels{margin-top:16px;}
.sp-rels-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:rgba(28,10,0,0.35);margin-bottom:8px;}
.sp-rel-item{font-size:12px;color:#1C0A00;padding:5px 0;border-bottom:1px solid rgba(28,10,0,0.06);}
.sp-rel-item:last-child{border-bottom:none;}
.sp-rel-name{font-weight:600;}
.sp-rel-type{color:rgba(28,10,0,0.5);margin-left:4px;}
.sp-footer{padding:16px 20px;border-top:1px solid rgba(28,10,0,0.08);}
.btn-view-full{display:block;width:100%;padding:10px;background:#3A6B20;color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;}
.btn-view-full:hover{background:#1C0A00;}

#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:50;}
#loading p{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:rgba(28,10,0,0.4);}
</style>
</head>
<body>

<div class="nav-bar">
  <div class="nav-wrap">
    <div class="nav">
      <a href="/"><img src="/logo.png" alt="Turtle and Sun"></a>
      <div class="nav-links">
        <a href="/">Home</a><a href="/pricing">Pricing</a><a href="/faq">FAQ</a>
        <a href="/account/contacts">Contacts</a>
      </div>
    </div>
  </div>
</div>

<div class="top-bar">
  <h1>My Network</h1>
  <div class="cb-group">
    <label class="cb-label">
      <input type="checkbox" id="cb-all" checked onchange="toggleAll()">All
    </label>
    <div class="cb-sep"></div>
    <label class="cb-label">
      <input type="checkbox" id="cb-Family" checked onchange="applyFilter()">
      <span class="cb-dot" style="background:#c0195a;"></span>Family
    </label>
    <label class="cb-label">
      <input type="checkbox" id="cb-Work" checked onchange="applyFilter()">
      <span class="cb-dot" style="background:#2a5016;"></span>Work
    </label>
    <label class="cb-label">
      <input type="checkbox" id="cb-School" checked onchange="applyFilter()">
      <span class="cb-dot" style="background:#1a5f8a;"></span>School
    </label>
    <label class="cb-label">
      <input type="checkbox" id="cb-Friends" checked onchange="applyFilter()">
      <span class="cb-dot" style="background:#b85e10;"></span>Friends
    </label>
  </div>
  <a href="/account/contacts" class="btn-back">← Contacts</a>
</div>

<div id="graph-container">
  <div id="loading"><p>Loading network…</p></div>
  <svg id="graph-svg"></svg>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="side-panel" id="sidePanel">
  <div class="sp-header">
    <div class="sp-name" id="spName"></div>
    <button class="sp-close" onclick="closePanel()">×</button>
  </div>
  <div class="sp-body">
    <div class="sp-field" id="spBirthdayWrap">
      <div class="sp-label">Birthday</div>
      <div class="sp-value" id="spBirthday"></div>
    </div>
    <div class="sp-field" id="spCityWrap">
      <div class="sp-label">City</div>
      <div class="sp-value" id="spCity"></div>
    </div>
    <div class="sp-rels">
      <div class="sp-rels-title">Relationships</div>
      <div id="spRels"></div>
    </div>
  </div>
  <div class="sp-footer">
    <a href="#" class="btn-view-full" id="spViewFull">View full record</a>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const GROUP_COLORS = {
  'Family':  '#c0195a',
  'Work':    '#2a5016',
  'School':  '#1a5f8a',
  'Friends': '#b85e10',
};
const GROUPS = ['Family', 'Work', 'School', 'Friends'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Contact node pill dimensions
const NW = 130, NH = 46, NRX = 10;
// Group hub node dimensions
const GNW = 114, GNH = 34, GNRX = 17;
const ME_R = 26;

let _allNodes = [], _relLinks = [], _memberLinks = [], _contactMap = {}, _nodeGroups = {};
let _simulation, _svg, _g;
let _nodeSel, _groupNodeSel, _relLinkSel, _memberLinkSel, _labelSelA, _labelSelB;
let _width, _height;

function formatBirthday(str) {
  if (!str) return '';
  const p = str.split('-');
  if (p.length < 3) return str;
  return `${parseInt(p[2], 10)} ${MONTHS[parseInt(p[1], 10) - 1] || p[1]}`;
}

function truncate(s, n) {
  s = s || '';
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

async function init() {
  const res = await fetch('/api/network');
  if (res.status === 401) { window.location.href = '/login'; return; }
  const data = await res.json();

  data.contacts.forEach(c => { _contactMap[c.id] = c; });

  // Group hub nodes from memberships
  const groupNodeMap = {};
  (data.group_memberships || []).forEach(m => {
    if (!groupNodeMap[m.group_id]) {
      groupNodeMap[m.group_id] = { id: `g_${m.group_id}`, name: m.group_name, isGroup: true };
    }
  });
  const groupNodes = Object.values(groupNodeMap);
  _memberLinks = (data.group_memberships || []).map(m => ({
    source: `g_${m.group_id}`,
    target: m.contact_id,
    isMembership: true,
  }));

  _allNodes = [
    { id: '__me__', name: 'You', isMe: true },
    ...data.contacts.map(c => ({ id: c.id, name: c.name || 'Unnamed', ...c })),
    ...groupNodes,
  ];

  // Bidirectional merge: each pair gets relA (at lo-id end) and relB (at hi-id end)
  const pairMap = new Map();
  (data.relationships || []).forEach(r => {
    const lo = Math.min(r.contact_a_id, r.contact_b_id);
    const hi = Math.max(r.contact_a_id, r.contact_b_id);
    const key = `${lo}-${hi}`;
    if (!pairMap.has(key)) {
      pairMap.set(key, { source: lo, target: hi, group: r.group_name, relA: null, relB: null });
    }
    const link = pairMap.get(key);
    if (r.contact_a_id === lo) link.relA = r.relationship;
    else link.relB = r.relationship;
  });
  _relLinks = Array.from(pairMap.values());

  // nodeGroups: which relationship categories each contact belongs to
  _relLinks.forEach(l => {
    [l.source, l.target].forEach(id => {
      if (!_nodeGroups[id]) _nodeGroups[id] = new Set();
      _nodeGroups[id].add(l.group);
    });
  });

  document.getElementById('loading').style.display = 'none';
  buildGraph();
}

function buildGraph() {
  const container = document.getElementById('graph-container');
  _width = container.clientWidth;
  _height = container.clientHeight;

  _svg = d3.select('#graph-svg').attr('width', _width).attr('height', _height);
  _svg.selectAll('*').remove();

  const zoom = d3.zoom().scaleExtent([0.05, 4]).on('zoom', e => _g.attr('transform', e.transform));
  _svg.call(zoom);
  _g = _svg.append('g');

  // Clone all nodes; build id→node map
  const nodesCopy = _allNodes.map(n => ({ ...n }));
  const idToNode = {};
  nodesCopy.forEach(n => { idToNode[n.id] = n; });

  const relLinksCopy = _relLinks
    .map(l => ({ ...l, source: idToNode[l.source], target: idToNode[l.target] }))
    .filter(l => l.source && l.target);

  const memberLinksCopy = _memberLinks
    .map(l => ({ ...l, source: idToNode[l.source], target: idToNode[l.target] }))
    .filter(l => l.source && l.target);

  _simulation = d3.forceSimulation(nodesCopy)
    .force('link', d3.forceLink([...relLinksCopy, ...memberLinksCopy]).id(d => d.id)
      .distance(d => d.isMembership ? 110 : 160)
      .strength(d => d.isMembership ? 0.15 : 0.35))
    .force('charge', d3.forceManyBody().strength(d => d.isGroup ? -120 : -350))
    .force('center', d3.forceCenter(_width / 2, _height / 2))
    .force('collision', d3.forceCollide().radius(d => {
      if (d.isMe)    return ME_R + 8;
      if (d.isGroup) return Math.sqrt((GNW / 2) ** 2 + (GNH / 2) ** 2) + 4;
      return Math.sqrt((NW / 2) ** 2 + (NH / 2) ** 2) + 6;
    }));

  // ── Layer 1: Membership links (dashed grey) ───────────────────────────────
  _memberLinkSel = _g.append('g').attr('class', 'member-links')
    .selectAll('line').data(memberLinksCopy).join('line')
    .attr('stroke', 'rgba(28,10,0,0.2)')
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '5,4');

  // ── Layer 2: Relationship links ───────────────────────────────────────────
  _relLinkSel = _g.append('g').attr('class', 'rel-links')
    .selectAll('line').data(relLinksCopy).join('line')
    .attr('stroke', d => GROUP_COLORS[d.group] || '#555')
    .attr('stroke-opacity', 0.55)
    .attr('stroke-width', 2);

  // ── Layer 3: Two-ended relationship labels ────────────────────────────────
  const labelBase = sel => sel
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('font-family', "'Plus Jakarta Sans', sans-serif")
    .attr('font-size', 9).attr('font-weight', 700)
    .attr('fill', d => GROUP_COLORS[d.group] || '#333')
    .style('paint-order', 'stroke')
    .style('stroke', '#fff').style('stroke-width', '4px').style('stroke-linejoin', 'round');

  const labG = _g.append('g').attr('class', 'link-labels');

  // Label A: at source end (30%) for asymmetric, midpoint (50%) for symmetric
  _labelSelA = labG.selectAll('.lbl-a').data(relLinksCopy).join('text')
    .attr('class', 'lbl-a').call(labelBase)
    .text(d => d.relA || d.relB || '');

  // Label B: at target end (70%), only shown when asymmetric
  _labelSelB = labG.selectAll('.lbl-b').data(relLinksCopy).join('text')
    .attr('class', 'lbl-b').call(labelBase)
    .text(d => (d.relA && d.relB && d.relA !== d.relB) ? d.relB : '');

  // ── Layer 4: Group hub nodes ──────────────────────────────────────────────
  const groupNodesCopy = nodesCopy.filter(n => n.isGroup);
  const groupG = _g.append('g').attr('class', 'group-nodes')
    .selectAll('g').data(groupNodesCopy).join('g')
    .attr('class', 'group-node-g')
    .style('cursor', 'default')
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd));

  groupG.append('rect')
    .attr('x', -GNW / 2).attr('y', -GNH / 2)
    .attr('width', GNW).attr('height', GNH).attr('rx', GNRX)
    .attr('fill', '#eef6ee')
    .attr('stroke', '#3A6B20').attr('stroke-width', 1.5).attr('stroke-dasharray', '5,3');

  groupG.append('text')
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('font-family', "'Plus Jakarta Sans', sans-serif")
    .attr('font-size', 10).attr('font-weight', 700).attr('fill', '#2a5016')
    .text(d => truncate(d.name, 15));

  _groupNodeSel = groupG;

  // ── Layer 5: Contact + me nodes ───────────────────────────────────────────
  const contactsCopy = nodesCopy.filter(n => !n.isGroup);
  const nodeG = _g.append('g').attr('class', 'contact-nodes')
    .selectAll('g').data(contactsCopy).join('g')
    .attr('class', 'contact-node-g')
    .style('cursor', d => d.isMe ? 'default' : 'pointer')
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd))
    .on('mouseenter', showTooltip).on('mousemove', moveTooltip).on('mouseleave', hideTooltip)
    .on('click', nodeClick);

  // Me circle
  const meG = nodeG.filter(d => d.isMe);
  meG.append('circle').attr('r', ME_R)
    .attr('fill', '#3A6B20').attr('stroke', '#fff').attr('stroke-width', 3);
  meG.append('text')
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('font-family', "'Plus Jakarta Sans', sans-serif")
    .attr('font-size', 11).attr('font-weight', 800).attr('fill', '#fff').text('You');

  // Contact pills
  const cG = nodeG.filter(d => !d.isMe);
  cG.append('rect')
    .attr('x', -NW / 2).attr('y', -NH / 2).attr('width', NW).attr('height', NH).attr('rx', NRX)
    .attr('fill', '#f7f4ef').attr('stroke', 'rgba(28,10,0,0.22)').attr('stroke-width', 2);
  cG.append('text')
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('y', d => d.birthday ? -8 : 0)
    .attr('font-family', "'Plus Jakarta Sans', sans-serif")
    .attr('font-size', 10).attr('font-weight', 700).attr('fill', '#1C0A00')
    .text(d => truncate(d.name, 18));
  cG.filter(d => !!d.birthday).append('text')
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central').attr('y', 9)
    .attr('font-family', "'DM Sans', sans-serif")
    .attr('font-size', 8.5).attr('fill', 'rgba(28,10,0,0.48)')
    .text(d => formatBirthday(d.birthday));

  _nodeSel = nodeG;

  _simulation.on('tick', () => {
    _relLinkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    _memberLinkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

    // Label A: midpoint for symmetric, 30% from source for asymmetric
    _labelSelA.attr('x', d => {
      const f = (!d.relA || !d.relB || d.relA === d.relB) ? 0.5 : 0.3;
      return d.source.x * (1 - f) + d.target.x * f;
    }).attr('y', d => {
      const f = (!d.relA || !d.relB || d.relA === d.relB) ? 0.5 : 0.3;
      return d.source.y * (1 - f) + d.target.y * f;
    });
    // Label B: 70% from source (target end)
    _labelSelB
      .attr('x', d => d.source.x * 0.3 + d.target.x * 0.7)
      .attr('y', d => d.source.y * 0.3 + d.target.y * 0.7);

    nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
    groupG.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  applyVisibility();
}

// ── Checkboxes ────────────────────────────────────────────────────────────────
function getActiveGroups() {
  return new Set(GROUPS.filter(g => document.getElementById(`cb-${g}`).checked));
}
function toggleAll() {
  const checked = document.getElementById('cb-all').checked;
  GROUPS.forEach(g => { document.getElementById(`cb-${g}`).checked = checked; });
  applyVisibility(); closePanel();
}
function applyFilter() {
  const active = getActiveGroups();
  document.getElementById('cb-all').checked = active.size === GROUPS.length;
  applyVisibility(); closePanel();
}
function applyVisibility() {
  if (!_nodeSel || !_relLinkSel) return;
  const active = getActiveGroups();

  _relLinkSel.attr('display', l => active.has(l.group) ? null : 'none');
  _labelSelA.attr('display', l => active.has(l.group) ? null : 'none');
  _labelSelB.attr('display', l => active.has(l.group) ? null : 'none');

  _nodeSel.attr('display', d => {
    if (d.isMe) return null;
    const groups = _nodeGroups[d.id];
    if (!groups) return 'none';
    for (const g of groups) { if (active.has(g)) return null; }
    return 'none';
  });
  // Group hub nodes and membership links always visible
}

// ── Drag ──────────────────────────────────────────────────────────────────────
function dragStart(event, d) {
  if (!event.active) _simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) _simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(event, d) {
  if (d.isMe) return;
  tooltip.textContent = d.name || 'Unnamed';
  tooltip.classList.add('visible');
  moveTooltip(event);
}
function moveTooltip(event) {
  tooltip.style.left = (event.clientX + 14) + 'px';
  tooltip.style.top = (event.clientY - 10) + 'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }

// ── Side panel ────────────────────────────────────────────────────────────────
function nodeClick(event, d) {
  if (d.isMe) return;
  event.stopPropagation();
  openPanel(d);
}

function openPanel(d) {
  document.getElementById('spName').textContent = d.name || 'Unnamed';

  const bday = d.birthday;
  document.getElementById('spBirthdayWrap').style.display = bday ? '' : 'none';
  document.getElementById('spBirthday').textContent = bday ? formatBirthday(bday) : '';

  const city = d.city;
  document.getElementById('spCityWrap').style.display = city ? '' : 'none';
  document.getElementById('spCity').textContent = city || '';

  const nodeId = d.id;
  const rels = _relLinks.filter(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s === nodeId || t === nodeId;
  });

  const relsEl = document.getElementById('spRels');
  if (!rels.length) {
    relsEl.innerHTML = '<div style="font-size:12px;color:rgba(28,10,0,0.35);">No relationships recorded.</div>';
  } else {
    relsEl.innerHTML = rels.map(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const isSource = s === nodeId;
      const otherId = isSource
        ? (typeof l.target === 'object' ? l.target.id : l.target)
        : s;
      const other = _contactMap[otherId];
      // Show relationship from this node's perspective
      const myRel = isSource ? (l.relA || l.relB) : (l.relB || l.relA);
      return `<div class="sp-rel-item"><span class="sp-rel-name">${esc(other ? other.name || 'Unnamed' : 'Unknown')}</span><span class="sp-rel-type">${esc(myRel || '')}</span></div>`;
    }).join('');
  }

  document.getElementById('spViewFull').href = `/account/contacts?id=${nodeId}`;
  document.getElementById('sidePanel').classList.add('open');
  highlightNode(nodeId);
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  clearHighlight();
}

function highlightNode(nodeId) {
  if (!_nodeSel) return;
  const connectedIds = new Set([nodeId]);
  _relLinks.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (s === nodeId) connectedIds.add(t);
    if (t === nodeId) connectedIds.add(s);
  });

  _nodeSel.attr('opacity', d => d.isMe || connectedIds.has(d.id) ? 1 : 0.1);
  _relLinkSel.attr('stroke-opacity', l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return (s === nodeId || t === nodeId) ? 0.9 : 0.04;
  });
  _labelSelA.attr('opacity', l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return (s === nodeId || t === nodeId) ? 1 : 0.04;
  });
  _labelSelB.attr('opacity', l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return (s === nodeId || t === nodeId) ? 1 : 0.04;
  });
}

function clearHighlight() {
  if (!_nodeSel) return;
  _nodeSel.attr('opacity', 1);
  _relLinkSel.attr('stroke-opacity', 0.55);
  _labelSelA.attr('opacity', 1);
  _labelSelB.attr('opacity', 1);
}

document.getElementById('graph-svg').addEventListener('click', () => closePanel());

window.addEventListener('resize', () => {
  const container = document.getElementById('graph-container');
  _width = container.clientWidth;
  _height = container.clientHeight;
  _svg.attr('width', _width).attr('height', _height);
  if (_simulation) _simulation.force('center', d3.forceCenter(_width / 2, _height / 2)).alpha(0.3).restart();
});

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
